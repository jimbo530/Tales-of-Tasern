  for (var i = 0; i < floorPoops.length; i++) {
    var fp = floorPoops[i];
    fp.age++;
    var sz = fp.size * SCALE;
    var px = fp.x;
    var py = fp.y;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.ellipse(px, py + 2, 8 * sz, 3 * sz, 0, 0, Math.PI * 2);
    ctx.fill();

    // Bottom ball
    ctx.fillStyle = '#78350f';
    ctx.beginPath();
    ctx.ellipse(px, py, 7 * sz, 5 * sz, 0, 0, Math.PI * 2);
    ctx.fill();

    // Middle ball
    ctx.fillStyle = '#92400e';
    ctx.beginPath();
    ctx.ellipse(px + 1 * sz, py - 6 * sz, 5 * sz, 4 * sz, 0.2, 0, Math.PI * 2);
    ctx.fill();

    // Top ball
    ctx.fillStyle = '#a16207';
    ctx.beginPath();
    ctx.ellipse(px - 1 * sz, py - 11 * sz, 3.5 * sz, 3 * sz, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.ellipse(px - 2 * sz, py - 12 * sz, 1.5 * sz, 1 * sz, 0, 0, Math.PI * 2);
    ctx.fill();

    // Stink cloud — wavy lines above the poop
    if (fp.age > 30) {
      ctx.strokeStyle = 'rgba(132,204,22,0.35)';
      ctx.lineWidth = 1.5;
      for (var s = 0; s < 3; s++) {
        ctx.beginPath();
        var baseY = py - 16 * sz - s * 8 * sz;
        var waveOff = t * 3 + s * 1.2 + i;
        for (var wx2 = -8; wx2 <= 8; wx2 += 2) {
          var wy2 = baseY + Math.sin(waveOff + wx2 * 0.5) * 3 * sz;
          if (wx2 === -8) ctx.moveTo(px + wx2 * sz, wy2);
          else ctx.lineTo(px + wx2 * sz, wy2);
        }
        ctx.stroke();
      }
      // Stink particles occasionally
      if (Math.random() < 0.01) {
        spawnParticles(px, py - 16 * sz, 'stink', 1);
      }
    }
  }
}

function clickPoop(mx, my) {
  for (var i = floorPoops.length - 1; i >= 0; i--) {
    var fp = floorPoops[i];
    var dx = mx - fp.x;
    var dy = my - fp.y;
    if (dx * dx + dy * dy < 400) {
      // Clicked a poop — clean it (gives happiness, not tokens)
      spawnParticles(fp.x, fp.y - 10, 'star', 3);
      floorPoops.splice(i, 1);
      if (selected && selected.alive) selected.happy = Math.min(100, selected.happy + 5);
      showMsg('CLEANED! +5 HAPPY', '#f472b6');
      if (selected) updatePanel();
      return true;
    }
  }
  return false;
}

// --- BALL MINI-GAME ---
function spawnBall(x, y) {
  ball = {
    x: x,
    y: y,
    vx: 0,
    vy: -3,
    bounceTimer: 0,
    spawnTime: Date.now(),
  };
}

function updateBall() {
  if (!ball) return;

  // Ball bounce physics
  ball.vy += 0.15;
  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.vx *= 0.98;

  // Bounce off floor
  var yFloor = FLOOR_ZONE.yMax * H;
  if (ball.y > yFloor) {
    ball.y = yFloor;
    ball.vy = -ball.vy * 0.5;
    if (Math.abs(ball.vy) < 0.5) ball.vy = 0;
  }

  ball.bounceTimer++;

  // Check if a Baseling reached the ball
  for (var i = 0; i < baselings.length; i++) {
    var w = baselings[i];
    if (!w.alive || w.stage === 0) continue;
    if (w.state === 'chasing') {
      var dx = ball.x - w.x;
      var dy = ball.y - w.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 25) {
        // Baseling caught the ball
        w.happy = Math.min(100, w.happy + 10);
        w.poopMeter = Math.min(100, w.poopMeter + 5);
        w.care.ballCatches++;
        w.state = 'idle';
        w.stateTimer = 60;
        w.bounceY = -10;
        spawnParticles(w.x, w.y - 40, 'star', 5);
        showMsg('FETCH! +10 HAPPY');
        ball = null;
        if (selected === w) updatePanel();
        return;
      }
    }
  }

  // Ball times out after 10 seconds
  if (Date.now() - ball.spawnTime > 10000) {
    ball = null;
  }
}

function drawBall(t) {
  if (!ball) return;
  var bx = ball.x;
  var by = ball.y;
  var radius = 8 * SCALE;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(bx, FLOOR_ZONE.yMax * H + 2, radius * 0.8, radius * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ball body — red
  ctx.fillStyle = '#ef4444';
  ctx.beginPath();
  ctx.arc(bx, by, radius, 0, Math.PI * 2);
  ctx.fill();

  // Yellow stripe
  ctx.save();
  ctx.beginPath();
  ctx.arc(bx, by, radius, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = '#fbbf24';
  var stripeAngle = t * 4 + ball.bounceTimer * 0.05;
  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(stripeAngle);
  ctx.fillRect(-radius * 1.5, -radius * 0.2, radius * 3, radius * 0.4);
  ctx.restore();
  ctx.restore();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(bx - radius * 0.3, by - radius * 0.3, radius * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

function startChasingBall() {
  if (!ball) return;
  // Find nearest alive non-egg Baseling in current room
  var nearest = null;
  var nearDist = Infinity;
  var vis = roomBaselings(currentRoom);
  for (var i = 0; i < vis.length; i++) {
    var w = vis[i];
    if (!w.alive || w.stage === 0 || w.state === 'chasing') continue;
    var dx = ball.x - w.x;
    var dy = ball.y - w.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < nearDist) {
      nearDist = dist;
      nearest = w;
    }
  }
  if (nearest) {
    nearest.state = 'chasing';
    nearest.targetX = ball.x;
    nearest.targetY = ball.y;
    nearest.stateTimer = 600;
  }
}

// --- BASELING INTERACTIONS ---
function checkBaselingInteractions() {
  var vis = roomBaselings(currentRoom);
  for (var i = 0; i < vis.length; i++) {
    var a = vis[i];
    if (!a.alive || a.stage === 0 || a.interactCooldown > 0) continue;
    for (var j = i + 1; j < vis.length; j++) {
      var b = vis[j];
      if (!b.alive || b.stage === 0 || b.interactCooldown > 0) continue;
      var dx = a.x - b.x;
      var dy = a.y - b.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 60) {
        var midX = (a.x + b.x) / 2;
        var midY = (a.y + b.y) / 2;
        if (a.happy > 50 && b.happy > 50) {
          // Play together — spawn hearts
          spawnParticles(midX, midY - 30, 'heart', 3);
          a.happy = Math.min(100, a.happy + 2);
          b.happy = Math.min(100, b.happy + 2);
          a.interactCooldown = 180;
          b.interactCooldown = 180;
        } else if (a.hunger < 30 && b.hunger < 30) {
          // Fight — spawn anger marks, push apart
          spawnParticles(midX, midY - 30, 'anger', 4);
          a.happy = Math.max(0, a.happy - 3);
          b.happy = Math.max(0, b.happy - 3);
          // Push apart
          var pushDist = 30;
          if (dist > 0) {
            a.x += (dx / dist) * pushDist;
            a.y += (dy / dist) * pushDist;
            b.x -= (dx / dist) * pushDist;
            b.y -= (dy / dist) * pushDist;
          }
          clampToFloor(a);
          clampToFloor(b);
          a.interactCooldown = 240;
          b.interactCooldown = 240;
        } else {
          // One follows the other briefly
          if (a.state !== 'chasing') {
            a.targetX = b.x + (Math.random() - 0.5) * 30;
            a.targetY = b.y + (Math.random() - 0.5) * 15;
            a.state = 'walking';
            a.stateTimer = 60;
          }
          a.interactCooldown = 120;
          b.interactCooldown = 120;
        }
        break; // Only one interaction per Baseling per check
      }
    }
  }
}

// --- BASELING AI ---
function pickNewTarget(w) {
  var yFrac = FLOOR_ZONE.yMin + Math.random() * (FLOOR_ZONE.yMax - FLOOR_ZONE.yMin);
  var bounds = getFloorBounds(yFrac);
  var xFrac = bounds.xMin + Math.random() * (bounds.xMax - bounds.xMin);
  w.targetX = xFrac * W;
  w.targetY = yFrac * H;
}

function clampToFloor(w) {
  var yFrac = w.y / H;
  yFrac = Math.max(FLOOR_ZONE.yMin, Math.min(FLOOR_ZONE.yMax, yFrac));
  w.y = yFrac * H;
  var bounds = getFloorBounds(yFrac);
  w.x = Math.max(bounds.xMin * W, Math.min(bounds.xMax * W, w.x));
}

function updateBaselingAI(w) {
  if (!w.alive && w.stage !== 0) { w.state = 'dead'; return; }
  if (w.stage === 0) { w.state = 'egg'; return; }

  // Decrement interaction cooldown
  if (w.interactCooldown > 0) w.interactCooldown--;

  // Poop spawn timer
  if (w.poopSpawnTimer > 0) w.poopSpawnTimer--;

  // Auto-spawn poop on floor when digest meter fills (visual only — tokens from feeding)
  if (w.poopMeter >= 100 && w.alive && w.poopSpawnTimer <= 0) {
    w.poopMeter = 0;
    w.poopSpawnTimer = 30;
    spawnFloorPoop(w.x, w.y);
    spawnParticles(w.x + 15, w.y - 10, 'stink', 2);
    // Each poop drops happiness by 5
    w.happy = Math.max(0, w.happy - 5);
    showMsg('PLOOP! -5 HAPPY', '#a78bfa');
    if (selected === w) updatePanel();
  }

  // Periodic particle spawns based on mood
  var now = Date.now();
  if (w.hunger < 15 && now - w.lastAngerParticle > 2000) {
    spawnParticles(w.x, w.y - 50, 'anger', 2);
    w.lastAngerParticle = now;
  }
  if (w.hunger < 35 && w.hunger >= 15 && now - w.lastSweatParticle > 2000) {
    spawnParticles(w.x + 15, w.y - 40, 'sweat', 1);
    w.lastSweatParticle = now;
  }
  if (w.happy > 80 && w.state === 'walking' && now - w.lastNoteParticle > 3000 && Math.random() < 0.3) {
    spawnParticles(w.x, w.y - 55, 'note', 1);
    w.lastNoteParticle = now;
  }

  // Too many floor poops = everyone loses happiness faster
  if (floorPoops.length > 5) {
    w.happy = Math.max(0, w.happy - 0.02);
  }

  // If chasing ball, override targeting
  if (w.state === 'chasing' && ball) {
    w.targetX = ball.x;
    w.targetY = ball.y;
    var dx = w.targetX - w.x;
    var dy = w.targetY - w.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 3) {
      var speed = (w.walkSpeed + 0.6) * SCALE;
      w.x += (dx / dist) * speed;
      w.y += (dy / dist) * speed;
      w.facing = dx > 0 ? 1 : -1;
      // Set direction based on dominant movement axis
      if (Math.abs(dy) > Math.abs(dx) * 0.8) w.direction = dy < 0 ? 'up' : 'down';
      else w.direction = dx > 0 ? 'right' : 'left';
    }
    clampToFloor(w);
    // Fall through to hunger/happy decay below but skip normal state machine
  } else if (w.state === 'chasing' && !ball) {
    // Ball disappeared, go back to idle
    w.state = 'idle';
    w.stateTimer = 40;
  }

  if (w.state !== 'chasing') {
    w.stateTimer--;
    if (w.stateTimer <= 0) {
      var r = Math.random();
      if (r < 0.15) {
        w.state = 'walking';
        pickNewTarget(w);
        w.stateTimer = 120 + Math.random()*200;
      } else if (r < 0.45) {
        w.state = 'idle';
        w.direction = 'down';
        w.stateTimer = 200 + Math.random()*300;
      } else if (r < 0.75) {
        w.state = 'sitting';
        w.direction = 'down';
        w.stateTimer = 200 + Math.random()*400;
      } else {
        w.state = 'sleeping';
        w.direction = 'down';
        w.stateTimer = 250 + Math.random()*400;
      }
    }

    if (w.state === 'walking') {
      var dx = w.targetX - w.x;
      var dy = w.targetY - w.y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 5) {
        w.state = 'idle';
        w.direction = 'down'; // face front when idle
        w.stateTimer = 40 + Math.random()*80;
      } else {
        var speed = w.walkSpeed * SCALE;
        w.x += (dx / dist) * speed;
        w.y += (dy / dist) * speed;
        w.facing = dx > 0 ? 1 : -1;
        // Set direction based on dominant movement axis
        if (Math.abs(dy) > Math.abs(dx) * 0.8) w.direction = dy < 0 ? 'up' : 'down';
        else w.direction = dx > 0 ? 'right' : 'left';
      }
    }
    clampToFloor(w);
  }

  // Care pattern sampling (every ~60 frames ≈ 1sec)
  if (w.alive && w.stage > 0 && frameCount % 60 === 0) {
    w.care.happySum += w.happy;
    w.care.happySamples++;
    // Track neglect episodes
    if (w.hunger < 10 || w.happy < 10) {
      if (!w.care.wasNeglected) {
        w.care.neglectCount++;
        w.care.wasNeglected = true;
      }
    } else {
      w.care.wasNeglected = false;
    }
  }

  // hunger/happy decay — time-based: full 4hrs, drains to 0 by 24hrs, death at 72hrs
  // Giants drain 2x faster (need 2 feeds via recordMeal).
  if (w.alive && w.stage > 0) {
    var giantMult = w.isGiant ? 2 : 1;
    var wRoom = rooms[w.roomId || 0];
    var sinceLastFed = Date.now() - (w.lastFed || 0);
    var graceMs = (DEV_MODE ? 2 : 4 * 3600) * 1000;     // 4hr grace period
    var emptyMs = (DEV_MODE ? 12 : 24 * 3600) * 1000;    // food empty at 24hrs
    var deathMs = (DEV_MODE ? 36 : 72 * 3600) * 1000;    // death at 72hrs
    var adjSince = sinceLastFed * giantMult;
    // Hunger: holds for 4hrs after feed, then drains to 0 by 24hrs
    // hungerAtFeed tracks what hunger was right after last meal
    var peak = w.hungerAtFeed || w.hunger || 100;
    if (adjSince <= graceMs) {
      // Grace period — no decay, hunger stays where feeding left it
    } else if (adjSince < emptyMs) {
      var decayPct = (adjSince - graceMs) / (emptyMs - graceMs);
      w.hunger = Math.max(0, peak * (1 - decayPct));
    } else {
      w.hunger = 0;
    }
    // Happy drains steadily over 12hrs — feed to refill, nanny doesn't help
    var happyRate = DEV_MODE ? 0.008 : 0.0000154;
    w.happy = Math.max(0, w.happy - happyRate * giantMult);

    // POOP distribution — 4hr keeper cycle (distributeBatch)
    // Two sources released together:
    //   1. Pending POOP from feeding (deposit → delayed mint)
    //   2. Volume POOP from LP fees (trading volume on pairs)
    var totalLP = w.lp ? w.lp.staked + w.lp.locked : 0;
    if (w.stage >= 1 && w.alive) {
      if (!w.lastPoopDist) w.lastPoopDist = Date.now();
      var poopCycleMs = DEV_MODE ? 30000 : 4 * 3600 * 1000; // 4hrs (30s in dev)
      var sinceDist = Date.now() - w.lastPoopDist;
      if (sinceDist >= poopCycleMs) {
        var cycles = Math.min(Math.floor(sinceDist / poopCycleMs), 42); // cap 7 days
        var newPoop = 0;
        // 1. Release pending POOP from deposits (all of it on first cycle)
        if (w.poopPending && w.poopPending > 0) {
          newPoop += Math.floor(w.poopPending);
          w.poopPending = w.poopPending - Math.floor(w.poopPending); // keep fraction
        }
        // 2. Volume POOP: 0.1% of LP per cycle → $0.01 = 1 POOP
        if (totalLP > 0) {
          var feePerCycle = totalLP * 0.001;
          newPoop += Math.floor(feePerCycle * 100) * cycles;
        }
        if (newPoop > 0) {
          w.poopCount = (w.poopCount || 0) + newPoop;
          totalPoop += newPoop;
        }
        w.lastPoopDist = Date.now();
      }
    }
    // Digest meter fills passively — visual eat→poop cycle
    var poopRate = [0, 0.008, 0.015, 0.025, 0.04, 0.06][w.stage] || 0.008;
    var vaultPoop = 1 + Math.log10(1 + totalLP);
    w.poopMeter = Math.min(100, w.poopMeter + poopRate * vaultPoop);

    // Update attention emoji based on current needs
    if (w.poopMeter >= 100) { w.emoji = '\uD83D\uDCA9'; }       // poop needs cleaning
    else if (w.hunger < 25) { w.emoji = '\uD83C\uDF54'; }       // hungry — burger
    else if (w.happy < 20) { w.emoji = '\uD83D\uDE22'; }        // unhappy — crying
    else { w.emoji = null; }                                     // healthy — clear

    if (adjSince >= deathMs) {
      w.alive = false;
      w.stage = 5;
      w.state = 'dead';
      w.deathTime = Date.now();
      w.graveyardRoom = true; // moved to graveyard
      if (selected === w) { selected = null; updatePanel(); }
      showMsg(w.name + ' STARVED... moved to graveyard', '#f87171');
      saveGame();
      updateRoomInfo();
      // Show death tutorial (first death only)
      showTutorial('death');
    }
  }

  if (w.bounceY < 0) w.bounceY += 0.5;
  if (w.bounceY >= 0) {
    w.bounceY = 0;
    // Favorite food multi-bounce
    if (w.favBounceCount && w.favBounceCount > 0) {
      w.favBounceCount--;
      w.bounceY = -12;
      if (w.favBounceCount > 0) spawnParticles(w.x, w.y - 50, 'heart', 2);
    }
  }
}

// --- DEPTH SCALE ---
function getDepthScale(w) {
  var yFrac = w.y / H;
  var t = (yFrac - FLOOR_ZONE.yMin) / (FLOOR_ZONE.yMax - FLOOR_ZONE.yMin);
  t = Math.max(0, Math.min(1, t));
  return 0.45 + t * 0.75;
}

// --- DRAW SPRITES (generative) ---
// Tint cache: pixel-level tinting that preserves dark pixels (eyes, outlines)
var _tintCache = {};
function getTintedSprite(spr, tint) {
  if (!spr || !tint) return spr;
  // Tag sprite for caching
  if (!spr._tid) spr._tid = '_t' + (Math.random()*99999|0);
  var key = spr._tid + tint;
  if (_tintCache[key]) return _tintCache[key];
  var c = document.createElement('canvas'); c.width = spr.width; c.height = spr.height;
  var s = c.getContext('2d'); s.drawImage(spr, 0, 0);
  var m = tint.match(/rgba?\((\d+),(\d+),(\d+),([\d.]+)\)/);
  if (m) {
    var tr = +m[1], tg = +m[2], tb = +m[3], ta = +m[4];
    var id = s.getImageData(0, 0, c.width, c.height), d = id.data;
    for (var i = 0; i < d.length; i += 4) {
      if (d[i+3] < 10) continue;
      var bright = Math.max(d[i], d[i+1], d[i+2]);
      if (bright < 60) continue; // skip eyes, outlines, dark features
      var f = ta * (bright / 255); // stronger tint on lighter pixels
      d[i]   = Math.round(d[i]   * (1-f) + tr * f);
      d[i+1] = Math.round(d[i+1] * (1-f) + tg * f);
      d[i+2] = Math.round(d[i+2] * (1-f) + tb * f);
    }
    s.putImageData(id, 0, 0);
  }
  _tintCache[key] = c;
  return c;
}

function drawSpriteCanvas(spr, x, y, size, flipX, alpha, tint) {
  if (!spr) return;
  var drawMe = tint ? getTintedSprite(spr, tint) : spr;
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  if (flipX) ctx.scale(-1, 1);
  ctx.imageSmoothingEnabled = false;
  var hw = size / 2;
  ctx.drawImage(drawMe, -hw, -size, size, size);
  ctx.restore();
}
function getCharSprite(w) {
  var key = w.charId + '_';
  if (w.state === 'sleeping') key += 'sleep';
  else if (w.state === 'eating') key += 'eat';
  else if (w.direction === 'up') key += 'back_' + (w.animFrame || 0);
  else if (w.direction === 'left' || w.direction === 'right') key += 'side_' + (w.animFrame || 0);
  else key += (w.animFrame || 0); // down = front view (default)
  return charSprites[key] || charSprites[w.charId + '_0'];
}
function getEggSprite(w) {
  // Use pixel art egg PNG if available
  var color = w.eggColor || 'white';
  var stars = RARITY_STARS[w.eggRarity] || 0;
  var key = color + '-' + stars + 'star';
  if (eggSpriteImgs[key] && eggSpriteImgs[key].complete) return eggSpriteImgs[key];
  // Fallback to procedural sprite
  return eggSprites[w.eggId] || eggSprites['plain'];
}

// --- ATTENTION CALLS ---
function drawAttentionBubble(w, x, y, size, depth, t) {
  if (!w.alive || w.stage === 0) return;
  var needsFood = w.hunger < 25;
  var needsHappy = w.happy < 20;
  if (!needsFood && !needsHappy) return;

  var bubbleX = x + size * 0.35;
  var bobOffset = Math.sin(t * 4) * 3;
  var bubbleY = y - size * 1.05 + bobOffset;
  var bubbleR = 10 * depth * SCALE;

  // Determine what to show
  var text, textColor;
  if (needsFood && needsHappy) {
    // Alternate between them
    if (Math.floor(t * 2) % 2 === 0) {
      text = '!'; textColor = '#ef4444';
    } else {
      text = '...'; textColor = '#60a5fa';
    }
  } else if (needsFood) {
    text = '!'; textColor = '#ef4444';
  } else {
    text = '...'; textColor = '#60a5fa';
  }

  // White bubble background
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(bubbleX, bubbleY, bubbleR, 0, Math.PI * 2);
  ctx.fill();

  // Bubble border
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Small triangle pointing down
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.moveTo(bubbleX - 3, bubbleY + bubbleR - 1);
  ctx.lineTo(bubbleX + 3, bubbleY + bubbleR - 1);
  ctx.lineTo(bubbleX, bubbleY + bubbleR + 5);
  ctx.closePath();
  ctx.fill();

  // Text inside bubble
  ctx.fillStyle = textColor;
  ctx.font = 'bold ' + Math.round(bubbleR * 1.1) + 'px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, bubbleX, bubbleY);
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
}

function drawBaseling(w, t) {
  var depth = getDepthScale(w);
  var stageScale;
  if (w.stage === 0) stageScale = 0.5;
  else if (w.stage === 1) stageScale = 0.55;
  else if (w.stage === 2) stageScale = 0.7;
  else if (w.stage === 3) stageScale = 0.85;
  else if (w.stage === 4) stageScale = 1.0;
  else stageScale = 0.6; // dead

  var giantScale = w.isGiant ? 2 : 1;
  var size = 120 * SCALE * depth * stageScale * giantScale;
  var x = w.x;
  var y = w.y + w.bounceY;

  // Attention vibrate — shake when calling for attention
  if (w.alive && w.stage > 0 && (w.hunger < 25 || w.happy < 20)) {
    x += (Math.random() - 0.5) * 2;
  }

  // Walking bob
  if (w.state === 'walking' || w.state === 'chasing') y += Math.sin(t * 8) * 2 * depth;
  // Idle breathe
  if (w.state === 'idle') y += Math.sin(t * 2) * 1 * depth;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(w.x, w.y + 2, size * 0.3, size * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();

  // Choose sprite
  var alpha = 1, tint = null;
  // Egg color tint — animated pulse based on egg the baseling hatched from
  var EGG_TINT_BASE = {
    green: {r:74,g:222,b:128,a:0.12},
    brown: {r:180,g:120,b:60,a:0.10},
    white: {r:200,g:210,b:255,a:0.08},
    red:   {r:239,g:68,b:68,a:0.12},
    blue:  {r:96,g:165,b:250,a:0.12},
    gold:  {r:255,g:215,b:0,a:0.18},
  };
  if (w.stage > 0 && w.eggColor && EGG_TINT_BASE[w.eggColor]) {
    var tb = EGG_TINT_BASE[w.eggColor];
    // Pulse between 4 alpha levels for smooth glow with small cache footprint
    var raw = 0.5 + 0.5 * Math.sin(t * 1.2 + (w.id || 0) * 2.1);
    var step = Math.round(raw * 3) / 3; // 0, 0.33, 0.67, 1.0
    var qa = (tb.a * (0.5 + step * 0.5)).toFixed(3);
    tint = 'rgba(' + tb.r + ',' + tb.g + ',' + tb.b + ',' + qa + ')';
  }
  var isEgg = w.stage === 0;

  if (isEgg) {
    // Egg wobble — scales with egg care (more taps = more excited)
    var wobbleAmt = 0.03 + Math.min(0.12, (w.eggCare || 0) * 0.01);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.sin(t * (2 + (w.eggCare || 0) * 0.1)) * wobbleAmt);
    ctx.translate(-x, -y);

    // Glow intensity scales with egg LP fed
    if (w.eggLPFed > 0) {
      var glowStr = Math.min(0.4, w.eggLPFed * 0.08);
      ctx.fillStyle = 'rgba(240,208,96,' + glowStr + ')';
      ctx.beginPath();
      ctx.ellipse(x, y - size * 0.3, size * 0.5, size * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Crack lines after 3+ taps
    if ((w.eggCare || 0) >= 3) {
      ctx.strokeStyle = '#f0d060';
      ctx.lineWidth = 1.5 * SCALE;
      ctx.globalAlpha = 0.8;
      // Crack 1
      ctx.beginPath();
      ctx.moveTo(x - size*0.1, y - size*0.3);
      ctx.lineTo(x - size*0.02, y - size*0.15);
      ctx.lineTo(x - size*0.12, y - size*0.05);
      ctx.stroke();
      // Crack 2
      ctx.beginPath();
      ctx.moveTo(x + size*0.08, y - size*0.35);
      ctx.lineTo(x + size*0.15, y - size*0.2);
      ctx.stroke();
      if ((w.eggCare || 0) >= 10) {
        // Crack 3 — more care = more cracks
        ctx.beginPath();
        ctx.moveTo(x, y - size*0.45);
        ctx.lineTo(x + size*0.06, y - size*0.3);
        ctx.lineTo(x - size*0.04, y - size*0.2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
  }

  // Epic = shiny rainbow version
  var isEpic = w.alive && w.stage > 0 && (w.charRarity === 'epic' || w.combinedRarity === 'epic');

  // Dead = full greyscale, faded, ghost float
  if (!w.alive) {
    alpha = 0.6;
    ctx.filter = 'grayscale(100%) brightness(0.7)';
    y += Math.sin(t * 2) * 4;
  } else if (isEpic) {
    // Epic shiny = rainbow hue-rotating sprite
    var epicHue = ((t * 60) % 360);
    ctx.filter = 'hue-rotate(' + epicHue + 'deg) saturate(1.4) brightness(1.1)';
  }

  // Legend glow
  if (w.stage === 4 && w.alive) {
    var glowAlpha = 0.15 + Math.sin(t * 4) * 0.1;
    ctx.fillStyle = 'rgba(240,208,96,' + glowAlpha + ')';
    ctx.beginPath();
    ctx.ellipse(x, y - size * 0.4, size * 0.6, size * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    // Sparkles
    for (var i = 0; i < 6; i++) {
      var sx = x + Math.sin(t*2 + i*1.05) * size * 0.6;
      var sy = y - size * 0.4 + Math.cos(t*2 + i*1.05) * size * 0.6;
      ctx.fillStyle = '#fef08a';
      ctx.globalAlpha = 0.7 + Math.sin(t*4+i)*0.3;
      ctx.fillRect(sx-1, sy-1, 3, 3);
      ctx.globalAlpha = 1;
    }
  }

  // EPIC SHINY — rainbow cycling glow + prismatic sparkles
  if (isEpic) {
    // Rainbow glow ring — cycles through hues
    var hue = ((t * 60) % 360);
    var gA = 0.2 + Math.sin(t * 3) * 0.1;
    ctx.fillStyle = 'hsla(' + hue + ',100%,70%,' + gA + ')';
    ctx.beginPath();
    ctx.ellipse(x, y - size * 0.4, size * 0.55, size * 0.65, 0, 0, Math.PI * 2);
    ctx.fill();
    // Second ring offset hue
    ctx.fillStyle = 'hsla(' + ((hue + 120) % 360) + ',100%,70%,' + (gA * 0.5) + ')';
    ctx.beginPath();
    ctx.ellipse(x, y - size * 0.4, size * 0.65, size * 0.75, 0, 0, Math.PI * 2);
    ctx.fill();
    // Rainbow sparkles orbiting
    for (var i = 0; i < 8; i++) {
      var sparkHue = (hue + i * 45) % 360;
      var sx = x + Math.sin(t * 1.5 + i * 0.785) * size * 0.6;
      var sy = y - size * 0.4 + Math.cos(t * 1.5 + i * 0.785) * size * 0.55;
      var sparkA = 0.6 + Math.sin(t * 5 + i) * 0.4;
      ctx.fillStyle = 'hsla(' + sparkHue + ',100%,75%,' + sparkA + ')';
      ctx.fillRect(sx - 1.5, sy - 1.5, 3, 3);
      // Cross sparkle shape
      ctx.fillRect(sx - 0.5, sy - 3, 1, 6);
      ctx.fillRect(sx - 3, sy - 0.5, 6, 1);
    }
  }

  // Sleeping Z's
  if (w.state === 'sleeping' && w.alive) {
    ctx.font = Math.round(8 * depth * SCALE) + 'px "Press Start 2P"';
    for (var z = 0; z < 3; z++) {
      var zx = x + size * 0.4 + z * 6;
      var zy = y - size * 0.5 - z * 12 * depth + Math.sin(t + z) * 3;
      ctx.globalAlpha = 0.6 - z * 0.18;
      ctx.fillStyle = '#ddd';
      ctx.fillText('z', zx, zy);
    }
    ctx.globalAlpha = 1;
  }

  // Draw the sprite(s)
  // Animate: swap frames every ~500ms
  w.animTimer = (w.animTimer || 0) + 1;
  if (w.animTimer > 30) { w.animTimer = 0; w.animFrame = w.animFrame ? 0 : 1; }
  if (isEgg) {
    drawSpriteCanvas(getEggSprite(w), x, y, size, w.facing < 0, alpha, tint);
    ctx.restore(); // end egg wobble
  } else {
    // Draw character body
    drawSpriteCanvas(getCharSprite(w), x, y, size, w.facing < 0, alpha, tint);
  }

  // Sparkle overlay — 1% hatch trait, animated golden shimmer on top of any tint
  if (w.sparkle && w.alive && w.stage > 0) {
    if (!w._sparkles) {
      w._sparkles = [];
      for (var si = 0; si < 6; si++) {
        w._sparkles.push({
          ox: (Math.random() - 0.5) * 0.6,
          oy: -0.2 - Math.random() * 0.6,
          phase: Math.random() * Math.PI * 2,
          speed: 1.5 + Math.random() * 2,
          sz: 2 + Math.random() * 3,
        });
      }
    }
    var st = performance.now() / 1000;
    for (var si2 = 0; si2 < w._sparkles.length; si2++) {
      var sp = w._sparkles[si2];
      var glow = (Math.sin(st * sp.speed + sp.phase) + 1) / 2;
      if (glow < 0.3) continue;
      ctx.globalAlpha = glow * 0.9;
      ctx.fillStyle = '#fffde0';
      var spx2 = x + sp.ox * size, spy = y + sp.oy * size;
      var sr = sp.sz * depth * SCALE * (0.5 + glow * 0.5);
      ctx.fillRect(spx2 - 0.5, spy - sr, 1, sr * 2);
      ctx.fillRect(spx2 - sr, spy - 0.5, sr * 2, 1);
      ctx.fillStyle = '#fff';
      ctx.fillRect(spx2 - 0.5, spy - 0.5, 1, 1);
    }
    ctx.globalAlpha = 1;
  }

  // Reset filter after dead greyscale or epic hue-rotate
  if (!w.alive || isEpic) ctx.filter = 'none';

  // Death scars overlay
  if (w.deathCount > 0 && w.alive) {
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    for (var s = 0; s < Math.min(w.deathCount, 3); s++) {
      var scX = x - size*0.15 + s * size*0.12;
      var scY = y - size*0.5 + s * size*0.08;
      ctx.beginPath();
      ctx.moveTo(scX, scY);
      ctx.lineTo(scX + size*0.12, scY + size*0.04);
      ctx.stroke();
      // stitch marks
      for (var st = 0; st < 3; st++) {
        var stx = scX + st * size*0.04;
        ctx.beginPath();
        ctx.moveTo(stx, scY - 2);
        ctx.lineTo(stx + 2, scY + 4);
        ctx.stroke();
      }
    }
  }

  // Attention speech bubble
  drawAttentionBubble(w, x, y, size, depth, t);

  // Name + rarity tag
  var tagY = y - size * 0.95;
  var rarity = w.stage === 0 ? w.eggRarity : w.combinedRarity;
  ctx.font = Math.round(5 * depth * SCALE + 2) + 'px "Press Start 2P"';
  ctx.textAlign = 'center';
  if (selected === w) {
    ctx.fillStyle = RARITY_COLORS[rarity];
    ctx.fillText(RARITY_LABELS[rarity], x, tagY - 10);
    ctx.fillStyle = '#f0d060';
  } else {
    ctx.fillStyle = 'rgba(240,208,96,0.5)';
  }
  ctx.fillText('#' + w.id, x, tagY);
  ctx.textAlign = 'left';

  // Selection ring
  if (selected === w) {
    var dash = Math.sin(t * 6) * 0.5 + 0.5;
    ctx.strokeStyle = RARITY_COLORS[rarity].replace(')', ',' + (0.5 + dash*0.5) + ')').replace('rgb','rgba');
    if (ctx.strokeStyle.indexOf('rgba') === -1) {
      ctx.strokeStyle = 'rgba(240,208,96,' + (0.5 + dash*0.5) + ')';
    }
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.lineDashOffset = t * 20;
    ctx.beginPath();
    ctx.ellipse(x, y - size * 0.35, size * 0.45, size * 0.55, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// --- CLICK ---
C.addEventListener('click', function(e) {
  var rect = C.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;

  // 0a. Wallet connect button on canvas
  if (window._walletBtnRect) {
    var wb = window._walletBtnRect;
    if (mx >= wb.x && mx <= wb.x + wb.w && my >= wb.y && my <= wb.y + wb.h) {
      connectWallet();
      return;
    }
  }

  // 0. Check door click — top center of room enters incubator
  var xFrac = mx / W;
  var yFrac0 = my / H;
  if (xFrac >= 0.35 && xFrac <= 0.50 && yFrac0 >= 0.05 && yFrac0 <= 0.35) {
    openIncubator();
    return;
  }

  // 1. Check poop click FIRST
  if (clickPoop(mx, my)) return;

  // 2. Check baseling click (current room only, skip eggs — they're in incubator)
  var clicked = null;
  var vis = roomBaselings(currentRoom);
  for (var i = vis.length - 1; i >= 0; i--) {
    var w = vis[i];
    var depth = getDepthScale(w);
    var sz = 60 * SCALE * depth;
    if (Math.abs(mx - w.x) < sz && my > w.y - sz*2 && my < w.y + 10) {
      clicked = w;
      break;
    }
  }
  if (clicked) {
    if (clicked.stage === 0 && selected === clicked) {
      // Clicking an already-selected egg = tap it
      doEggTap();
      return;
    }
    selected = clicked;
    updatePanel();
    buildFoodTray();
    if (document.getElementById('settings-panel').style.display === 'block') updateSettingsPanel();
    return;
  }

  // 3. Empty floor click — spawn/throw a ball
  var yFrac = my / H;
  if (yFrac >= FLOOR_ZONE.yMin && yFrac <= FLOOR_ZONE.yMax) {
    if (!ball) {
      spawnBall(mx, my);
      startChasingBall();
    }
    selected = null;
    document.getElementById('panel').style.display = 'none';
    return;
  }

  // 4. Deselect if clicking outside everything
  selected = null;
  document.getElementById('panel').style.display = 'none';
});

// --- EVOLUTION READINESS ---
function buildEvoSection(w) {
  if (w.stage === 0 || !w.alive) return '';
  var c = w.care;
  var tokenFeeds = c.tokenFeeds || {};
  var totalFeeds = 0;
  var feedList = [];
  for (var tid in tokenFeeds) {
    totalFeeds += tokenFeeds[tid].count;
    feedList.push({name:tid.toUpperCase(), count:tokenFeeds[tid].count, total:tokenFeeds[tid].total});
  }
  feedList.sort(function(a,b){ return b.count - a.count; });
  var avgHappy = c.happySamples > 0 ? Math.round(c.happySum / c.happySamples) : 100;
  var totalInteract = totalFeeds + c.petCount + c.playCount + c.ballCatches;

  // Dominant food type
  var dominant = feedList.length > 0 ? feedList[0] : null;
  var dominantStr = dominant && dominant.count > 0
    ? '<span class="fav">' + dominant.name + ' (' + dominant.count + ')</span>'
    : '<span class="warn">NONE</span>';

  // Care quality score (0-100) — deaths NOT penalized here (separate Reaper track)
  var careScore = getCareScore(w);
  var careColor = careScore >= 75 ? '#4ade80' : careScore >= 40 ? '#f59e0b' : '#ef4444';
  var careLabel = careScore >= 75 ? 'EXCELLENT' : careScore >= 50 ? 'GOOD' : careScore >= 25 ? 'POOR' : 'NEGLECTED';

  // Evolution window progress (baby stage only — player chooses when)
  var evoProgress = '';
  if (w.stage === 1) {
    var age = (Date.now() - w.birthTime) / 1000;
    var days = age / DAY;
    var currentWin = getEvoWindow(w);
    var nextWin = getNextWindow(w);
    var daysLabel = DEV_MODE ? Math.round(days) + 's' : Math.round(days) + 'd';

    evoProgress = '<div class="evo-stats" style="margin-top:4px;border-top:1px solid #222;padding-top:4px">';
    evoProgress += '<div class="evo-stat">AGE: <span class="val">' + daysLabel + '</span></div>';
    var cf = getCareForm(w);
    if (currentWin) {
      evoProgress += '<div class="evo-stat">CAN EVOLVE: <span style="color:' + currentWin.color + '">' + currentWin.label + '</span></div>';
      evoProgress += '<div class="evo-stat">FORM: <span style="color:' + cf.color + '">' + cf.form + '</span></div>';
    } else {
      evoProgress += '<div class="evo-stat"><span class="warn">NOT READY</span></div>';
      evoProgress += '<div class="evo-stat">FORM IF NOW: <span style="color:' + cf.color + '">' + cf.form + '</span></div>';
    }
    if (nextWin) {
      var daysNeeded = Math.max(0, nextWin.minDays - days);
      var feedsNeeded = Math.max(0, nextWin.minFeeds - w.feedCount);
      var daysStr = DEV_MODE ? Math.ceil(daysNeeded) + 's' : Math.ceil(daysNeeded) + 'd';
      evoProgress += '<div class="evo-stat">NEXT TIER: <span style="color:' + nextWin.color + '">' + nextWin.label + '</span></div>';
      evoProgress += '<div class="evo-stat">NEED: <span class="val">' + daysStr + ' + ' + feedsNeeded + ' feeds</span></div>';
    } else {
      evoProgress += '<div class="evo-stat"><span class="fav">MAX PATIENCE REACHED</span></div>';
    }
    // Show all tiers as a roadmap
    evoProgress += '</div><div class="evo-stats" style="margin-top:3px">';
    for (var wi = 0; wi < EVO_WINDOWS.length; wi++) {
      var ew = EVO_WINDOWS[wi];
      var unlocked = days >= ew.minDays && w.feedCount >= ew.minFeeds;
      var isCurrent = currentWin === ew;
      var marker = unlocked ? (isCurrent ? '>' : '\u2713') : '\u2022';
      var sty = unlocked ? 'color:' + ew.color : 'color:#444';
      evoProgress += '<div class="evo-stat"><span style="' + sty + '">' + marker + ' ' + ew.label + '</span></div>';
    }
    evoProgress += '</div>';
  } else if (w.stage > 1 && w.stage < 5) {
    evoProgress = '<div class="evo-stats" style="margin-top:4px"><div class="evo-stat"><span class="fav">BURN TO ASCEND FURTHER</span></div></div>';
  }

  // Reaper track — 100 deaths, must have fed at least once to activate
  var reaperActive = w.feedCount > 0;
  var reaperPct = Math.min(100, Math.round(w.deathCount / REAPER_DEATHS * 100));
  var reaperStr;
  if (w.deathCount >= REAPER_DEATHS) {
    reaperStr = '<span style="color:#ef4444">REAPER UNLOCKED</span>';
  } else if (!reaperActive) {
    reaperStr = '<span style="color:#444">INACTIVE — FEED ONCE TO ACTIVATE</span>';
  } else {
    reaperStr = '<span class="' + (w.deathCount > 0 ? 'warn' : 'val') + '">' + w.deathCount + '/' + REAPER_DEATHS + ' (' + reaperPct + '%)</span>';
  }

  // Egg birth data
  var birthStr = '';
  if (w.eggCare > 0 || w.eggLPFed > 0) {
    var eggTier = getEggCareTier(w.eggCare || 0);
    birthStr = '<div class="evo-stats" style="margin-bottom:4px">' +
      '<div class="evo-stat">EGG CARE: <span class="val">' + (w.eggCare||0) + ' taps [' + eggTier.label + ']</span></div>' +
      '<div class="evo-stat">EGG LP: <span class="lp-free">' + (w.eggLPFed||0).toFixed(2) + '</span></div>';
    if (w.birthTheme) birthStr += '<div class="evo-stat">THEME: <span style="color:'+w.birthTheme.color+'">' + w.birthTheme.label + '</span></div>';
    if (w.isGiant) birthStr += '<div class="evo-stat"><span style="color:#f0d060">GIANT</span></div>';
    if (w.eggUnlocks) {
      var unlockNames = [];
      if (w.eggUnlocks.primordialCore) unlockNames.push('PRIMORDIAL');
      else if (w.eggUnlocks.foundersEye) unlockNames.push('FOUNDER EYE');
      else if (w.eggUnlocks.cosmicShell) unlockNames.push('COSMIC SHELL');
      else if (w.eggUnlocks.innerGlow) unlockNames.push('INNER GLOW');
      else if (w.eggUnlocks.birthMark) unlockNames.push('BIRTH MARK');
      if (unlockNames.length) birthStr += '<div class="evo-stat">EXCLUSIVE: <span class="fav">' + unlockNames.join(', ') + '</span></div>';
    }
    birthStr += '</div>';
  }

  return '<div class="evo-section">' +
    '<div class="evo-title">EVOLUTION DATA <span style="color:'+careColor+'">['+careLabel+' '+careScore+'/100]</span></div>' +
    birthStr +
    '<div class="evo-stats">' +
      '<div class="evo-stat">DIET: ' + dominantStr + '</div>' +
      '<div class="evo-stat">PET: <span class="val">' + c.petCount + '</span></div>' +
      '<div class="evo-stat">PLAY: <span class="val">' + c.playCount + '</span></div>' +
      '<div class="evo-stat">FETCH: <span class="val">' + c.ballCatches + '</span></div>' +
      '<div class="evo-stat">AVG HAPPY: <span class="' + (avgHappy >= 50 ? 'val' : 'warn') + '">' + avgHappy + '%</span></div>' +
      '<div class="evo-stat">NEGLECTS: <span class="' + (c.neglectCount === 0 ? 'val' : 'warn') + '">' + c.neglectCount + '</span></div>' +
      '<div class="evo-stat">TOTAL: <span class="val">' + totalInteract + '</span></div>' +
      '<div class="evo-stat">REAPER: ' + reaperStr + '</div>' +
    '</div>' +
    evoProgress +
  '</div>';
}

// --- PANEL ---
function updatePanel() {
  var p = document.getElementById('panel');
  if (!selected) { p.style.display = 'none'; return; }
  var w = selected;
  p.style.display = 'block';

  var stageLabel = STAGES[w.stage].toUpperCase();
  if (w.deathCount > 0 && w.alive) stageLabel += ' (SCARRED x' + w.deathCount + ')';

  var rarity = w.stage === 0 ? w.eggRarity : w.combinedRarity;
  var rarityColor = RARITY_COLORS[rarity];
  var rarityLabel = RARITY_LABELS[rarity];
  var nameStr;
  if (w.stage === 0) {
    var eggColorNames = {TGN:'GREEN',BURGERS:'BROWN',AZUSD:'WHITE'};
    nameStr = w.sortedToken ? (eggColorNames[w.sortedToken]||'SORTED') + ' EGG' : 'MYSTERY EGG';
  } else {
    nameStr = w.charName;
  }

  var btnsHTML = '';
  if (w.stage === 0) {
    var taps = w.eggCare || 0;
    var cracked = taps >= 3;
    var eggLP = w.eggLPFed || 0;

    // Incubator tier data
    var incTiers = [
      {name:'NEW',      min:0,  next:3,   color:'#888',    bonus:0, desc:'Tap to crack the shell'},
      {name:'CRACKED',  min:3,  next:10,  color:'#fbbf24', bonus:0, desc:'Ready to hatch — or keep warming'},
      {name:'WARM',     min:10, next:25,  color:'#4ade80', bonus:1, desc:'+1 rarity tier at hatch'},
      {name:'NURTURED', min:25, next:50,  color:'#60a5fa', bonus:2, desc:'+2 rarity tiers at hatch'},
      {name:'DEVOTED',  min:50, next:100, color:'#f0d060', bonus:3, desc:'+3 rarity tiers at hatch'},
      {name:'OBSESSED', min:100,next:999, color:'#c084fc', bonus:4, desc:'MAX CARE — best possible odds'},
    ];
    var curTier = incTiers[0];
    for (var ti = incTiers.length-1; ti >= 0; ti--) { if (taps >= incTiers[ti].min) { curTier = incTiers[ti]; break; } }
    var nextTier = null;
    for (var ti2 = 0; ti2 < incTiers.length; ti2++) { if (incTiers[ti2].min > taps) { nextTier = incTiers[ti2]; break; } }
    var tierPct = nextTier ? Math.min(100, ((taps - curTier.min) / (nextTier.min - curTier.min)) * 100) : 100;

    // === INCUBATOR HEADER ===
    btnsHTML = '<div style="font-size:8px;color:#f0d060;margin-bottom:6px">INCUBATOR</div>';

    // Care tier + progress bar
    btnsHTML += '<div style="font-size:6px;color:#888;margin-bottom:2px">' +
      'WARMTH: <span style="color:' + curTier.color + '">' + curTier.name + '</span>' +
      ' <span style="color:#ddd">(' + taps + ' taps)</span></div>';
    btnsHTML += '<div style="background:#1a1a30;border:1px solid #333;border-radius:3px;height:8px;margin-bottom:4px;overflow:hidden">' +
      '<div style="width:' + tierPct + '%;height:100%;background:' + curTier.color + ';transition:width 0.3s"></div></div>';

    // What current tier does
    btnsHTML += '<div style="font-size:5px;color:' + curTier.color + ';margin-bottom:6px">' + curTier.desc + '</div>';

    // Next tier hint
    if (nextTier) {
      btnsHTML += '<div style="font-size:5px;color:#555;margin-bottom:6px">NEXT: <span style="color:' + nextTier.color + '">' +
        nextTier.name + '</span> at ' + nextTier.min + ' taps — ' + nextTier.desc + '</div>';
    }

    // Giant status
    if (w.isGiant) {
      btnsHTML += '<div style="font-size:6px;color:#f0d060;margin-bottom:4px">GIANT EGG — 2X SIZE GUARANTEED</div>';
    }

    // === INCUBATION TIMER ===
    var timeLeft = getIncubationTimeLeft(w);
    var ready = canHatch(w);
    var patience = getPatienceBonus(w);

    if (timeLeft > 0) {
      var mins = Math.ceil(timeLeft / 60000);
      var timeStr = mins >= 60 ? Math.floor(mins/60) + 'h ' + (mins%60) + 'm' : mins + 'm';
      btnsHTML += '<div style="font-size:6px;color:#fbbf24;margin-bottom:4px">INCUBATING... ' + timeStr + ' remaining</div>';
    } else if (cracked) {
      btnsHTML += '<div style="font-size:6px;color:#4ade80;margin-bottom:4px">READY TO HATCH!</div>';
    }

    // Patience bonus display
    btnsHTML += '<div style="font-size:5px;color:#666;margin-bottom:4px">PATIENCE: ' +
      '<span style="color:' + patience.color + '">' + patience.label +
      (patience.tier > 0 ? ' (+' + patience.tier + ' rarity)' : '') + '</span>' +
      ' — wait longer for better odds</div>';

    // Tap cooldown display
    var tapCoolLeft = Math.max(0, 60000 - (Date.now() - (w.lastEggTap || 0)));
    var tapReady = tapCoolLeft <= 0;

    // Tap + Hatch buttons
    btnsHTML += '<div class="btns">';
    if (tapReady) {
      btnsHTML += '<button class="btn btn-pet" onclick="doEggTap()">TAP EGG</button>';
    } else {
      var tapSecs = Math.ceil(tapCoolLeft / 1000);
      btnsHTML += '<button class="btn" style="opacity:0.4;cursor:default">TAP (' + tapSecs + 's)</button>';
    }
    if (ready) {
      btnsHTML += '<button class="btn btn-hatch" onclick="doHatch()">HATCH NOW</button>';
    }
    btnsHTML += '</div>';

    // Tips
    if (!cracked) {
      btnsHTML += '<div style="font-size:5px;color:#555;margin-top:4px">Tap 3 times to crack the shell. Keep tapping for better odds!</div>';
    } else if (!ready) {
      btnsHTML += '<div style="font-size:5px;color:#555;margin-top:4px">Keep tapping while you wait. Warmth + patience = rarer creature!</div>';
    } else {
      btnsHTML += '<div style="font-size:5px;color:#555;margin-top:4px">Hatch now or keep waiting — patience is rewarded up to 24 hours!</div>';
    }
  } else if (!w.alive) {
    var rezCost = getReviveCost(w);
    if (w.lp.staked + w.lp.locked <= 0) {
      // Need to feed at least once first — show a small WETH feed option
      btnsHTML = '<div class="feed-row"><span class="feed-token" style="color:#60a5fa">FEED TO REVIVE:</span>' +
        '<span class="feed-amt" style="background:#60a5fa22;color:#60a5fa;border-color:#60a5fa44" onclick="doFeed(\'weth\',0.01)">0.01</span>' +

  } else {

    var fedToday = getFedInLastDay(w);
    var feedLeft = Math.max(0, dailyCap - fedToday);
    var capColor = feedLeft > dailyCap * 0.5 ? '#4ade80' : feedLeft > 0 ? '#f59e0b' : '#ef4444';
    // Drag-drop feed info + quantity dial

    var feedHTML = '<div style="font-size:5px;color:#888;margin-bottom:3px">' +
      'DAILY: <span style="color:'+capColor+'">$' + feedLeft.toFixed(2) + ' / $' + dailyCap.toFixed(2) + ' left</span>' +
      (w.isGiant ? ' <span style="color:#f0d060">(GIANT: 2 feeds to reset)</span>' : '') +
      (favStr ? ' | FAV: ' + favStr : '') + '</div>' +
      '<div style="font-size:5px;color:#666;margin-bottom:3px">DRAG FOOD FROM TRAY BELOW \u2193 | $' + (feedQty * 0.01).toFixed(2) + ' WETH</div>' +

var foodImages = {}; // loaded food sprite Image objects
function loadFoodImages(callback) {
  var loaded = 0, total = FOOD_ITEMS.length, done = false;
  if (!total) { callback(); return; }
  function check() { if (!done && loaded >= total) { done = true; callback(); } }
  FOOD_ITEMS.forEach(function(item) {
    var img = new Image();
    img.onload = function() { foodImages[item.id] = img; loaded++; check(); };
    img.onerror = function() { loaded++; check(); };
    img.src = item.sprite;
  });
  // Safety: don't get stuck if images fail silently on file://
  setTimeout(function() { if (!done) { done = true; callback(); } }, 3000);
}

// --- FOOD → D&D STAT BOOSTS ---
// Keyed by token id (what doFeed receives). Multiplier applied to feedPower.
// Salad (tgn) → WIS + CON + CHA
// Rice (azusd)  → all 6 stats at 0.5x rate
// Burger (burgers) → triple CON boost
var FOOD_STAT_BOOSTS = {
  tgn:     {wis:1.0, con:1.0, cha:1.0},                                  // salad
  azusd:   {str:0.5, dex:0.5, con:0.5, int:0.5, wis:0.5, cha:0.5},      // rice
  burgers: {con:3.0},                                                     // burger
  mft:   {int:0.5, wis:0.5},                                              // mft snack (small brain food)
  char:  {cha:1.0},                                                        // charm = charisma
};
var STAT_NAMES = ['str','dex','con','int','wis','cha'];
var STAT_LABELS = {str:'STR',dex:'DEX',con:'CON',int:'INT',wis:'WIS',cha:'CHA'};
var STAT_COLORS = {str:'#ef4444',dex:'#22d3ee',con:'#f97316',int:'#a78bfa',wis:'#60a5fa',cha:'#f472b6'};
function defaultStats() { return {str:0, dex:0, con:0, int:0, wis:0, cha:0}; }
function ensureStats(w) { if (!w.stats) w.stats = defaultStats(); return w.stats; }

// Apply food stat boosts and return a summary string of gains
function applyFoodStatBoosts(w, foodId, feedPower) {
  var boosts = FOOD_STAT_BOOSTS[foodId];
  if (!boosts) return '';
  var s = ensureStats(w);
  var favBonus = isFavoriteFood(w, foodId) ? 1.5 : 1.0;
  var gains = [];
  for (var i = 0; i < STAT_NAMES.length; i++) {
    var stat = STAT_NAMES[i];
    if (boosts[stat]) {
      var gain = feedPower * boosts[stat] * favBonus;
      s[stat] += gain;
      gains.push(STAT_LABELS[stat] + '+' + gain.toFixed(1));
    }
  }
  // Track food-specific feed counts
  if (!w.care.saladFeeds) w.care.saladFeeds = 0;
  if (!w.care.riceFeeds) w.care.riceFeeds = 0;
  if (!w.care.burgerFeeds) w.care.burgerFeeds = 0;
  if (foodId === 'tgn') w.care.saladFeeds++;
  if (foodId === 'azusd') w.care.riceFeeds++;
  if (foodId === 'burgers') w.care.burgerFeeds++;
  return gains.length > 0 ? gains.join(' ') : '';
}

function adjGroceryQty(itemId, delta) {

function removeFromCart(itemId) {

async function checkoutCart() {
  try {
  var cartKeys = Object.keys(groceryCart).filter(function(k) { return groceryCart[k] > 0; });
  if (cartKeys.length === 0) { showMsg('CART IS EMPTY', '#ef4444'); return; }
  var room = rooms[currentRoom];
  if (!room) return;
  if (!room.cupboardItems) room.cupboardItems = {};
  if (!room.freezerItems) room.freezerItems = {};
  if (!room.walkinItems) room.walkinItems = {};

  // Calculate what we'd buy (check storage capacity) WITHOUT adding yet
  var totalCost = 0;
  var totalBought = 0;
  var receipt = [];
  var pending = [];
  for (var ci = 0; ci < cartKeys.length; ci++) {
    var cid = cartKeys[ci];
    var citem = null;
    for (var fi = 0; fi < FOOD_ITEMS.length; fi++) { if (FOOD_ITEMS[fi].id === cid) { citem = FOOD_ITEMS[fi]; break; } }
    if (!citem) continue;
    var want = groceryCart[cid];
    var canBuy = 0;
    var simCup = countItems(room.cupboardItems);
    var simFrz = countItems(room.freezerItems);
    for (var q = 0; q < want; q++) {
      if (simCup < (room.maxCupboard || CUPBOARD_LEVELS[0])) { simCup++; canBuy++; }
      else if (room.freezerLevel >= 0 && simFrz < (room.maxFreezer || 0)) { simFrz++; canBuy++; }
      else if (room.hasWalkin) { canBuy++; }
      else { break; }
    }
    if (canBuy > 0) {
      totalCost += citem.price * canBuy;
      totalBought += canBuy;
      receipt.push(canBuy + 'x ' + citem.name);
      pending.push({id:cid, qty:canBuy});
    }
  }
  if (totalBought === 0) { showMsg('STORAGE FULL!', '#ef4444'); return; }

  if (adminMode) {
    // Admin gets free groceries — skip payment
  } else {
    if (!walletAddr || !walletSigner) {
      showMsg('CONNECTING WALLET...', '#f0d060');
      await connectWallet();
      if (!walletAddr || !walletSigner) { showMsg('WALLET NOT CONNECTED', '#ef4444'); return; }
    }
    try {
      var wethAmount = totalCost / ETH_USD_PRICE;
      var wethCost = ethers.parseEther(wethAmount.toFixed(18));
      var weth = getContract(WETH_ADDR, WETH_ABI);
      var wethBal = await new ethers.Contract(WETH_ADDR, WETH_ABI, walletProvider).balanceOf(walletAddr);
      if (wethBal < wethCost) {
        var shortfall = wethCost - wethBal;
        var ethBal = await walletProvider.getBalance(walletAddr);
        if (ethBal < shortfall) {
          showMsg('NEED $' + totalCost.toFixed(2) + ' (' + wethAmount.toFixed(6) + ' WETH)', '#ef4444');
          return;
        }
        showMsg('WRAPPING ETH...', '#f0d060');
        var wrapTx = await weth.deposit({ value: shortfall });
        await wrapTx.wait();
      }
      showMsg('BUYING GROCERIES...', '#f0d060');
      var payTx = await weth.transfer(POWERPLANT_ADDR, wethCost);
      await payTx.wait();
      depositToPowerPlant(totalCost, 'eth');
    } catch(e) {
      console.error('checkout payment error:', e);
      showMsg('PAYMENT FAILED — ' + (e.reason || e.shortMessage || e.message || 'error').slice(0,60), '#ef4444');
      return;
    }
  }

  // Payment confirmed (or admin) — stock the shelves
  for (var pi = 0; pi < pending.length; pi++) {
    var pid = pending[pi].id;
    for (var pq = 0; pq < pending[pi].qty; pq++) {
      var cupCount = countItems(room.cupboardItems);
      var frzCount = countItems(room.freezerItems);
      if (cupCount < (room.maxCupboard || CUPBOARD_LEVELS[0])) {
        room.cupboardItems[pid] = (room.cupboardItems[pid] || 0) + 1;
      } else if (room.freezerLevel >= 0 && frzCount < (room.maxFreezer || 0)) {
        room.freezerItems[pid] = (room.freezerItems[pid] || 0) + 1;
      } else if (room.hasWalkin) {
        room.walkinItems[pid] = (room.walkinItems[pid] || 0) + 1;
      }
    }
  }

  showMsg('BOUGHT ' + receipt.join(', ') + (adminMode ? ' (ADMIN FREE)' : ' — $' + totalCost.toFixed(2)), '#4ade80');
  groceryCart = {};
  updateGroceryFloor();
  updateRoomInfo();
  buildFoodTray();
  saveGame();
  if (!adminMode) pollOnchainBalances();
  } catch(e2) {
    console.error('checkoutCart error:', e2);
    showMsg('CHECKOUT ERROR: ' + (e2.message || 'unknown').slice(0,50), '#ef4444');
  }
}
function getStorageSpace(room) {
  if (!room) return 0;
  var cupUsed = countItems(room.cupboardItems || {});
  var cupMax = room.maxCupboard || CUPBOARD_LEVELS[0];
  var frzUsed = countItems(room.freezerItems || {});
  var frzMax = room.maxFreezer || 0;
  var cupSpace = Math.max(0, cupMax - cupUsed);
  var frzSpace = room.freezerLevel >= 0 ? Math.max(0, frzMax - frzUsed) : 0;
  var wlkSpace = room.hasWalkin ? 99999 : 0;
  return cupSpace + frzSpace + wlkSpace;
}
async function buyFood(itemId, qty) {
  qty = qty || 1;
  var room = rooms[currentRoom];
  if (!room) return;
  if (!room.cupboardItems) room.cupboardItems = {};
  if (!room.freezerItems) room.freezerItems = {};
  if (!room.walkinItems) room.walkinItems = {};
  var item = null;
  for (var i = 0; i < FOOD_ITEMS.length; i++) { if (FOOD_ITEMS[i].id === itemId) { item = FOOD_ITEMS[i]; break; } }
  if (!item) return;
  var bought = 0;
  for (var q = 0; q < qty; q++) {
    // Fill cupboard first, then freezer, then walk-in
    var cupCount = countItems(room.cupboardItems);
    var frzCount = countItems(room.freezerItems);
    if (cupCount < (room.maxCupboard || CUPBOARD_LEVELS[0])) {
      room.cupboardItems[itemId] = (room.cupboardItems[itemId] || 0) + 1;
      bought++;
    } else if (room.freezerLevel >= 0 && frzCount < (room.maxFreezer || 0)) {
      room.freezerItems[itemId] = (room.freezerItems[itemId] || 0) + 1;
      bought++;
    } else if (room.hasWalkin) {
      room.walkinItems[itemId] = (room.walkinItems[itemId] || 0) + 1;
      bought++;
    } else {
      break; // all storage full
    }
  }
  if (bought === 0) { showMsg('STORAGE FULL! Upgrade cupboard, buy freezer, or walk-in.', '#ef4444'); return; }
  var cost = item.price * bought;
  // Onchain: approve WETH for Router, then call router.buyFood(family, wethAmount)
  if (walletAddr && walletSigner && ROUTER_ADDR) {
    try {
      var wethAmount = cost / ETH_USD_PRICE;
      var wethCost = ethers.parseEther(wethAmount.toFixed(18));
      var weth = getContract(WETH_ADDR, WETH_ABI);
      var allowed = await new ethers.Contract(WETH_ADDR, WETH_ABI, walletProvider).allowance(walletAddr, ROUTER_ADDR);
      if (allowed < wethCost) {
        showMsg('APPROVING WETH...', '#f0d060');
        var appTx = await weth.approve(ROUTER_ADDR, ethers.MaxUint256);
        await appTx.wait();
      }
      showMsg('BUYING FOOD ONCHAIN...', '#f0d060');
      var family = FOOD_FAMILY[item.token];
      if (family === undefined) family = 0;
      var router = getContract(ROUTER_ADDR, ROUTER_ABI);
      var buyTx = await router.buyFood(family, wethCost);
      await buyTx.wait();
      showMsg('ONCHAIN PURCHASE CONFIRMED!', '#4ade80');
    } catch(e) {
      console.error('buyFood onchain error:', e);
      showMsg('ONCHAIN FAILED — ' + (e.reason || e.message || 'unknown error'), '#ef4444');
      return;
    }
  }
  showMsg('BOUGHT ' + bought + 'x ' + item.name + '! $' + cost.toFixed(2), item.color);
  updateGroceryFloor();
  updateRoomInfo();
  buildFoodTray();
  saveGame();
  pollOnchainBalances();
}

var foodTrayHidden = false;

var dragFood = null;     // FOOD_ITEMS entry being dragged
var dragX = 0, dragY = 0;
var dragHover = null;    // baseling under cursor during drag
var feedQty = 1;         // how many items to feed per drag-drop (1-999, max $9.99)
function adjustFeedQty(delta) {

function getFoodCount(room, itemId) {
  if (!room) return 0;
  return (room.cupboardItems && room.cupboardItems[itemId] || 0) +
         (room.freezerItems && room.freezerItems[itemId] || 0) +
         (room.walkinItems && room.walkinItems[itemId] || 0);

function buildFoodTray() {
  var tray = document.getElementById('food-tray');
  var room = rooms[currentRoom];
  if (!room) { tray.innerHTML = ''; return; }
  var html = '';
  var hasAny = false;
  for (var i = 0; i < FOOD_ITEMS.length; i++) {

    var count = getFoodCount(room, item.id);
    if (count <= 0) continue;
    hasAny = true;
    var favCls = (selected && selected.stage > 0 && isFavoriteFood(selected, item.token)) ? ' is-fav' : '';
    html += '<div class="food-slot' + favCls + '" style="border-color:' + item.color + ';background:' + item.color + '15" ' +
      'data-food="' + item.id + '" data-idx="' + i + '">' +
      '<div class="food-icon"><img src="' + item.sprite + '" style="width:28px;height:28px;image-rendering:auto"></div>' +
      '<div class="food-name" style="color:' + item.color + '">' + item.name + ' x' + count + '</div>' +
    '</div>';
  }
  if (!hasAny) {
    html = '<div style="color:#555;font-size:6px;font-family:\'Press Start 2P\',monospace;padding:6px">CUPBOARD EMPTY — visit GROCERY</div>';
  }
  tray.innerHTML = html;
}

function findBaselingAt(mx, my) {
  var vis = roomBaselings(currentRoom);
  for (var i = vis.length - 1; i >= 0; i--) {
    var w = vis[i];
    var depth = typeof getDepthScale === 'function' ? getDepthScale(w) : 1;
    var sz = 60 * SCALE * depth;
    if (Math.abs(mx - w.x) < sz * 1.2 && my > w.y - sz * 2.2 && my < w.y + 15) {
      return w;
    }
  }
  return null;
}

// Drag start (mouse + touch)
function startDrag(foodId, clientX, clientY) {
  var item = null;
  for (var i = 0; i < FOOD_ITEMS.length; i++) { if (FOOD_ITEMS[i].id === foodId) { item = FOOD_ITEMS[i]; break; } }
  if (!item) return;
  dragFood = item;
  dragX = clientX;
  dragY = clientY;
  var ind = document.getElementById('drag-indicator');
  ind.style.display = 'block';
  var iconEl = ind.querySelector('.drag-icon');
  iconEl.innerHTML = '<img src="' + item.sprite + '" style="width:32px;height:32px;image-rendering:auto">';
  ind.querySelector('.drag-label').textContent = item.name + (feedQty > 1 ? ' x' + feedQty : '');
  ind.querySelector('.drag-label').style.color = item.color;
  ind.style.left = clientX + 'px';
  ind.style.top = clientY + 'px';
  document.body.style.cursor = 'grabbing';
}

function moveDrag(clientX, clientY) {
  if (!dragFood) return;
  dragX = clientX;
  dragY = clientY;
  var ind = document.getElementById('drag-indicator');
  ind.style.left = clientX + 'px';
  ind.style.top = clientY + 'px';
  // Check hover over baseling
  var rect = C.getBoundingClientRect();
  var mx = clientX - rect.left;
  var my = clientY - rect.top;
  dragHover = findBaselingAt(mx, my);
}

function consumeOneFood(room, itemId) {
  // Returns: 'cupboard', 'freezer', 'walkin', or null
  if (room.cupboardItems && (room.cupboardItems[itemId] || 0) > 0) {
    room.cupboardItems[itemId]--; return 'cupboard';
  } else if (room.freezerItems && (room.freezerItems[itemId] || 0) > 0) {
    room.freezerItems[itemId]--; return 'freezer';
  } else if (room.walkinItems && (room.walkinItems[itemId] || 0) > 0) {
    room.walkinItems[itemId]--; return 'walkin';
  }
  return null;
}
function endDrag(clientX, clientY) {
  if (!dragFood) return;
  var rect = C.getBoundingClientRect();
  var mx = clientX - rect.left;
  var my = clientY - rect.top;
  var target = findBaselingAt(mx, my);

  if (target) {
    var room = rooms[currentRoom];
    var itemId = dragFood.id;
    var tokenId = dragFood.token || 'weth';
    var qty = feedQty;
    var fed = 0, frozenCount = 0, walkinCount = 0;
    selected = target;

    for (var q = 0; q < qty; q++) {
      if (target.stage > 0 && target.hunger >= 95) break; // not hungry
      var source = consumeOneFood(room, itemId);
      if (!source) break; // out of stock
      var amount = dragFood.price || 0.01;
      if (target.stage === 0 && (target.eggCare || 0) >= 3) {
        doEggFeed(tokenId, amount);
      } else if (target.stage > 0) {
        doFeed(tokenId, amount);
      }
      fed++;
      if (source === 'freezer') frozenCount++;
      if (source === 'walkin') walkinCount++;
    }

    if (fed > 0) {
      // Apply frozen/walkin penalties (once, scaled by count)
      if (target.stage > 0) {
        var coldPen = isIceType(target) ? 0 : (frozenCount + walkinCount) * 5;
        var scarePen = walkinCount * 10;
        var totalPen = coldPen + scarePen;
        if (totalPen > 0) {
          target.happy = Math.max(0, target.happy - totalPen);
          var msg = walkinCount > 0 ? 'SCARY WALK-IN! -' + totalPen + ' HAPPY' :
            'BRRR! Cold food... -' + totalPen + ' HAPPY';
          showMsg(msg, '#60a5fa');
        }
      }
      if (fed < qty) showMsg('FED ' + fed + '/' + qty + ' — ran out or full!', '#f59e0b');
      buildFoodTray();
      updatePanel();
    } else {
      showMsg('NO ' + dragFood.name.toUpperCase() + ' LEFT! Visit GROCERY.', '#ef4444');
    }
  }

  // Cleanup
  dragFood = null;
  dragHover = null;
  document.getElementById('drag-indicator').style.display = 'none';
  document.body.style.cursor = '';
}

// Per-stage minimum meal size in USD (giants eat double)
var STAGE_MEAL = [0.01, 0.01, 0.05, 0.10, 0.25, 0]; // egg, baby, teen, adult, mega, dead
var GIANT_USD_THRESHOLD = 5.00; // $5 USD total deposited during egg phase to become giant
var BRANCH_USD_THRESHOLD = 1.00; // $1 of a single token unlocks that evolution branch

// === INCUBATION SYSTEM === // MfT SoBs
// First egg = 5 min, scales up with total hatched, caps at 24 hours
// Patience beyond minimum = better hatch odds
function getMinIncubationMs() {
  // First egg = instant (0), then scales up
  // 0, 5 min, 30 min, 2 hr, 6 hr, 12 hr, 24 hr (cap)
  var mins = [0, 5, 30, 120, 360, 720, 1440];
  var idx = Math.min(totalHatched, mins.length - 1);
  return mins[idx] * 60 * 1000;
}

// Patience bonus: how long egg sat beyond minimum incubation
// Returns 0-4 bonus rarity tiers based on total incubation time
function getPatienceBonus(w) {
  var ageMs = Date.now() - (w.birthTime || Date.now());
  var ageHours = ageMs / (1000 * 60 * 60);
  if (ageHours >= 24) return {tier:4, label:'PERFECT', color:'#c084fc'};
  if (ageHours >= 12) return {tier:3, label:'PATIENT', color:'#f0d060'};
  if (ageHours >= 4)  return {tier:2, label:'STEADY',  color:'#60a5fa'};
  if (ageHours >= 1)  return {tier:1, label:'RESTED',  color:'#4ade80'};
  return {tier:0, label:'FRESH', color:'#888'};
}

function canHatch(w) {
  if (!w || w.stage !== 0) return false;
  if ((w.eggCare || 0) < 3) return false;
  if (adminMode) return true;
  var ageMs = Date.now() - (w.birthTime || Date.now());
  return ageMs >= getMinIncubationMs();
}

function getIncubationTimeLeft(w) {
  var ageMs = Date.now() - (w.birthTime || Date.now());
  var remaining = getMinIncubationMs() - ageMs;
  return Math.max(0, remaining);
}

function getMinMeal(w) {
  return 0; // no minimum — any amount of food accepted
}

// Feed tier based on lifetime total fed (across all tokens)
var FEED_TIERS = [
  {min:0,    label:'SCRAPS',   color:'#888'},
  {min:0.5,  label:'FED',      color:'#4ade80'},
  {min:2.0,  label:'WELL-FED', color:'#60a5fa'},
  {min:10.0, label:'GORGED',   color:'#c084fc'},
  {min:50.0, label:'WHALE-FED',color:'#f0d060'},
];

function getFeedTier(w) {
  var total = w.care.totalFedValue || 0;
  var tier = FEED_TIERS[0];
  for (var i = FEED_TIERS.length - 1; i >= 0; i--) {
    if (total >= FEED_TIERS[i].min) { tier = FEED_TIERS[i]; break; }
  }
  return tier;
}

// --- FEEDING LIMITS (33% of baseling value per day, giants need 2 feeds to reset timer) ---
function getDailyFeedCap(w) {
  var totalLP = w.lp.staked + w.lp.locked;
  if (totalLP < 0.01) return 999; // new baseling with no LP — no cap yet
  return totalLP * 0.33;
}
function getFedInLastDay(w) {
  if (!w.feedAmounts) w.feedAmounts = [];
  var cutoff = Date.now() - (DAY * 1000);
  w.feedAmounts = w.feedAmounts.filter(function(e) { return e.t > cutoff; });
  var total = 0;
  for (var i = 0; i < w.feedAmounts.length; i++) total += w.feedAmounts[i].a;
  return total;
}
function getDailyFeedRemaining(w) {
  return Math.max(0, getDailyFeedCap(w) - getFedInLastDay(w));
}
function recordMeal(w, amount) {
  if (!w.feedAmounts) w.feedAmounts = [];
  w.feedAmounts.push({t: Date.now(), a: amount});
  // Giant timer: need 2 feeds since last timer reset to count as "fed"
  if (w.isGiant) {
    if (!w.giantFeedCount) w.giantFeedCount = 0;
    w.giantFeedCount++;
    if (w.giantFeedCount >= 2) {
      w.lastFed = Date.now();
      w.giantFeedCount = 0;
    }
  } else {
    w.lastFed = Date.now();
  }
}

async function doFeed(foodId, amount) {
  if (!selected || selected.stage === 0) return;
  // Dead baselings can be fed to fill vault for resurrection (no meal limits)
  if (!selected.alive) {
    amount = parseFloat(amount);
    if (!amount || amount < 0.01 || isNaN(amount)) return;
    var lpCreated = amount;
    var fee = lpCreated * DEPOSIT_FEE;
    var staked = lpCreated - fee;
    selected.lp.staked += staked;
    selected.lp.locked += fee;
    selected.lp.totalDeposited += lpCreated;
    showMsg('VAULT FILLED +$' + amount.toFixed(2) + ' — NOW RESURRECT!', '#fca5a5');
    updatePanel();
    saveGame();
    return;
  }
  // Daily feed cap: max 33% of baseling's total value per day
  amount = parseFloat(amount);
  if (!amount || amount <= 0 || isNaN(amount)) return;
  if (selected.hunger >= 95) { showMsg("I'M FULL!", '#f59e0b'); return; }

  var food = null;
  for (var i = 0; i < FOODS.length; i++) { if (FOODS[i].id === foodId) { food = FOODS[i]; break; } }
  if (!food) return;

  // Token → swapped to MfT/TGN LP → staked in vault
  var lpCreated = amount; // 1:1 for prototype (in prod: DEX route)
  var fee = lpCreated * DEPOSIT_FEE;
  var staked = lpCreated - fee;
  selected.lp.staked += staked;
  selected.lp.locked += fee;
  selected.lp.totalDeposited += lpCreated;

  // Stats scale with amount — favorite food (branch-matched) gets 1.5x
  var feedPower = Math.min(1, amount / 0.1); // 0.1 = full meal
  var favBonus = isFavoriteFood(selected, foodId) ? 1.5 : 1.0;
  selected.hunger = Math.min(100, selected.hunger + (20 + feedPower * 30) * food.hungerMult * favBonus);
  selected.hungerAtFeed = selected.hunger;
  selected.happy = Math.min(100, selected.happy + (5 + feedPower * 15) * food.happyMult * favBonus);

  // POOP from deposit: 1 POOP per $0.01 deposited — queued, not instant
  // Released on next 4hr keeper cycle (distributeBatch)
  if (!selected.poopPending) selected.poopPending = 0;
  selected.poopPending += amount * 100; // full food value in pennies = POOP
  // Digest bar fills — visual eat→poop cycle
  selected.poopMeter = Math.min(100, selected.poopMeter + (10 + feedPower * 30));

  // Track care
  selected.feedCount++;
  if (!selected.care.totalFedValue) selected.care.totalFedValue = 0;
  selected.care.totalFedValue += amount;
  if (!selected.care.tokenFeeds) selected.care.tokenFeeds = {};
  if (!selected.care.tokenFeeds[foodId]) selected.care.tokenFeeds[foodId] = {count:0, total:0};
  selected.care.tokenFeeds[foodId].count++;
  selected.care.tokenFeeds[foodId].total += amount;
  // Keep old care fields working
  if (foodId === 'weth') selected.care.wethFeeds++;
  // Apply D&D stat boosts based on food type
  var statGains = applyFoodStatBoosts(selected, foodId, feedPower);
  recordMeal(selected, amount);
  var isFav = isFavoriteFood(selected, foodId);
  // Favorite food = big bounce + hearts explosion
  if (isFav) {
    selected.bounceY = -18;
    selected.favBounceCount = 3; // bounce 3 times
  } else {
    selected.bounceY = amount >= 0.1 ? -14 : -8;
  }
  selected.state = 'idle'; selected.stateTimer = 80;
  checkLevelUp(selected);

  // Particles: favorites get hearts shower, normal gets scaled particles
  if (isFav) {
    spawnParticles(selected.x, selected.y - 50, 'heart', 6);
    spawnParticles(selected.x - 20, selected.y - 60, 'heart', 4);
    spawnParticles(selected.x + 20, selected.y - 40, 'star', 3);
  } else {
    var particleCount = amount >= 0.5 ? 6 : amount >= 0.1 ? 3 : 1;
    spawnParticles(selected.x, selected.y - 50, 'heart', particleCount);
    if (amount >= 0.1) spawnParticles(selected.x, selected.y - 40, 'heart', 2);
  }

  // Restock room cupboard from feeding
  restockCupboard(amount * 10); // each $0.10 feed = +1 food unit

  // On-chain: call PlayerPantry.feedBaseling(tokenId, lpToken, amount, toFreezer)
  // POOP is minted by the NFT contract during depositAndFeed from LP fee growth
  var poopMinted = Math.floor(amount * 100); // display only — actual mint via distributeBatch
  if (walletAddr && walletSigner && PANTRY_ADDR && selected.tokenId && FOOD_LP_ADDR[food.token]) {
    try {
      var lpAddr = FOOD_LP_ADDR[food.token];
      var weiAmt = ethers.parseEther(amount.toFixed(18));
      // Approve LP token for Pantry if needed
      var lp = new ethers.Contract(lpAddr, WETH_ABI, walletProvider);
      var allowed = await lp.allowance(walletAddr, PANTRY_ADDR);
      if (allowed < weiAmt) {
        showMsg('APPROVING LP...', '#f0d060');
        var lpSigned = getContract(lpAddr, WETH_ABI);
        var appTx = await lpSigned.approve(PANTRY_ADDR, ethers.MaxUint256);
        await appTx.wait();
      }
      showMsg('FEEDING ONCHAIN...', '#f0d060');
      var pantry = getContract(PANTRY_ADDR, PANTRY_ABI);
      var feedTx = await pantry.feedBaseling(selected.tokenId, lpAddr, weiAmt, false);
      await feedTx.wait();
    } catch(e) {
      console.error('feedBaseling onchain error:', e);
      showMsg('ONCHAIN FEED FAILED — ' + (e.reason || e.message || 'error'), '#ef4444');
    }
  }

  var favLabel = isFavoriteFood(selected, foodId) ? ' FAVORITE! 1.5x' : '';
  var msg = (amount >= 0.5 ? 'WHALE ' : amount >= 0.1 ? 'BIG ' : '') +
    food.name + '! $' + amount.toFixed(2) + ' → LP' + favLabel +
    (poopMinted > 0 ? ' | +' + poopMinted + ' POOP' : '') +
    (statGains ? ' | ' + statGains : '');
  showMsg(msg, food.color);
  updatePanel();
  if (document.getElementById('settings-panel').style.display === 'block') updateSettingsPanel();
  saveGame();
}

// Determine birth theme from dominant egg token
function getBirthTheme(w) {
  var feeds = w.eggTokenFeeds || {};
  var best = null, bestAmt = 0, total = 0, count = 0;
  for (var id in feeds) {
    total += feeds[id];
    count++;
    if (feeds[id] > bestAmt) { bestAmt = feeds[id]; best = id; }
  }
  // If no clear dominant (best < 40% of total) and fed 3+ tokens = Prismatic
  if (count >= 3 && bestAmt / total < 0.4) return {theme:'prismatic', color:'#fff', label:'PRISMATIC'};
  if (!best) return null;
  var themes = {
    weth:   {theme:'arcane',    color:'#60a5fa', label:'ARCANE'},
    btc:    {theme:'fortress',  color:'#f7931a', label:'FORTRESS'},
    usdc:   {theme:'digital',   color:'#ddd',    label:'DIGITAL'},
    mft:    {theme:'nexus',     color:'#4ade80', label:'NEXUS'},
    char:   {theme:'lucky',     color:'#a855f7', label:'LUCKY'},
    tgn:    {theme:'mangrove',  color:'#2dd4bf', label:'MANGROVE'},
    azusd:  {theme:'bedrock',   color:'#94a3b8', label:'BEDROCK'},
    burgers:{theme:'hearth',    color:'#f97316', label:'HEARTH'},
  };
  return themes[best] || null;
}

// Get egg care tier for hatch trait odds
function getEggCareTier(taps) {
  // Care taps add bonus levels (0-4) on top of egg rarity
  if (taps >= 100) return {label:'OBSESSED', bonus:4};
  if (taps >= 50)  return {label:'DEVOTED',  bonus:3};
  if (taps >= 25)  return {label:'NURTURED', bonus:2};
  if (taps >= 10)  return {label:'WARM',     bonus:1};
  return {label:'RUSH',    bonus:0};
}

async function doHatch() {
  if (!selected || selected.stage !== 0) return;
  if ((selected.eggCare || 0) < 3) { showMsg('TAP EGG 3 MORE TIMES', '#ef4444'); return; }
  // Check minimum incubation time
  if (!canHatch(selected)) {
    var left = getIncubationTimeLeft(selected);
    var mins = Math.ceil(left / 60000);
    var timeStr = mins >= 60 ? Math.floor(mins/60) + 'h ' + (mins%60) + 'm' : mins + 'm';
    showMsg('STILL INCUBATING... ' + timeStr + ' LEFT', '#fbbf24');
    return;
  }

  // Combine egg rarity + care taps + patience into effective level
  var tier = getEggCareTier(selected.eggCare || 0);
  var patience = getPatienceBonus(selected);
  var baseLv = eggRarityLevel(selected.eggRarity || 'common');
  var effectiveLv = Math.min(baseLv + tier.bonus + patience.tier, RARITY_ORDER.length - 1);
  var newRarity = RARITY_ORDER[effectiveLv];

  totalHatched++;

  // Roll traits using combined rarity + token color bias
  var dominantToken = null, bestTokenAmt = 0;
  var eggFeeds = selected.eggTokenFeeds || {};
  for (var tid in eggFeeds) { if (eggFeeds[tid] > bestTokenAmt) { bestTokenAmt = eggFeeds[tid]; dominantToken = tid; } }
  var colorBias = dominantToken ? (TOKEN_COLOR_BIAS[dominantToken] || null) : null;
  // Fixed character — all baselings are leaf
  selected.charId = 'leaf';
  selected.charName = 'Leaf';
  selected.charRarity = newRarity;
  selected.combinedRarity = newRarity;

  // Giant — either bought giant egg OR fed $5+ during egg phase
  if (!selected.isGiant) selected.isGiant = (selected.eggLPFed || 0) >= GIANT_USD_THRESHOLD;

  // 1% sparkle chance — rare golden shimmer trait, stacks with egg color tint
  if (!selected.sparkle) selected.sparkle = Math.random() < 0.01;

  // Birth theme from dominant token
  selected.birthTheme = getBirthTheme(selected);

  // Universal egg unlocks (total USD — giant + primordial both at $5)
  var eggUSD = selected.eggLPFed || 0;
  selected.eggUnlocks = {
    birthMark:      eggUSD >= 0.01,
    innerGlow:      eggUSD >= 0.10,
    cosmicShell:    eggUSD >= 0.50,
    primordialCore: eggUSD >= GIANT_USD_THRESHOLD,
  };

  // Per-token branch unlocks ($1+ of any single token)
  var eggFeeds = selected.eggTokenFeeds || {};
  selected.unlockedBranches = {};
  var branchNames = {weth:'ARCANE',btc:'FORTRESS',tgn:'MANGROVE',burgers:'HEARTH',azusd:'BEDROCK',mft:'NEXUS',char:'LUCKY',usdc:'DIGITAL'};
  for (var bid in branchNames) {
    if ((eggFeeds[bid] || 0) >= 1.0) selected.unlockedBranches[bid] = branchNames[bid];
  }

  selected.stage = 1;
  selected.birthTime = Date.now();
  selected.lastFed = Date.now();
  selected.hunger = 70; selected.happy = 50;
  selected.state = 'idle'; selected.stateTimer = 60;

  var rarityColor = RARITY_COLORS[selected.combinedRarity];
  var hatchName = selected.charName;
  var extras = [];
  if (selected.isGiant) extras.push('GIANT');
  if (selected.sparkle) extras.push('SPARKLE');
  if (selected.birthTheme) extras.push(selected.birthTheme.label);
  var branchCount = Object.keys(selected.unlockedBranches || {}).length;
  if (branchCount > 0) extras.push(branchCount + ' BRANCH' + (branchCount > 1 ? 'ES' : ''));
  var unlockCount = 0; for (var k in selected.eggUnlocks) { if (selected.eggUnlocks[k]) unlockCount++; }
  if (unlockCount > 0) extras.push(unlockCount + ' TRAIT' + (unlockCount > 1 ? 'S' : ''));

  spawnParticles(selected.x, selected.y - 40, 'star', 8 + (selected.isGiant ? 8 : 0));
  var extrasStr = extras.length ? ' (' + extras.join(' | ') + ')' : '';
  showMsg('* ' + hatchName.toUpperCase() + ' HATCHED! [' + RARITY_LABELS[selected.combinedRarity] + ']' + extrasStr + ' *', rarityColor);
  // Onchain hatch call (fire-and-forget — local game state already updated)
  if (walletSigner && BASELING_ADDR && selected.tokenId) {
    try { var nft = getContract(BASELING_ADDR, BASELING_ABI); nft.hatch(selected.tokenId).catch(function(){}); } catch(e) {}
  }
  updatePanel();
  saveGame();
}

  {maxCare:101, form:'PERFECT',  color:'#c084fc', desc:'Flawless care, peak evolution'},
];

function getCareScore(w) {
  var c = w.care;
  var totalInteract = c.appleFeeds + c.meatFeeds + c.cakeFeeds + c.candyFeeds + c.wethFeeds + (c.saladFeeds||0) + (c.riceFeeds||0) + (c.burgerFeeds||0) + c.petCount + c.playCount + c.ballCatches;
  var avgHappy = c.happySamples > 0 ? c.happySum / c.happySamples : 100;
  return Math.min(100, Math.round(
    (avgHappy * 0.35) +
    (Math.min(totalInteract, 100) * 0.35) +
    (Math.max(0, 100 - c.neglectCount * 10) * 0.3)
  ));
}

function getCareForm(w) {
  var score = getCareScore(w);
  for (var i = 0; i < CARE_FORMS.length; i++) {
    if (score < CARE_FORMS[i].maxCare) return CARE_FORMS[i];
  }
  return CARE_FORMS[CARE_FORMS.length - 1];
}

function getEvoWindow(w) {
  if (w.stage !== 1 || !w.alive) return null;
  var age = (Date.now() - w.birthTime) / 1000;
  var days = age / DAY;
  // Time + feeds gate the tier (care determines form quality, not eligibility)
  var best = null;
  for (var i = EVO_WINDOWS.length - 1; i >= 0; i--) {
    var win = EVO_WINDOWS[i];
    if (days >= win.minDays && w.feedCount >= win.minFeeds) {
      best = win;
      break;
    }
  }
  return best;
}

function getNextWindow(w) {
  if (w.stage !== 1 || !w.alive) return null;
  var age = (Date.now() - w.birthTime) / 1000;
  var days = age / DAY;
  for (var i = 0; i < EVO_WINDOWS.length; i++) {
    var win = EVO_WINDOWS[i];
    if (days < win.minDays || w.feedCount < win.minFeeds) return win;
  }
  return null;
}

// CHAO RACE SYSTEM — Sonic Adventure 2 style auto-battler races
// Stats derived from LP values of tokens fed (WETH→SWIM, BTC→POWER, etc.)
// ═══════════════════════════════════════════════════════════════════════

// --- RACE STATS (derived from LP values of tokens fed) ---
function getRaceStats(w) {
  var c = w.care;
  var tf = c.tokenFeeds || {};
  function val(id) { return (tf[id] || {total:0}).total; }
  // sqrt(value * 1000) gives nice curve: $0.01→3, $0.10→10, $1→31, $5→70, $10→100
  function toStat(v) { return Math.min(100, Math.round(Math.sqrt(Math.max(0, v) * 1000))); }

  // Token → stat mapping (primary = full value, secondary = half)
  // WETH→SWIM, BTC→POWER, USDC/AZUSD→STAMINA, CHAR→LUCK, TGN→STAMINA+SPEED, BURGERS→POWER+STAMINA, MfT→all(small)
  var raw = {
    speed:   val('tgn') * 0.5 + val('mft') * 0.3,
    stamina: val('usdc') + val('azusd') + val('tgn') + val('burgers') * 0.5 + val('mft') * 0.3,
    power:   val('btc') + val('burgers') * 0.5 + val('mft') * 0.3,
    luck:    val('char') + val('mft') * 0.3,
    swim:    val('weth') + val('mft') * 0.3,
  };

  var stats = {
    speed: toStat(raw.speed),
    stamina: toStat(raw.stamina),
    power: toStat(raw.power),
    luck: toStat(raw.luck),
    swim: toStat(raw.swim),
  };

  // Stage cap (baby=0.5, teen=0.7, adult=0.85, legend/mega=1.0)
  var stageMult = [0, 0.5, 0.7, 0.85, 1.0, 0.3];
  var mult = stageMult[w.stage] || 0.5;

  // Care + feed tier multiplier: perfect+well-fed = 2x, poor+weak = 0.5x
  var careScore = getCareScore(w);
  var feedTier = getFeedTier(w);
  // Care: 0-25=0.5x, 25-50=0.75x, 50-75=1.0x, 75-100=1.5x
  var careMult = careScore >= 75 ? 1.5 : careScore >= 50 ? 1.0 : careScore >= 25 ? 0.75 : 0.5;
  // Feed tier: SCRAPS=0.5x, FED=0.75x, WELL-FED=1.0x, GORGED=1.25x, WHALE-FED=1.5x
  var feedMults = {'SCRAPS':0.5, 'FED':0.75, 'WELL-FED':1.0, 'GORGED':1.25, 'WHALE-FED':1.5};
  var feedMult = feedMults[feedTier.label] || 0.5;
  // Combined: perfect care(1.5) * whale-fed(1.5) = 2.25 → cap at 2x
  // poor care(0.5) * scraps(0.5) = 0.25 → floor at 0.5x
  var conditionMult = Math.max(0.5, Math.min(2.0, careMult * feedMult));

  var r = {_base:{}, _condMult:conditionMult, _careMult:careMult, _feedMult:feedMult, _stageMult:mult};
  var keys = ['speed','stamina','power','luck','swim'];
  for (var i = 0; i < keys.length; i++) {
    var base = Math.round(Math.max(1, stats[keys[i]] * mult));
    // Base 0-100 from LP * stage, then condition mult up to 2x — effective max 200
    r._base[keys[i]] = base;
    r[keys[i]] = Math.round(Math.max(1, base * conditionMult));
  }
  return r;
}

var NPC_NAMES = [
  'Wobble','Nubs','Crispy','Turbo','Dusty','Chunk','Zippy','Snoot',
  'Bloop','Gorp','Wiggles','Chomps','Stinky','Patches','Nugget',
  'Flops','Beans','Sprout','Pickle','Tater','Mochi','Pudge','Fizz',
];
var NPC_COLORS = ['#ef4444','#4ade80','#60a5fa','#c084fc','#f97316'];

function generateNPCs(playerStats, count) {
  var npcs = [];
  var keys = ['speed','stamina','power','luck','swim'];
  var avg = 0;
  for (var k = 0; k < keys.length; k++) avg += playerStats[keys[k]];
  avg /= keys.length;
  var usedNames = {};
  for (var i = 0; i < count; i++) {
    var scale = 0.6 + Math.random() * 0.8;
    var base = avg * scale;
    var name;
    do { name = NPC_NAMES[Math.floor(Math.random() * NPC_NAMES.length)]; } while (usedNames[name]);
    usedNames[name] = true;
    var st = {};
    for (var j = 0; j < keys.length; j++) {
      st[keys[j]] = Math.round(Math.max(1, Math.min(100, base + (Math.random() - 0.5) * 30)));
    }
    npcs.push({name:name, color:NPC_COLORS[i % NPC_COLORS.length], isPlayer:false, stats:st});
  }
  return npcs;
}
