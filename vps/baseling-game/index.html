// --- RACE ENGINE --- // MfT SoBs
var raceState = null;

function startRace(typeIndex) {
  if (!selected || !selected.alive || selected.stage === 0) return;
  var raceType = RACE_TYPES[typeIndex];
  var playerStats = getRaceStats(selected);
  var npcs = generateNPCs(playerStats, 4);
  var trackLen = 500;

  var racers = [{
    name: selected.charName || 'Your Baseling',
    color: '#f0d060', isPlayer: true, stats: playerStats,
    x: 0, speed: 0, finished: false, finishTime: 0, place: 0,
    bouncePhase: Math.random() * Math.PI * 2, stumbleTimer: 0,
  }];
  for (var i = 0; i < npcs.length; i++) {
    npcs[i].x = 0; npcs[i].speed = 0; npcs[i].finished = false;
    npcs[i].finishTime = 0; npcs[i].place = 0;
    npcs[i].bouncePhase = Math.random() * Math.PI * 2;
    npcs[i].stumbleTimer = 0;
    racers.push(npcs[i]);
  }

  raceState = {
    type: raceType, racers: racers,
    startTime: Date.now(), elapsed: 0,
    finishOrder: [], phase: 'countdown',
    countdownTimer: 3, trackLength: trackLen,
    events: [], lastTick: Date.now(), resultTimer: 0,
  };

  // Size race canvas
  var rc = document.getElementById('race-canvas');
  rc.width = window.innerWidth;
  rc.height = window.innerHeight;

  document.getElementById('panel').style.display = 'none';
  document.getElementById('race-modal').style.display = 'none';
  document.getElementById('race-overlay').style.display = 'block';
}

function tickRace() {
  if (!raceState) return;
  var now = Date.now();
  var dt = (now - raceState.lastTick) / 1000;
  raceState.lastTick = now;
  if (dt > 0.1) dt = 0.1; // clamp

  if (raceState.phase === 'countdown') {
    raceState.countdownTimer -= dt;
    if (raceState.countdownTimer <= 0) {
      raceState.phase = 'racing';
      raceState.startTime = now;
    }
    return;
  }
  if (raceState.phase === 'results') {
    raceState.resultTimer += dt;
    return;
  }
  if (raceState.phase !== 'racing') return;

  raceState.elapsed = (now - raceState.startTime) / 1000;
  var type = raceState.type;
  var weights = type.weights;

  for (var i = 0; i < raceState.racers.length; i++) {
    var r = raceState.racers[i];
    if (r.finished) continue;

    // Weighted stat score
    var score = r.stats.speed * weights.speed + r.stats.stamina * weights.stamina +
                r.stats.power * weights.power + r.stats.luck * weights.luck +
                r.stats.swim * weights.swim;

    // RNG variance ±20%
    var rng = 0.8 + Math.random() * 0.4;

    // Obstacle: random stumbles (low stamina = more stumbles)
    if (type.id === 'obstacle' && r.stumbleTimer <= 0 && Math.random() < 0.015) {
      var stumbleChance = 1 - (r.stats.stamina / 130);
      if (Math.random() < stumbleChance) {
        r.stumbleTimer = 0.8;
        raceState.events.push({x:r.x, lane:i, text:'CRASH!', color:'#ef4444', life:1.0});
      }
    }

    // Treasure hunt: lucky finds
    if (type.id === 'treasure' && Math.random() < 0.008) {
      if (Math.random() < r.stats.luck / 120) {
        score *= 2;
        raceState.events.push({x:r.x, lane:i, text:'ITEM!', color:'#c084fc', life:1.0});
      }
    }

    // Stumble slows
    if (r.stumbleTimer > 0) {
      r.stumbleTimer -= dt;
      score *= 0.15;
    }

    // Marathon fatigue
    if (type.id === 'marathon') {
      var fatigue = Math.max(0.3, 1 - (raceState.elapsed / type.duration) * (1 - r.stats.stamina / 100));
      score *= fatigue;
    }

    // River: swim bonus / penalty
    if (type.id === 'river') {
      var swimFactor = 0.5 + (r.stats.swim / 100) * 0.8;
      score *= swimFactor;
    }

    // Move — floor at 0.5 so they never stand completely still
    score = Math.max(0.5, score);
    r.speed = (score / 60) * rng * dt * 60;
    r.x += r.speed;
    r.bouncePhase += dt * (4 + score * 0.06);

    // Finish?
    if (r.x >= raceState.trackLength) {
      r.finished = true;
      r.finishTime = raceState.elapsed;
      raceState.finishOrder.push(i);
      r.place = raceState.finishOrder.length;
    }
  }

  // All finished or timeout
  var allDone = raceState.finishOrder.length >= raceState.racers.length;
  var timeout = raceState.elapsed > raceState.type.duration + 5;
  if (allDone || timeout) {
    for (var j = 0; j < raceState.racers.length; j++) {
      var rr = raceState.racers[j];
      if (!rr.finished) {
        rr.finished = true; rr.finishTime = raceState.elapsed;
        raceState.finishOrder.push(j);
        rr.place = raceState.finishOrder.length;
      }
    }
    raceState.phase = 'results';
    raceState.resultTimer = 0;
    applyRaceRewards();
  }
}

function applyRaceRewards() {
  if (!selected || !raceState) return;
  var place = raceState.racers[0].place;

  // Racing = interaction (resets death timer)
  selected.lastFed = Date.now();
  selected.poopMeter = Math.min(100, selected.poopMeter + 15);
  selected.care.playCount++;

  // Happiness by placement
  var happyGain = place === 1 ? 25 : place === 2 ? 15 : place === 3 ? 10 : 5;
  selected.happy = Math.min(100, selected.happy + happyGain);

  // A little hunger cost
  selected.hunger = Math.max(0, selected.hunger - 5);

  // Track history
  if (!selected.raceHistory) selected.raceHistory = [];
  selected.raceHistory.push({type:raceState.type.id, place:place, time:Date.now()});
  if (!selected.raceWins) selected.raceWins = 0;
  if (!selected.racesRun) selected.racesRun = 0;
  selected.racesRun++;
  if (place === 1) selected.raceWins++;

  saveGame();
}

// --- RACE RENDERING ---
function drawRace() {
  if (!raceState) return;
  var cv = document.getElementById('race-canvas');
  var rc = cv.getContext('2d');
  var ow = cv.width, oh = cv.height;

  rc.clearRect(0, 0, ow, oh);
  rc.fillStyle = raceState.type.bgColor;
  rc.fillRect(0, 0, ow, oh);

  // Title
  rc.font = Math.round(16 * SCALE) + 'px "Press Start 2P"';
  rc.textAlign = 'center';
  rc.fillStyle = raceState.type.color;
  rc.fillText(raceState.type.name, ow / 2, 30 * SCALE);

  // Countdown
  if (raceState.phase === 'countdown') {
    var num = Math.ceil(raceState.countdownTimer);
    rc.font = Math.round(64 * SCALE) + 'px "Press Start 2P"';
    rc.fillStyle = '#f0d060';
    rc.textAlign = 'center';
    rc.fillText(num > 0 ? num.toString() : 'GO!', ow / 2, oh / 2);
    return;
  }

  // Track layout
  var trackTop = 60 * SCALE;
  var trackBot = oh - 60 * SCALE;
  var trackH = trackBot - trackTop;
  var laneH = trackH / raceState.racers.length;
  var trackL = 90 * SCALE;
  var trackR = ow - 30 * SCALE;
  var trackW = trackR - trackL;

  // Ground texture lines
  rc.strokeStyle = 'rgba(255,255,255,0.02)';
  rc.lineWidth = 1;
  for (var gl = 0; gl < 20; gl++) {
    var gy = trackTop + (trackH / 20) * gl;
    rc.beginPath(); rc.moveTo(trackL, gy); rc.lineTo(trackR, gy); rc.stroke();
  }

  // Draw lanes + racers
  for (var i = 0; i < raceState.racers.length; i++) {
    var laneY = trackTop + i * laneH;
    var r = raceState.racers[i];

    // Lane bg
    rc.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.08)';
    rc.fillRect(trackL, laneY, trackW, laneH);

    // Lane divider
    if (i < raceState.racers.length - 1) {
      rc.strokeStyle = 'rgba(255,255,255,0.06)';
      rc.setLineDash([4, 6]);
      rc.beginPath();
      rc.moveTo(trackL, laneY + laneH);
      rc.lineTo(trackR, laneY + laneH);
      rc.stroke();
      rc.setLineDash([]);
    }

    // Name label
    rc.font = Math.round(7 * SCALE) + 'px "Press Start 2P"';
    rc.textAlign = 'right';
    rc.fillStyle = r.isPlayer ? '#f0d060' : r.color;
    rc.fillText(r.name, trackL - 6 * SCALE, laneY + laneH / 2 + 3 * SCALE);

    // Racer position
    var progress = Math.min(1, r.x / raceState.trackLength);
    var dotX = trackL + progress * trackW;
    var dotY = laneY + laneH / 2;
    var bounce = Math.sin(r.bouncePhase) * 3 * SCALE;
    var sz = (r.isPlayer ? 12 : 9) * SCALE;

    // Shadow
    rc.fillStyle = 'rgba(0,0,0,0.25)';
    rc.beginPath();
    rc.ellipse(dotX, dotY + sz * 0.7, sz * 0.8, sz * 0.25, 0, 0, Math.PI * 2);
    rc.fill();

    // Body
    rc.fillStyle = r.isPlayer ? '#f0d060' : r.color;
    rc.beginPath();
    rc.arc(dotX, dotY + bounce, sz, 0, Math.PI * 2);
    rc.fill();

    // Highlight
    rc.fillStyle = 'rgba(255,255,255,0.25)';
    rc.beginPath();
    rc.arc(dotX - sz * 0.25, dotY + bounce - sz * 0.3, sz * 0.35, 0, Math.PI * 2);
    rc.fill();

    // Eyes
    var eyeS = sz * 0.18;
    var eyeOff = sz * 0.3;
    rc.fillStyle = '#111';
    rc.beginPath();
    rc.arc(dotX + eyeOff, dotY + bounce - eyeS, eyeS, 0, Math.PI * 2);
    rc.arc(dotX + eyeOff * 1.8, dotY + bounce - eyeS, eyeS, 0, Math.PI * 2);
    rc.fill();

    // Player glow ring
    if (r.isPlayer) {
      rc.strokeStyle = 'rgba(240,208,96,0.35)';
      rc.lineWidth = 2 * SCALE;
      rc.beginPath();
      rc.arc(dotX, dotY + bounce, sz + 3 * SCALE, 0, Math.PI * 2);
      rc.stroke();
    }

    // Stumble X
    if (r.stumbleTimer > 0) {
      rc.font = Math.round(10 * SCALE) + 'px "Press Start 2P"';
      rc.textAlign = 'center';
      rc.fillStyle = '#ef4444';
      rc.fillText('\u2716', dotX, dotY + bounce - sz - 4 * SCALE);
    }

    // Place badge if finished
    if (r.finished) {
      var placeColors = ['#f0d060','#c0c0c0','#cd7f32','#888','#666'];
      rc.font = Math.round(8 * SCALE) + 'px "Press Start 2P"';
      rc.textAlign = 'center';
      rc.fillStyle = placeColors[r.place - 1] || '#666';
      rc.fillText('#' + r.place, dotX, dotY + bounce - sz - 4 * SCALE);
    }
  }

  // Finish line
  rc.strokeStyle = raceState.type.color;
  rc.lineWidth = 3 * SCALE;
  rc.setLineDash([8, 4]);
  rc.beginPath();
  rc.moveTo(trackR, trackTop);
  rc.lineTo(trackR, trackBot);
  rc.stroke();
  rc.setLineDash([]);
  rc.font = Math.round(6 * SCALE) + 'px "Press Start 2P"';
  rc.textAlign = 'center';
  rc.fillStyle = raceState.type.color;
  rc.fillText('FINISH', trackR, trackTop - 6 * SCALE);

  // Float events
  for (var ei = raceState.events.length - 1; ei >= 0; ei--) {
    var ev = raceState.events[ei];
    ev.life -= 0.016;
    if (ev.life <= 0) { raceState.events.splice(ei, 1); continue; }
    rc.globalAlpha = Math.max(0, ev.life);
    rc.font = Math.round(8 * SCALE) + 'px "Press Start 2P"';
    rc.textAlign = 'center';
    rc.fillStyle = ev.color;
    var evX = trackL + (ev.x / raceState.trackLength) * trackW;
    var evY = trackTop + ev.lane * laneH + laneH / 2 - (1 - ev.life) * 30 * SCALE;
    rc.fillText(ev.text, evX, evY);
    rc.globalAlpha = 1;
  }

  // Timer
  rc.font = Math.round(8 * SCALE) + 'px "Press Start 2P"';
  rc.textAlign = 'right';
  rc.fillStyle = '#555';
  rc.fillText(raceState.elapsed.toFixed(1) + 's', ow - 12 * SCALE, 22 * SCALE);

  // Results overlay
  if (raceState.phase === 'results') {
    rc.fillStyle = 'rgba(0,0,0,' + Math.min(0.75, raceState.resultTimer * 2) + ')';
    rc.fillRect(0, 0, ow, oh);

    if (raceState.resultTimer > 0.3) {
      var playerPlace = raceState.racers[0].place;
      var placeText = ['1ST PLACE!','2ND PLACE!','3RD PLACE!','4TH PLACE','5TH PLACE'];
      var placeClr = ['#f0d060','#c0c0c0','#cd7f32','#888','#666'];

      rc.font = Math.round(18 * SCALE) + 'px "Press Start 2P"';
      rc.textAlign = 'center';
      rc.fillStyle = placeClr[playerPlace - 1] || '#888';
      rc.fillText(placeText[playerPlace - 1] || playerPlace + 'TH', ow / 2, oh / 2 - 50 * SCALE);

      // Leaderboard
      rc.font = Math.round(8 * SCALE) + 'px "Press Start 2P"';
      var sorted = raceState.racers.slice().sort(function(a, b) { return a.place - b.place; });
      for (var si = 0; si < sorted.length; si++) {
        var sr = sorted[si];
        var yy = oh / 2 - 20 * SCALE + si * 20 * SCALE;
        rc.fillStyle = sr.isPlayer ? '#f0d060' : '#777';
        var timeStr = sr.finishTime.toFixed(1) + 's';
        rc.fillText('#' + sr.place + '  ' + sr.name + '  ' + timeStr, ow / 2, yy);
      }

      // Reward line
      rc.font = Math.round(7 * SCALE) + 'px "Press Start 2P"';
      rc.fillStyle = '#4ade80';
      var rewY = oh / 2 + (sorted.length * 20 + 10) * SCALE;
      var happyGain = playerPlace === 1 ? 25 : playerPlace === 2 ? 15 : playerPlace === 3 ? 10 : 5;
      rc.fillText('+' + happyGain + ' HAPPY | DEATH TIMER RESET', ow / 2, rewY);

      // Close hint
      rc.font = Math.round(7 * SCALE) + 'px "Press Start 2P"';
      rc.fillStyle = '#444';
      rc.fillText('CLICK TO CLOSE', ow / 2, oh - 20 * SCALE);
    }
  }
}

function saveGame() {
  try {
    var data = {
      version: 1,
      totalPoop: totalPoop,
      totalHatched: totalHatched,
      incubatorLevel: incubatorLevel,
      nextId: nextId,
      savedAt: Date.now(),
      rooms: rooms.map(function(r) {
        return { id:r.id, name:r.name, capacity:r.capacity,
                 cupboardLevel:r.cupboardLevel, food:r.food, maxFood:r.maxFood,
                 cupboardItems:r.cupboardItems||{}, freezerItems:r.freezerItems||{},
                 walkinItems:r.walkinItems||{}, hasNanny:r.hasNanny||false,
                 freezerLevel:r.freezerLevel, maxFreezer:r.maxFreezer||0, maxCupboard:r.maxCupboard||CUPBOARD_LEVELS[r.cupboardLevel||0],
                 hasWalkin:r.hasWalkin||false, lastDecayCheck:r.lastDecayCheck||Date.now(),
                 lastNannyRun:r.lastNannyRun||0 };
      }),
      currentRoom: currentRoom,
      powerPlantWETH: powerPlantWETH,
      powerPlant: {eth:powerPlant.eth, btc:powerPlant.btc, stable:powerPlant.stable, poopBurned:powerPlant.poopBurned, totalDeposits:powerPlant.totalDeposits},
      gardenPools: gardenPools.map(function(p) { return {poopDeposited:p.poopDeposited,yieldAccum:p.yieldAccum,lastCheck:p.lastCheck,pair:p.pair}; }),
      cryoChamberLevel: cryoChamberLevel,
      purchasedBuildings: purchasedBuildings,
      baselings: baselings.map(function(w) {
        var obj = {};
        for (var i = 0; i < SAVE_FIELDS.length; i++) {
          var k = SAVE_FIELDS[i];
          if (w[k] !== undefined) {
            if (k === 'lp' || k === 'care' || k === 'stats' || k === 'garden') {
              obj[k] = JSON.parse(JSON.stringify(w[k]));
            } else {
              obj[k] = w[k];
            }
          }
        }
        return obj;
      })
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) { console.warn('Save failed:', e); }
}

function loadGame() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    var data = JSON.parse(raw);
    if (!data || !data.baselings || !data.baselings.length) return false;

    totalPoop = data.totalPoop || 0;
    totalHatched = data.totalHatched || 0;
    nextId = data.nextId || 1;
    incubatorLevel = data.incubatorLevel || 0;
    powerPlantWETH = data.powerPlantWETH || 0;
    if (data.powerPlant) {
      powerPlant.eth = data.powerPlant.eth || 0;
      powerPlant.btc = data.powerPlant.btc || 0;
      powerPlant.stable = data.powerPlant.stable || 0;
      powerPlant.poopBurned = data.powerPlant.poopBurned || 0;
      powerPlant.totalDeposits = data.powerPlant.totalDeposits || 0;
    } else {
      // Migrate: put all legacy WETH into ETH bucket
      powerPlant.eth = powerPlantWETH;
      powerPlant.totalDeposits = powerPlantWETH;
    }
    // Restore garden pools
    if (data.gardenPools && data.gardenPools.length) {
      for (var gi = 0; gi < data.gardenPools.length && gi < gardenPools.length; gi++) {
        var gp = data.gardenPools[gi];
        gardenPools[gi].poopDeposited = gp.poopDeposited || 0;
        gardenPools[gi].yieldAccum = gp.yieldAccum || 0;
        gardenPools[gi].lastCheck = gp.lastCheck || 0;
        if (gp.pair) gardenPools[gi].pair = gp.pair;
      }
    }
    // Restore cryo chamber level
    if (data.cryoChamberLevel !== undefined) cryoChamberLevel = data.cryoChamberLevel;
    // Restore purchased buildings
    if (data.purchasedBuildings) purchasedBuildings = data.purchasedBuildings;
    // Restore rooms
    if (data.rooms && data.rooms.length) {
      rooms = [];
      for (var ri = 0; ri < data.rooms.length; ri++) {
        var sr = data.rooms[ri];
        rooms.push({
          id: sr.id || ri,
          name: sr.name || ROOM_NAMES[ri] || ('Room ' + (ri+1)),
          capacity: sr.capacity || ROOM_CAPACITIES[ri] || 4,
          cupboardLevel: sr.cupboardLevel || 0,

          hasNanny: sr.hasNanny || false,
          lastNannyRun: sr.lastNannyRun || 0,
          lastDecayCheck: sr.lastDecayCheck || Date.now(),
        });
      }
      currentRoom = data.currentRoom || 0;
    } else {
      // Legacy save — create first room free
      rooms = [createRoom(0)];
      currentRoom = 0;
    }
    baselings = [];

    for (var i = 0; i < data.baselings.length; i++) {
      var saved = data.baselings[i];
      // Create a fresh baseling shell with all defaults
      var pos = randomFloorPos();
      var w = {

        sortedToken: saved.sortedToken || null,

        charName: 'Leaf',
        charRarity: saved.charRarity || 'common',
        combinedRarity: saved.combinedRarity || saved.charRarity || 'common',
        animFrame: 0, animTimer: 0,
        hunger: saved.hunger !== undefined ? saved.hunger : 100,
        happy: saved.happy !== undefined ? saved.happy : 100,
        poopMeter: saved.poopMeter || 0,
        poopCount: saved.poopCount || 0,
        poopAccum: saved.poopAccum || 0,
        feedCount: saved.feedCount || 0,
        alive: saved.alive !== undefined ? saved.alive : true,
        deathCount: saved.deathCount || 0,

        feedTimestamps: saved.feedTimestamps || [],

        giantFeedCount: saved.giantFeedCount || 0,

        },

      baselings.push(w);

    return true;
  } catch(e) {

    return false;

}

async function resetGame() {

  nextId = 1;

// --- MAIN LOOP ---
function render() {
  var t = Date.now() / 1000;
  frameCount++;
  ctx.clearRect(0, 0, W, H);

  // Background — zoomed out to show more room
  var bg = sprites['baseling-bg.webp'];
  if (bg) {
    var bgZoom = 0.82; // <1 = zoomed out, shows more of the image
    var imgRatio = bg.width / bg.height;
    var canvasRatio = W / H;
    var dw, dh, dx, dy;
    if (canvasRatio > imgRatio) {
      dw = W * bgZoom; dh = dw / imgRatio;
    } else {
      dh = H * bgZoom; dw = dh * imgRatio;
    }
    dx = (W - dw) / 2; dy = (H - dh) / 2;
    // Fill edges with floor color
    ctx.fillStyle = '#1a1210';
    ctx.fillRect(0, 0, W, H);
    ctx.drawImage(bg, dx, dy, dw, dh);
  } else {
    ctx.fillStyle = '#1a1210';
    ctx.fillRect(0, 0, W, H);
  }

  // Wallet connect button on home screen (canvas-drawn)
  if (!walletAddr) {
    var btnW = 180 * SCALE;
    var btnH = 28 * SCALE;
    var btnX = W / 2 - btnW / 2;
    var btnY = H - 60 * SCALE;
    var pulse = 0.85 + 0.15 * Math.sin(t * 3);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#1a1a3e';
    ctx.strokeStyle = '#60a5fa';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(btnX, btnY, btnW, btnH, 6);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#60a5fa';
    ctx.font = Math.round(9 * SCALE) + 'px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('CONNECT WALLET', W / 2, btnY + btnH / 2);
    ctx.restore();
    // Store hit area for click handling
    window._walletBtnRect = {x:btnX, y:btnY, w:btnW, h:btnH};
  } else {
    window._walletBtnRect = null;
  }

  // Draw door indicator — old school arrow pointing up to door
  var doorX = W * 0.425;
  var doorY = H * 0.08;
  var doorPulse = 0.5 + 0.3 * Math.sin(t * 2);
  ctx.save();
  ctx.globalAlpha = doorPulse;
  ctx.fillStyle = '#f0d060';
  ctx.font = '16px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('\u25B2', doorX, doorY + 16);
  ctx.font = '6px "Press Start 2P"';
  ctx.fillText('INCUBATOR', doorX, doorY + 28);
  ctx.restore();

  // Draw floor poops (under baselings)
  drawFloorPoops(t);

  // Get visible baselings (current room only)
  var visible = roomBaselings(currentRoom);
  visible.sort(function(a,b){ return a.y - b.y; });

  // Update AI for visible baselings
  for (var i = 0; i < visible.length; i++) {
    updateBaselingAI(visible[i]);
  }

  // Food decay — ONLY cupboard items spoil. Freezer + walk-in are safe.
  // ~2 weeks real time = 1 item decays, LP sent to power plant
  if (frameCount % 600 === 0) {
    for (var ri2 = 0; ri2 < rooms.length; ri2++) {
      var dr = rooms[ri2];
      if (!dr.cupboardItems || countItems(dr.cupboardItems) <= 0) continue;
      if (!dr.lastDecayCheck) dr.lastDecayCheck = Date.now();
      var decayElapsed = Date.now() - dr.lastDecayCheck;
      var decayInterval = DEV_MODE ? DAY * 2 : 14 * 24 * 60 * 60 * 1000;
      if (decayElapsed >= decayInterval) {
        dr.lastDecayCheck = Date.now();
        var keys = Object.keys(dr.cupboardItems);
        for (var dk = 0; dk < keys.length; dk++) {
          if (dr.cupboardItems[keys[dk]] > 0) {
            dr.cupboardItems[keys[dk]]--;
            depositToPowerPlant(0.01, 'eth'); // spoiled food LP → power plant
            break;
          }
        }
        if (ri2 === currentRoom) { updateRoomInfo(); buildFoodTray(); }
      }
    }
  }

  // Update AI for baselings in OTHER rooms too (hunger/death still ticks)
  for (var i = 0; i < baselings.length; i++) {
    if ((baselings[i].roomId || 0) !== currentRoom) {
      updateBaselingAI(baselings[i]);
    }
  }

  // Check Baseling interactions every 30 frames
  if (frameCount % 30 === 0) {
    checkBaselingInteractions();
  }

  // Draw visible baselings only
  for (var i = 0; i < visible.length; i++) {
    drawBaseling(visible[i], t);
  }

  // Draw particles (above baselings)
  updateParticles();
  drawParticles();

  // Draw ball
  updateBall();
  drawBall(t);

  // Live-update panel bars
  if (selected) {
    var hbar = document.querySelector('#panel .bar:nth-child(1) .bar-fill');
    var pbar = document.querySelector('#panel .bar:nth-child(2) .bar-fill');
    var dbar = document.querySelector('#panel .bar:nth-child(3) .bar-fill');
    if (hbar) {
      hbar.style.width = selected.hunger + '%';
      hbar.style.background = selected.hunger < 20 ? '#ef4444' : selected.hunger < 50 ? '#f59e0b' : '#4ade80';
    }
    if (pbar) pbar.style.width = selected.happy + '%';
    if (dbar) dbar.style.width = selected.poopMeter + '%';
  }

  // NPC walks
  tickCryoSci();
  tickGardenFarmer();

  // Race system
  if (raceState) {
    tickRace();
    drawRace();
  }

  requestAnimationFrame(render);
}

// --- MfT SPLASH SCREEN ---
function showSplash(callback) {
  var splash = document.createElement('div');
  splash.id = 'mft-splash';
  splash.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.5s';
  // Try logo image, fall back to text
  var logo = new Image();
  logo.onload = function() {
    logo.style.cssText = 'max-width:300px;max-height:200px;image-rendering:pixelated';
    splash.appendChild(logo);
    addTagline();
  };
  logo.onerror = function() {
    var txt = document.createElement('div');
    txt.style.cssText = 'font-family:"Press Start 2P",monospace;color:#f0d060;font-size:24px;text-shadow:0 0 20px rgba(240,208,96,0.4)';
    txt.textContent = 'MfT';
    splash.appendChild(txt);
    addTagline();
  };
  logo.src = 'sprites/mft-studio-logo.jpg';
  function addTagline() {
    var tag = document.createElement('div');
    tag.style.cssText = 'font-family:"Press Start 2P",monospace;color:#666;font-size:7px;margin-top:16px';
    tag.textContent = 'memefortrees.base.eth';
    splash.appendChild(tag);
  }
  document.body.appendChild(splash);
  setTimeout(function() {
    splash.style.opacity = '0';
    setTimeout(function() {
      splash.remove();
      callback();
    }, 500);
  }, 2000);
}

var tutorialsSeen = {};
var tutorialPage = 0;
var tutorialKey = null;

function loadTutorials() {
  try { var s = localStorage.getItem('BL_TUTORIALS_SEEN'); if (s) tutorialsSeen = JSON.parse(s); } catch(e) {}
}
function saveTutorials() {
  try { localStorage.setItem('BL_TUTORIALS_SEEN', JSON.stringify(tutorialsSeen)); } catch(e) {}
}

function showTutorial(key, force) {
  if (!TUTORIALS[key]) return;
  if (!force && tutorialsSeen[key]) return;
  tutorialKey = key;
  tutorialPage = 0;
  renderTutorialPage();
  document.getElementById('tutorial-overlay').classList.add('show');
}

function renderTutorialPage() {
  var tut = TUTORIALS[tutorialKey];
  if (!tut) return;
  var box = document.getElementById('tutorial-box');
  var total = tut.pages.length;
  var text = tut.pages[tutorialPage].replace(/\n/g, '<br>');
  var dots = '';
  for (var i = 0; i < total; i++) dots += (i === tutorialPage ? '&#9679; ' : '&#9675; ');
  var btnLabel = tutorialPage < total - 1 ? 'NEXT' : 'GOT IT';
  box.innerHTML = '<div class="tut-speaker">' + tut.speaker + '</div>' +
    '<div class="tut-text">' + text + '</div>' +
    '<div class="tut-dots">' + dots + '</div>' +
    '<button class="tut-btn" onclick="advanceTutorial()">' + btnLabel + '</button>';
}

function advanceTutorial() {
  var tut = TUTORIALS[tutorialKey];
  if (!tut) return;
  tutorialPage++;
  if (tutorialPage >= tut.pages.length) {
    closeTutorial();
  } else {
    renderTutorialPage();
  }
}

function closeTutorial() {
  document.getElementById('tutorial-overlay').classList.remove('show');
  if (tutorialKey) {
    tutorialsSeen[tutorialKey] = true;
    saveTutorials();
  }
  tutorialKey = null;
}

// Add ? help buttons to rooms when they open
function addHelpButton(containerId, tutKey) {
  var el = document.getElementById(containerId);
  if (!el || el.querySelector('.tut-help')) return;
  var btn = document.createElement('div');
  btn.className = 'tut-help';
  btn.textContent = '?';
  btn.onclick = function(e) { e.stopPropagation(); showTutorial(tutKey, true); };
  el.appendChild(btn);
}
