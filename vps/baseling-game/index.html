<script>
// ═══════════════════════════════════════════════════════════════
// BASELINGS — MfT SoBs — memefortrees.base.eth
// Tamagotchi meets DeFi on Base
// ═══════════════════════════════════════════════════════════════

// --- WALLET & CONTRACT CONFIG ---
var CHAIN_ID = 8453; // Base mainnet
var CHAIN_HEX = '0x2105';
var WETH_ADDR = '0x4200000000000000000000000000000000000006';

// Contract addresses — deployed on Base 2026-04-19
var POOP_ADDR = '0x126555aecBAC290b25644e4b7f29c016aE95f4dc';
var BASELING_ADDR = '0xFCb825491490284189C75fD330Fd08Df5E9217b9';
var PANTRY_ADDR = '0xb62E32a93e2027356271C083F794cFFDb0ac4aa6';
var POWERPLANT_ADDR = '0xffC11092419a1068334be90cEcAeFE873031c31d';
var ROUTER_ADDR = '0x24213d631C9bf90EEaEAdde8bFdd4591eb95faD7';

// ETH/USD price for converting grocery $ prices to WETH amounts
var ETH_USD_PRICE = 1800;

var walletAddr = null;
var walletProvider = null;
var walletSigner = null;

// Minimal ABIs for game interactions
var WETH_ABI = ['function approve(address,uint256) returns (bool)','function balanceOf(address) view returns (uint256)','function allowance(address,address) view returns (uint256)','function transfer(address,uint256) returns (bool)','function deposit() payable'];
var POOP_ABI = ['function balanceOf(address) view returns (uint256)','function totalSupply() view returns (uint256)','function mint(address,uint256)','function isMinter(address) view returns (bool)'];
var BASELING_ABI = [
  'function mintRandom() returns (uint256)','function mintSorted(uint8) returns (uint256)','function mintGiant() returns (uint256)',
  'function hatch(uint256)','function freeze(uint256)','function unfreeze(uint256)','function resurrect(uint256)',
  'function distributeBatch(uint256[])','function isDead(uint256) view returns (bool)',
  'function randomEggPrice() view returns (uint256)','function sortedEggPrice() view returns (uint256)','function giantEggPrice() view returns (uint256)',
  'function totalMinted() view returns (uint256)','function balanceOf(address) view returns (uint256)','function ownerOf(uint256) view returns (address)',
  'function baselings(uint256) view returns (uint8,uint8,bool,uint64,uint64,uint32,uint16)',
  'function pendingPoop(uint256,address) view returns (uint256)',
  'function totalVaultWETH(uint256) view returns (uint256)','function totalVaultLP(uint256) view returns (uint256)',
  'function getVaultPairs(uint256) view returns (address[])',
  'function powerPlantBalance() view returns (uint256)','function totalPoopMinted() view returns (uint256)','function totalPoopBurned() view returns (uint256)',
];
var PANTRY_ABI = [
  'function feedBaseling(uint256,address,uint256,bool)',
  'function cupboardAmount(address,address) view returns (uint256)',
  'function freezerAmount(address,address) view returns (uint256)',
  'function cupboardTime(address,address) view returns (uint64)',
  'function isSpoiled(address,address) view returns (bool)',
  'function timeUntilSpoil(address,address) view returns (uint256)',
];
var ROUTER_ABI = [
  'function buyFood(uint8,uint256)',
  'function buyFoodToFreezer(uint8,uint256)',
  'function convertSeed(uint256)',
  'function convertSeedBatch(uint256[])',
  'function familyLPPairs(uint256) view returns (address)',
  'function familyTokens(uint256) view returns (address)',
  'function v4Swapper() view returns (address)',
];
// Food token → family mapping for router calls
var FOOD_FAMILY = {tgn:0, burgers:1, azusd:2};
// Food token → LP pair address for pantry feedBaseling calls
var FOOD_LP_ADDR = {
  tgn:     '0xbd0cc3b0aaf91b80c862dbcaf39faa4705ee2d7a',
  burgers: '0xa2A61fD7816951A0bCf8C67eA8f153C1AB5De288',
  azusd:   '0xecc664757da0c71ba32dfed527580a26783b6697',
};

async function connectWallet() {
  try {
    // Use injected wallet (Rabby, MetaMask, etc.) — Farcaster SDK only inside frames
    var ethProviderObj = window.ethereum;
    if (!ethProviderObj && window.farcasterSDK) {
      try {
        ethProviderObj = await window.farcasterSDK.wallet.getEthereumProvider();
      } catch(fe) {}
    }

    if (!ethProviderObj) { showMsg('INSTALL RABBY OR METAMASK', '#ef4444'); return; }

    // Ask wallet for permission (triggers Rabby/MetaMask popup)
    await ethProviderObj.request({method: 'eth_requestAccounts'});

    var provider = new ethers.BrowserProvider(ethProviderObj);
    var network = await provider.getNetwork();
    if (Number(network.chainId) !== CHAIN_ID) {
      try { await ethProviderObj.request({method:'wallet_switchEthereumChain',params:[{chainId:CHAIN_HEX}]}); }
      catch(e) { showMsg('SWITCH TO BASE CHAIN', '#ef4444'); return; }
      provider = new ethers.BrowserProvider(ethProviderObj);
    }
    var signer = await provider.getSigner();
    walletAddr = await signer.getAddress();
    walletProvider = provider;
    walletSigner = signer;
    updateHUD();
    showMsg('CONNECTED: ' + walletAddr.slice(0,6) + '...' + walletAddr.slice(-4), '#4ade80');
    // Save address for auto-reconnect
    localStorage.setItem('baseling-wallet', walletAddr);
    // Fetch onchain balances immediately and restart poll interval
    pollOnchainBalances();
    if (typeof startPollInterval === 'function') startPollInterval();
  } catch(e) { showMsg('CONNECT FAILED: ' + e.message, '#ef4444'); }
}

function getContract(addr, abi) {
  if (!walletSigner) return null;
  return new ethers.Contract(addr, abi, walletSigner);
}

function getReadContract(addr, abi) {
  if (!walletProvider) return null;
  return new ethers.Contract(addr, abi, walletProvider);
}

async function getWETHBalance() {
  if (!walletAddr || !walletProvider) return 0;
  try {
    var c = new ethers.Contract(WETH_ADDR, WETH_ABI, walletProvider);
    var bal = await c.balanceOf(walletAddr);
    return parseFloat(ethers.formatEther(bal));
  } catch(e) { return 0; }
}

async function getPOOPBalance() {
  if (!walletAddr || !walletProvider || !POOP_ADDR) return 0;
  try {
    var c = new ethers.Contract(POOP_ADDR, POOP_ABI, walletProvider);
    var bal = await c.balanceOf(walletAddr);
    return parseFloat(ethers.formatEther(bal));
  } catch(e) { return 0; }
}

// Claim POOP from contract for a specific baseling
async function claimPoopForBaseling(tokenId) {
  if (!walletSigner || !BASELING_ADDR) { showMsg('CONNECT WALLET FIRST', '#ef4444'); return; }
  try {
    var nft = getContract(BASELING_ADDR, BASELING_ABI);
    showMsg('CLAIMING $POOP...', '#a855f7');
    var tx = await nft.distributeBatch([tokenId]);
    await tx.wait();
    showMsg('$POOP CLAIMED!', '#4ade80');
    pollOnchainBalances();
  } catch(e) {
    showMsg('CLAIM FAILED: ' + (e.reason || e.message).slice(0,40), '#ef4444');
  }
}

// Fetch pending POOP for a specific tokenId and update display
async function fetchPendingPoop(tokenId) {
  if (!walletProvider || !walletAddr || !BASELING_ADDR) return;
  try {
    var nft = getReadContract(BASELING_ADDR, BASELING_ABI);
    if (!nft) return;
    var pending = await nft.pendingPoop(tokenId, walletAddr);
    var amt = parseFloat(ethers.formatEther(pending));
    var el = document.getElementById('pending-poop-' + tokenId);
    if (el) el.textContent = 'PENDING: ' + amt.toFixed(4) + ' $POOP';
  } catch(e) {
    var el2 = document.getElementById('pending-poop-' + tokenId);
    if (el2) el2.textContent = 'PENDING: --';
  }
}

// Batch claim POOP for all baselings at once
async function claimAllPoop() {
  if (!walletSigner || !BASELING_ADDR) { showMsg('CONNECT WALLET FIRST', '#ef4444'); return; }
  var tokenIds = baselings.filter(function(b) { return b.tokenId && b.alive; }).map(function(b) { return b.tokenId; });
  if (tokenIds.length === 0) { showMsg('NO BASELINGS WITH TOKEN IDS', '#ef4444'); return; }
  try {
    var nft = getContract(BASELING_ADDR, BASELING_ABI);
    showMsg('CLAIMING $POOP FOR ' + tokenIds.length + ' BASELINGS...', '#a855f7');
    var tx = await nft.distributeBatch(tokenIds);
    await tx.wait();
    showMsg('$POOP CLAIMED FOR ALL!', '#4ade80');
    pollOnchainBalances();
  } catch(e) {
    showMsg('BATCH CLAIM FAILED: ' + (e.reason || e.message).slice(0,40), '#ef4444');
  }
}

// Auto-reconnect on page load
function autoReconnect() {
  var saved = localStorage.getItem('baseling-wallet');
  if (saved && window.ethereum) {
    connectWallet().then(function() { syncFromChain(); });
  }
}

// --- SYNC ON-CHAIN NFTS INTO LOCAL GAME ---
// Single syncFromChain — deduplicates, removes fakes, uses seeded PRNG for deterministic characters
async function syncFromChain() {
  if (!walletAddr || !walletProvider || !BASELING_ADDR) return;
  try {
    showMsg('SYNCING FROM CHAIN...', '#f0d060');
    var FAMILY_SORTED = {0:'TGN', 1:'BURGERS', 2:'AZUSD'};
    var nft = new ethers.Contract(BASELING_ADDR, BASELING_ABI, walletProvider);
    var total = Number(await nft.totalMinted());
    var found = 0;
    var ownedIds = [];
    for (var tid = 1; tid <= total; tid++) {
      try {
        var owner = await nft.ownerOf(tid);
        if (owner.toLowerCase() !== walletAddr.toLowerCase()) continue;
      } catch(e) { continue; }
      ownedIds.push(tid);
      // Skip if we already have this tokenId locally
      if (baselings.some(function(w) { return w.tokenId === tid; })) continue;
      // Fetch on-chain data
      var data = await nft.baselings(tid);
      var onState = Number(data[0]);
      var family = Number(data[1]);
      var giant = data[2];
      var birthTime = Number(data[3]) * 1000;
      var lastFed = Number(data[4]) * 1000;
      var feedCount = Number(data[5]);
      var deathCount = Number(data[6]);
      var sortedToken = FAMILY_SORTED[family] || null;
      // Deterministic egg roll from tokenId
      setSeed(tid * 2654435761);
      var w = createBaseling(sortedToken, giant);
      clearSeed();
      w.tokenId = tid;
      w.birthTime = birthTime;
      w.lastFed = lastFed || Date.now();
      w.feedCount = feedCount;
      w.deathCount = deathCount;
      if (onState === 0) {
        w.stage = 0; // egg
      } else if (onState >= 1) {
        // Already hatched — fixed character (leaf)
        w.charId = 'leaf';
        w.charName = 'Leaf';
        w.charRarity = 'common';
        w.combinedRarity = 'common';
        w.stage = 1;
        w.hunger = 70; w.happy = 50;
        totalHatched++;
        if (onState === 2) w.frozen = true;
        if (onState === 3) { w.alive = false; w.state = 'dead'; }
      }
      found++;
      showMsg('LOADED NFT #' + tid + ' FROM CHAIN!', '#4ade80');
    }
    // Remove baselings not backed by on-chain NFTs (fakes + transferred)
    var removed = 0;
    for (var ri = baselings.length - 1; ri >= 0; ri--) {
      var shouldRemove = !baselings[ri].tokenId || ownedIds.indexOf(baselings[ri].tokenId) === -1;
      if (shouldRemove) {
        if (selected === baselings[ri]) { selected = null; updatePanel(); }
        baselings.splice(ri, 1);
        removed++;
      }
    }
    if (found > 0 || removed > 0) {
      if (removed > 0) showMsg(removed + ' FAKE(S) REMOVED', '#f59e0b');
      updateRoomTabs();
      updateRoomInfo();
      saveGame();
    }
    if (found > 0) showMsg('IMPORTED ' + found + ' NFT' + (found !== 1 ? 'S' : '') + '!', '#4ade80');
    // Auto-convert any unconverted seeds (safe: tx reverts if swap fails, seed stays)
    if (walletSigner && ROUTER_ADDR && ownedIds.length > 0) {
      var nftRead = new ethers.Contract(BASELING_ADDR, ['function vaultSeeds(uint256) view returns (uint256)'], walletProvider);
      for (var si = 0; si < ownedIds.length; si++) {
        try {
          var seed = await nftRead.vaultSeeds(ownedIds[si]);
          if (seed > 0n) {
            showMsg('CONVERTING SEED #' + ownedIds[si] + '...', '#f0d060');
            var router = getContract(ROUTER_ADDR, ROUTER_ABI);
            var stx = await router.convertSeed(ownedIds[si]);
            await stx.wait();
            showMsg('SEED #' + ownedIds[si] + ' → LP!', '#4ade80');
          }
        } catch(e) { console.warn('seed convert #' + ownedIds[si] + ':', e.reason || e.message); }
      }
    }
  } catch(e) {
    console.error('syncFromChain error:', e);
    showMsg('CHAIN SYNC FAILED', '#ef4444');
  }
}

// --- ONCHAIN EGG MINTING ---
// type: 'random' | 'sorted' | 'giant' | 'giantSorted'
async function mintEggOnchain(type, family) {
  if (!walletSigner || !BASELING_ADDR) {
    showMsg('CONNECT WALLET FIRST', '#ef4444');
    return false;
  }
  try {
    var nft = getContract(BASELING_ADDR, BASELING_ABI);
    var weth = getContract(WETH_ADDR, WETH_ABI);
    var wethRead = new ethers.Contract(WETH_ADDR, WETH_ABI, walletProvider);

    // Giant sorted = mintSorted($1) + $9 premium to PowerPlant
    var isGiantSorted = (type === 'giantSorted');
    var mintType = isGiantSorted ? 'sorted' : type;

    // Get on-chain price for the mint call
    var price;
    if (mintType === 'giant') price = await nft.giantEggPrice();
    else if (mintType === 'sorted') price = await nft.sortedEggPrice();
    else price = await nft.randomEggPrice();

    // For giant sorted, also need the premium (giant price - sorted price)
    var premium = 0n;
    if (isGiantSorted) {
      var giantPrice = await nft.giantEggPrice();
      var sortedPrice = price;
      premium = giantPrice - sortedPrice;
    }

    // Balance check for ALL mint types — auto-wrap ETH→WETH if needed
    var totalNeeded = price + premium;
    var bal = await wethRead.balanceOf(walletAddr);
    if (bal < totalNeeded) {
      var shortfall = totalNeeded - bal;
      // Check if user has enough ETH to wrap
      var ethBal = await walletProvider.getBalance(walletAddr);
      if (ethBal < shortfall) {
        showMsg('NEED ' + ethers.formatEther(totalNeeded) + ' WETH (have ' + ethers.formatEther(bal).slice(0,8) + ')', '#ef4444');
        return false;
      }
      // Auto-wrap ETH → WETH
      showMsg('WRAPPING ETH → WETH...', '#f0d060');
      var wrapTx = await weth.deposit({ value: shortfall });
      await wrapTx.wait();
    }

    // Approve WETH for NFT contract (covers mint price)
    var allowed = await wethRead.allowance(walletAddr, BASELING_ADDR);
    if (allowed < price) {
      showMsg('APPROVING WETH...', '#f0d060');
      var approveTx = await weth.approve(BASELING_ADDR, ethers.MaxUint256);
      await approveTx.wait();
    }

    // Mint
    showMsg('MINTING EGG...', '#f0d060');
    var tx;
    if (mintType === 'giant') tx = await nft.mintGiant();
    else if (mintType === 'sorted') tx = await nft.mintSorted(family);
    else tx = await nft.mintRandom();
    var receipt = await tx.wait();

    // Parse tokenId from Transfer event
    var tokenId = null;
    for (var li = 0; li < receipt.logs.length; li++) {
      var log = receipt.logs[li];
      if (log.topics && log.topics.length === 4 && log.topics[0] === '0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef') {
        tokenId = parseInt(log.topics[3], 16);
        break;
      }
    }

    // Giant sorted: send premium WETH to PowerPlant
    if (isGiantSorted && premium > 0n) {
      showMsg('SENDING GIANT PREMIUM...', '#f0d060');
      var premTx = await weth.transfer(POWERPLANT_ADDR, premium);
      await premTx.wait();
    }

    showMsg('EGG MINTED ON BASE! #' + tokenId, '#4ade80');
    return tokenId || true;
  } catch(e) {
    console.error('mintEggOnchain error:', e);
    var msg = e.reason || e.shortMessage || e.message || 'unknown error';
    showMsg('MINT FAILED: ' + msg.slice(0,60), '#ef4444');
    return false;
  }
}

// Characters and Features are separate — any combo works.
// Proper shading: highlight, base, shadow per color.
// ============================================================
var SPR = 640;
var DRAW_SCALE = 20; // 640/32=20 — items stay in 32-space, hires draws native 640
function spx(s,x,y,c){s.fillStyle=c;s.fillRect(x,y,1,1);}
function srect(s,x,y,w,h,c){s.fillStyle=c;s.fillRect(x,y,w,h);}
// Rounded rect helper for SNES-style smooth shapes
function soval(s,cx,cy,rx,ry,c){
  s.fillStyle=c;
  for(var dy=-ry;dy<=ry;dy++){
    var w2=Math.round(rx*Math.sqrt(1-(dy*dy)/(ry*ry)));
    if(w2>0) s.fillRect(cx-w2,cy+dy,w2*2+1,1);
  }
}
// 2-pass outline for thicker lines at 64x64
function addOutline(canvas,color){
  var s=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
  var r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  var passes=w>=512?4:w>=256?3:2; // thicker outline at higher res
  for(var pass=0;pass<passes;pass++){
    var id=s.getImageData(0,0,w,h),d=id.data,pts=[];
    for(var yy=0;yy<h;yy++)for(var xx=0;xx<w;xx++){
      var i=(yy*w+xx)*4;if(d[i+3]>0)continue;
      if((xx>0&&d[((yy*w)+xx-1)*4+3]>0)||(xx<w-1&&d[((yy*w)+xx+1)*4+3]>0)||
         (yy>0&&d[(((yy-1)*w)+xx)*4+3]>0)||(yy<h-1&&d[(((yy+1)*w)+xx)*4+3]>0))
        pts.push([xx,yy]);
    }
    pts.forEach(function(p){var i=(p[1]*w+p[0])*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=255;});
    s.putImageData(id,0,0);
  }
}
// ===== SMOOTH RENDERING PRIMITIVES (Canvas2D native — use for hires sprites) ===== // MfT SoBs
// sell: smooth anti-aliased ellipse (canvas path, no pixel scanning)
function sell(s,cx,cy,rx,ry,c){s.fillStyle=c;s.beginPath();s.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);s.fill();}
// sgrad: 2-stop radial gradient ellipse (inner color → outer color)
function sgrad(s,cx,cy,rx,ry,cIn,cOut){var r=Math.max(rx,ry),g=s.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,cIn);g.addColorStop(1,cOut);s.fillStyle=g;s.beginPath();s.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);s.fill();}
// sgradm: multi-stop radial gradient ellipse (stops = [[pos,color],...])
function sgradm(s,cx,cy,rx,ry,stops){var r=Math.max(rx,ry),g=s.createRadialGradient(cx,cy,0,cx,cy,r);for(var i=0;i<stops.length;i++)g.addColorStop(stops[i][0],stops[i][1]);s.fillStyle=g;s.beginPath();s.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);s.fill();}
// slit: offset-origin radial gradient (directional lighting — lx,ly = light source)
function slit(s,cx,cy,rx,ry,lx,ly,cL,cM,cD){var r=Math.max(rx,ry)*1.2,g=s.createRadialGradient(lx,ly,0,cx,cy,r);g.addColorStop(0,cL);g.addColorStop(0.5,cM);g.addColorStop(1,cD);s.fillStyle=g;s.beginPath();s.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);s.fill();}
// ssoft: blurred ellipse (soft edges — blush, glow, ambient shadow)
function ssoft(s,cx,cy,rx,ry,c,blur){s.save();s.filter='blur('+(blur||4)+'px)';s.fillStyle=c;s.beginPath();s.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);s.fill();s.restore();}
// slgrad: linear gradient ellipse (angle in radians, 0=left→right)
function slgrad(s,cx,cy,rx,ry,angle,stops){var dx=Math.cos(angle)*Math.max(rx,ry),dy=Math.sin(angle)*Math.max(rx,ry),g=s.createLinearGradient(cx-dx,cy-dy,cx+dx,cy+dy);for(var i=0;i<stops.length;i++)g.addColorStop(stops[i][0],stops[i][1]);s.fillStyle=g;s.beginPath();s.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);s.fill();}
// sarc: smooth anti-aliased arc (mouths, eyebrows, smile curves)
function sarc(s,cx,cy,r,start,end,c,w){s.strokeStyle=c;s.lineWidth=w||2;s.lineCap='round';s.beginPath();s.arc(cx,cy,r,start,end);s.stroke();}
// sline: smooth line segment (whiskers, detail strokes)
function sline(s,x0,y0,x1,y1,c,w){s.strokeStyle=c;s.lineWidth=w||2;s.lineCap='round';s.beginPath();s.moveTo(x0,y0);s.lineTo(x1,y1);s.stroke();}
// sfuzz: seeded scatter dots inside ellipse edge (fur/surface texture, deterministic per seed)
function sfuzz(s,cx,cy,rx,ry,colors,count,seed){var rng=seed||12345;function next(){rng=(rng*16807)%2147483647;return rng/2147483647;}for(var i=0;i<count;i++){var a=next()*Math.PI*2,r2=0.82+next()*0.15;s.fillStyle=colors[Math.floor(next()*colors.length)];s.fillRect(Math.round(cx+Math.cos(a)*rx*r2),Math.round(cy+Math.sin(a)*ry*r2),1,1);}}
// sclip: execute draw function clipped to ellipse region (patterns on body parts)
function sclip(s,cx,cy,rx,ry,fn){s.save();s.beginPath();s.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);s.clip();fn(s);s.restore();}

// ===== PNG SPRITE LOADING SYSTEM ===== // MfT SoBs
// Maps character IDs to pre-made PNG sprite files (replaces procedural drawing)
var spriteImages={};
// Universal baby sprite — all stage 1 baselings look like this. Character sprites appear at stage 2+.
var SPRITE_MAP={
  'floof-cat':'sprites/wimmple-baby.webp',
  'bunny':'sprites/baby-bunny-white.png',
  'cat':'sprites/baby-cat-white.png',
  'groundhog':'sprites/baby-groundhog.png',
  'mouse':'sprites/baby-mouse.png',
  'redpanda':'sprites/baby-redpanda.png',
  'frog':'sprites/baby-frog-green.png',
  'beaver':'sprites/baby-beaver.png',
  'bear-brown':'sprites/baby-bear-brown.png',
  'oak':'sprites/baby-oak.png',
  'bull':'sprites/baby-bull.png',
  'monkey':'sprites/baby-monkey.png',
  'leaf':'sprites/baby-leaf.png'
};
// Remove background (auto-detects color from corners), find bounds, center in SPRxSPR
function processSprite(img){
  var tc=document.createElement('canvas');tc.width=img.width;tc.height=img.height;
  var ts=tc.getContext('2d');ts.drawImage(img,0,0);
  var id=ts.getImageData(0,0,tc.width,tc.height),d=id.data;
  var w=tc.width,h=tc.height;
  // Auto-detect BG color from corner pixels
  var corners=[[0,0],[w-1,0],[0,h-1],[w-1,h-1],[1,0],[w-2,0],[0,1],[w-1,1]];
  var bgR=0,bgG=0,bgB=0,cs=0;
  for(var ci=0;ci<corners.length;ci++){
    var pi2=(corners[ci][1]*w+corners[ci][0])*4;
    if(d[pi2+3]>128){bgR+=d[pi2];bgG+=d[pi2+1];bgB+=d[pi2+2];cs++;}
  }
  if(cs>0){bgR=bgR/cs;bgG=bgG/cs;bgB=bgB/cs;}
  // Tighter threshold for dark backgrounds (avoids eating dark-furred sprites)
  var bgBright=Math.sqrt(bgR*bgR+bgG*bgG+bgB*bgB);
  var colorDist=bgBright<30?25:bgBright<80?40:55;
  function isBgColor(idx){
    var dr=d[idx]-bgR,dg=d[idx+1]-bgG,db=d[idx+2]-bgB;
    return Math.sqrt(dr*dr+dg*dg+db*db)<colorDist;
  }
  // Flood-fill from edges
  var bg=new Uint8Array(w*h);
  var queue=[];
  for(var x=0;x<w;x++){
    if(isBgColor(x*4)){bg[x]=1;queue.push(x);}
    var bi=(h-1)*w+x;
    if(isBgColor(bi*4)){bg[bi]=1;queue.push(bi);}
  }
  for(var y=1;y<h-1;y++){
    var li=y*w;
    if(isBgColor(li*4)){bg[li]=1;queue.push(li);}
    var ri=y*w+w-1;
    if(isBgColor(ri*4)){bg[ri]=1;queue.push(ri);}
  }
  var qi=0;
  while(qi<queue.length){
    var pi=queue[qi++];
    var px=pi%w,py=(pi-px)/w;
    var nb=[[px-1,py],[px+1,py],[px,py-1],[px,py+1]];
    for(var n=0;n<4;n++){
      var nx=nb[n][0],ny=nb[n][1];
      if(nx<0||nx>=w||ny<0||ny>=h)continue;
      var ni=ny*w+nx;
      if(bg[ni])continue;
      if(isBgColor(ni*4)){bg[ni]=1;queue.push(ni);}
    }
  }
  // Remove BG pixels, feather edges
  for(var i=0;i<w*h;i++){
    if(bg[i]){d[i*4+3]=0;continue;}
    var ix=i%w,iy=(i-ix)/w;
    var nearBg=false;
    if(ix>0&&bg[i-1])nearBg=true;
    if(ix<w-1&&bg[i+1])nearBg=true;
    if(iy>0&&bg[i-w])nearBg=true;
    if(iy<h-1&&bg[i+w])nearBg=true;
    if(nearBg){
      // Feather: blend edge pixels toward transparent based on BG closeness
      var dr=d[i*4]-bgR,dg=d[i*4+1]-bgG,db=d[i*4+2]-bgB;
      var dist=Math.sqrt(dr*dr+dg*dg+db*db);
      if(dist<colorDist*1.5) d[i*4+3]=Math.round(Math.min(1,dist/colorDist)*d[i*4+3]);
    }
  }
  ts.putImageData(id,0,0);
  // Find bounding box of visible pixels
  id=ts.getImageData(0,0,tc.width,tc.height);d=id.data;
  var minX=w,minY=h,maxX=0,maxY=0;
  for(var y=0;y<h;y++)for(var x=0;x<w;x++){
    if(d[(y*w+x)*4+3]>10){
      if(x<minX)minX=x;if(x>maxX)maxX=x;
      if(y<minY)minY=y;if(y>maxY)maxY=y;
    }
  }
  // Center content in SPRxSPR with padding
  var c=document.createElement('canvas');c.width=SPR;c.height=SPR;
  var s=c.getContext('2d');s.imageSmoothingEnabled=false;
  var cw=maxX-minX+1,ch2=maxY-minY+1;
  var pad=30,avail=SPR-pad*2;
  var scale=Math.min(avail/cw,avail/ch2);
  if(scale>1.3)scale=1.3;
  var dw=Math.round(cw*scale),dh=Math.round(ch2*scale);
  var dx=Math.round((SPR-dw)/2),dy=Math.round((SPR-dh)/2);
  s.drawImage(tc,minX,minY,cw,ch2,dx,dy,dw,dh);
  return c;
}
// Load all PNG sprites, process backgrounds, cache as canvases
function loadSpriteImages(callback){
  var keys=Object.keys(SPRITE_MAP),loaded=0,total=keys.length;
  if(!total){callback();return;}
  keys.forEach(function(id){
    var img=new Image();
    img.onload=function(){
      try{spriteImages[id]=processSprite(img);}catch(e){console.warn('Sprite process failed:',id,e);}
      loaded++;
      document.getElementById('load-fill').style.width=Math.round(loaded/total*40)+'%';
      if(loaded===total)callback();
    };
    img.onerror=function(){
      console.warn('Sprite load failed:',SPRITE_MAP[id]);
      loaded++;
      if(loaded===total)callback();
    };
    img.src=SPRITE_MAP[id];
  });
}

// ===== SPRITE LAB — preview hats on characters =====
var spriteLabOpen = false;
var spriteLabCharIdx = 0;
var spriteLabHatIdx = 0;
function openSpriteLab() {
  spriteLabOpen = true;
  spriteLabCharIdx = 0;
  spriteLabHatIdx = 0;
  renderSpriteLab();
}
function closeSpriteLab() {
  spriteLabOpen = false;
  var el = document.getElementById('sprite-lab');
  if (el) el.style.display = 'none';
}
function labPrevChar() { spriteLabCharIdx = (spriteLabCharIdx - 1 + CHARACTERS.length) % CHARACTERS.length; renderSpriteLab(); }
function labNextChar() { spriteLabCharIdx = (spriteLabCharIdx + 1) % CHARACTERS.length; renderSpriteLab(); }
function labPrevHat()  { spriteLabHatIdx  = (spriteLabHatIdx - 1 + HATS.length + 1) % (HATS.length + 1); renderSpriteLab(); }
function labNextHat()  { spriteLabHatIdx  = (spriteLabHatIdx + 1) % (HATS.length + 1); renderSpriteLab(); }
function renderSpriteLab() {
  var el = document.getElementById('sprite-lab');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sprite-lab';
    document.body.appendChild(el);
  }
  el.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:"Press Start 2P",monospace';

  var ch = CHARACTERS[spriteLabCharIdx];
  var hat = spriteLabHatIdx > 0 ? HATS[spriteLabHatIdx - 1] : null;
  var hatName = hat ? hat.name : 'NONE';

  // Draw on canvas
  var cvs = document.createElement('canvas');
  cvs.width = 640; cvs.height = 640;
  var sc = cvs.getContext('2d');
  sc.imageSmoothingEnabled = false;

  // Draw character
  if (ch.draw) ch.draw(sc, 0, 'idle');

  // Draw hat at head anchor
  if (hat && ch.anchors && ch.anchors.head) {
    hat.draw(sc, ch.anchors.head[0], ch.anchors.head[1]);
  }

  // Render to display
  var html = '<div style="color:#f0d060;font-size:14px;margin-bottom:12px">SPRITE LAB</div>';
  html += '<div style="margin-bottom:8px;display:flex;align-items:center;gap:12px">';
  html += '<span onclick="labPrevChar()" style="cursor:pointer;color:#60a5fa;font-size:20px">&lt;</span>';
  html += '<span style="color:#e8d5b0;font-size:10px;min-width:140px;text-align:center">' + ch.name.toUpperCase() + '</span>';
  html += '<span onclick="labNextChar()" style="cursor:pointer;color:#60a5fa;font-size:20px">&gt;</span>';
  html += '</div>';
  html += '<div style="margin-bottom:12px;display:flex;align-items:center;gap:12px">';
  html += '<span onclick="labPrevHat()" style="cursor:pointer;color:#4ade80;font-size:20px">&lt;</span>';
  html += '<span style="color:#4ade80;font-size:10px;min-width:140px;text-align:center">' + hatName + '</span>';
  html += '<span onclick="labNextHat()" style="cursor:pointer;color:#4ade80;font-size:20px">&gt;</span>';
  html += '</div>';
  html += '<div id="sprite-lab-canvas" style="width:320px;height:320px;image-rendering:pixelated;border:2px solid #333;background:#111"></div>';
  html += '<div style="margin-top:12px;color:#888;font-size:7px">arrows to browse | click X to close</div>';
  html += '<div onclick="closeSpriteLab()" style="position:absolute;top:16px;right:24px;color:#ef4444;font-size:20px;cursor:pointer">X</div>';
  el.innerHTML = html;

  var canvasHolder = document.getElementById('sprite-lab-canvas');
  cvs.style.width = '100%';
  cvs.style.height = '100%';
  cvs.style.imageRendering = 'pixelated';
  canvasHolder.innerHTML = '';
  canvasHolder.appendChild(cvs);
}

function renderCharacter(ch,frame,state){
  var c=document.createElement('canvas');c.width=SPR;c.height=SPR;
  var s=c.getContext('2d');

  if(spriteImages[ch.id]){
    // PNG sprite — draw pre-loaded image (art is already finished quality)
    s.drawImage(spriteImages[ch.id],0,0);
    if(state==='back') coverFace(c,ch);
    else if(state==='side') profileFace(c,ch);
  } else {
    // Procedural fallback for characters without PNG sprites
    if(!ch.hires) s.scale(DRAW_SCALE,DRAW_SCALE);
    if(state==='back'){
      ch.draw(s,frame||0,'idle');
      s.setTransform(1,0,0,1,0,0);
      coverFace(c,ch);
    } else if(state==='side'){
      ch.draw(s,frame||0,'idle');
      s.setTransform(1,0,0,1,0,0);
      profileFace(c,ch);
    } else {
      ch.draw(s,frame||0,state||'idle');
      s.setTransform(1,0,0,1,0,0);
    }
    addOutline(c,ch.palette.outline||'#1a1a2e');
    addInnerShading(c);
  }
  return c;
}

// Back view: cover face features with surrounding head color
function coverFace(canvas,ch){
  var w=canvas.width,h=canvas.height;
  var s=canvas.getContext('2d');
  var id=s.getImageData(0,0,w,h),d=id.data;
  var fAnc=ch.anchors.face||[15,12];
  var sc=ch.hires?1:DRAW_SCALE; // hires anchors already in 64-space
  var cy=fAnc[1]*sc, cx=fAnc[0]*sc;
  var top=Math.max(0,cy-4*sc);
  var bot=Math.min(h,cy+6*sc);
  var left=Math.max(0,cx-8*sc);
  var right=Math.min(w,cx+8*sc);
  var srcY=Math.max(0,top-3*sc);
  for(var yy=top;yy<bot;yy++){
    for(var xx=left;xx<right;xx++){
      var di=(yy*w+xx)*4;
      if(d[di+3]<128)continue; // skip transparent
      var si=(srcY*w+xx)*4;
      if(d[si+3]<128)continue;
      // Blend heavily toward head color
      d[di]=Math.round(d[si]*0.9+d[di]*0.1);
      d[di+1]=Math.round(d[si+1]*0.9+d[di+1]*0.1);
      d[di+2]=Math.round(d[si+2]*0.9+d[di+2]*0.1);
    }
  }
  // Add subtle back-of-head shading (darker center stripe)
  var stripeLeft=cx-2*sc, stripeRight=cx+2*sc;
  for(var yy=top;yy<bot;yy++){
    for(var xx=stripeLeft;xx<stripeRight;xx++){
      if(xx<0||xx>=w)continue;
      var di=(yy*w+xx)*4;
      if(d[di+3]<128)continue;
      d[di]=Math.max(0,d[di]-8);
      d[di+1]=Math.max(0,d[di+1]-8);
      d[di+2]=Math.max(0,d[di+2]-8);
    }
  }
  s.putImageData(id,0,0);
}

// Side/profile view: dim the far-side eye, shift features slightly
function profileFace(canvas,ch){
  var w=canvas.width,h=canvas.height;
  var s=canvas.getContext('2d');
  var id=s.getImageData(0,0,w,h),d=id.data;
  var fAnc=ch.anchors.face||[15,12];
  var sc=ch.hires?1:DRAW_SCALE;
  var cy=fAnc[1]*sc, cx=fAnc[0]*sc;
  var top=Math.max(0,cy-4*sc);
  var bot=Math.min(h,cy+6*sc);
  var left=Math.max(0,cx-8*sc);
  var mid=cx;
  for(var yy=top;yy<bot;yy++){
    for(var xx=left;xx<mid;xx++){
      var di=(yy*w+xx)*4;
      if(d[di+3]<128)continue;
      // Darken the far side for depth
      d[di]=Math.max(0,d[di]-20);
      d[di+1]=Math.max(0,d[di+1]-20);
      d[di+2]=Math.max(0,d[di+2]-20);
    }
  }
  s.putImageData(id,0,0);
}
function renderEgg(def){

  var s=c.getContext('2d');
  s.scale(DRAW_SCALE,DRAW_SCALE);

  soval(s,15,15,9,12,def.shell);

// Detail enhancement at native 64x64 — adds subtle shading between color boundaries
function addInnerShading(canvas){
  var s=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
  var id=s.getImageData(0,0,w,h),d=id.data;
  // Find color boundaries inside the sprite and add subtle darkening
  for(var yy=1;yy<h-1;yy++)for(var xx=1;xx<w-1;xx++){
    var i=(yy*w+xx)*4;
    if(d[i+3]<128)continue; // skip transparent
    // Check if this pixel borders a different opaque color
    var neighbors=[[xx-1,yy],[xx+1,yy],[xx,yy-1],[xx,yy+1]];
    var hasDiffNeighbor=false;
    for(var n=0;n<4;n++){
      var ni=(neighbors[n][1]*w+neighbors[n][0])*4;
      if(d[ni+3]>128&&(Math.abs(d[i]-d[ni])>30||Math.abs(d[i+1]-d[ni+1])>30||Math.abs(d[i+2]-d[ni+2])>30)){
        hasDiffNeighbor=true;break;
      }
    }
    // Darken boundary pixels slightly for depth
    if(hasDiffNeighbor){
      d[i]=Math.max(0,d[i]-12);
      d[i+1]=Math.max(0,d[i+1]-12);
      d[i+2]=Math.max(0,d[i+2]-12);
    }
  }
  s.putImageData(id,0,0);
}

// ===== SEEDED RNG (for deterministic chain sync) ===== // MfT SoBs
var _seededRng = null;
function seededRandom() {
  if (_seededRng !== null) {
    _seededRng = (_seededRng * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (_seededRng >>> 0) / 0x100000000;
  }
  return Math.random();
}
function setSeed(seed) { _seededRng = seed | 0; }
function clearSeed() { _seededRng = null; }

// ===== TRAIT ROLLING ===== // MfT SoBs
function rollEgg(){
  var tw=0;EGG_DEFS.forEach(function(e){tw+=e.weight;});
  var roll=seededRandom()*tw,acc=0;
  for(var i=0;i<EGG_DEFS.length;i++){acc+=EGG_DEFS[i].weight;if(roll<acc)return EGG_DEFS[i];}
  return EGG_DEFS[0];
}
// Egg rarity level (0-4) drives trait odds automatically
function eggRarityLevel(r){return Math.max(0,RARITY_ORDER.indexOf(r));}
// sortedToken: null for random egg, 'TGN'/'BURGERS'/'AZUSD' for sorted egg
// careBonus: 0-4 from taps, patienceBonus: 0-4 from time — drive gated odds
function rollCharacter(eggRarity, sortedToken, careBonus, patienceBonus, eggColor){
  careBonus = careBonus || 0;
  patienceBonus = patienceBonus || 0;

  // Only roll characters that have actual PNG sprites
  var allSprite = CHARACTERS.filter(function(c){ return SPRITE_MAP[c.id]; });
  var ungated = allSprite.filter(function(c){ return !c.gate; });
  var gated = allSprite.filter(function(c){ return !!c.gate; });

  // Gated character chance — always possible, scales with care + patience
  // Base: 0.5% per gated char, +1% per care tier, +1% per patience tier
  // Max at OBSESSED+PERFECT: 0.5 + 4 + 4 = 8.5%, capped at 10%
  var gateChance = 0.5 + (careBonus * 1) + (patienceBonus * 1);
  if (gateChance > 10) gateChance = 10;

  var available;
  if (sortedToken) {
    // Sorted egg ($1): GUARANTEED family chars in pool + ungated
    var familyGated = gated.filter(function(c){ return c.gate === sortedToken; });
    available = ungated.concat(familyGated);
  } else {
    // Random egg: each gated char has individual chance to enter pool
    var luckyGated = [];
    for (var gi2 = 0; gi2 < gated.length; gi2++) {
      if (seededRandom() * 100 < gateChance) luckyGated.push(gated[gi2]);
    }
    available = ungated.concat(luckyGated);
  }

  // Rarity chart — sorted eggs get much better odds
  var lv = eggRarityLevel(eggRarity);
  var ch;
  if (sortedToken) {
    ch = {common:15, uncommon:25, rare:40, legendary:15, epic:5};
  } else {
    var epicChance2 = Math.pow(Math.max(0,lv-2),2)*2.5;
    var legChance = Math.pow(Math.max(0,lv-0.5),2)*1;
    var rareChance = 2+lv*lv*2;
    var uncomChance = 15+lv*3;
    var comChance = 100-epicChance2-legChance-rareChance-uncomChance;
    if(comChance<5){comChance=5;uncomChance=100-epicChance2-legChance-rareChance-5;}
    if(uncomChance<5)uncomChance=5;
    ch = {common:comChance,uncommon:uncomChance,rare:rareChance,legendary:legChance,epic:epicChance2};
  }

  var roll=seededRandom()*100, acc=0, pk='common';
  for(var r in ch){acc+=ch[r];if(roll<acc){pk=r;break;}}

  // Find pool from available chars at rolled rarity, fall back down tiers
  var pool = available.filter(function(c){return c.rarity===pk;});
  if(!pool.length){
    var idx=RARITY_ORDER.indexOf(pk);
    for(var fi=idx-1;fi>=0;fi--){
      pool=available.filter(function(c){return c.rarity===RARITY_ORDER[fi];});
      if(pool.length)break;
    }
  }
  if(!pool.length) pool=available;

  // Egg color weighting: pets matching the egg color get EGG_COLOR_BOOST x weight
  if (eggColor && pool.length > 1) {
    var weighted = [];
    for (var wi = 0; wi < pool.length; wi++) {
      var aff = EGG_COLOR_AFFINITY[pool[wi].id];
      var copies = (aff && aff.indexOf(eggColor) >= 0) ? EGG_COLOR_BOOST : 1;
      for (var wj = 0; wj < copies; wj++) weighted.push(pool[wi]);
    }
    return weighted[Math.floor(seededRandom() * weighted.length)];
  }
  return pool[Math.floor(seededRandom()*pool.length)];
}

function startDesign(containerEl, itemsArray, label, onUpdate) {
  designContext = {container: containerEl, items: itemsArray, label: label, onUpdate: onUpdate};
  designSelected = 0;
  designDragging = -1;
}

function endDesign() { designContext = null; }

function initDesignMode() {
  document.addEventListener('mousedown', function(e) {
    if (!designMode || !designContext) return;
    var sprites = designContext.container.querySelectorAll('[data-design-idx]');
    for (var i = sprites.length - 1; i >= 0; i--) {
      var r = sprites[i].getBoundingClientRect();
      if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) {
        designDragging = parseInt(sprites[i].getAttribute('data-design-idx'));
        designSelected = designDragging;
        designOffX = e.clientX - r.left;
        designOffY = e.clientY - r.top;
        e.preventDefault();
        e.stopPropagation();
        updateDesignReadout();
        return;
      }
    }
  });

  document.addEventListener('mousemove', function(e) {
    if (!designMode || !designContext || designDragging < 0) return;
    var cr = designContext.container.getBoundingClientRect();
    var xPct = ((e.clientX - designOffX - cr.left) / cr.width) * 100;
    var yPct = ((e.clientY - designOffY - cr.top) / cr.height) * 100;
    designContext.items[designDragging].x = Math.round(xPct * 10) / 10;
    designContext.items[designDragging].y = Math.round(yPct * 10) / 10;
    if (designContext.onUpdate) designContext.onUpdate();
    e.preventDefault();
  });

  document.addEventListener('mouseup', function() { designDragging = -1; });

  document.addEventListener('wheel', function(e) {
    if (!designMode || !designContext) return;
    // Only scale if mouse is over the design container
    var cr = designContext.container.getBoundingClientRect();
    if (e.clientX < cr.left || e.clientX > cr.right || e.clientY < cr.top || e.clientY > cr.bottom) return;
    var delta = e.deltaY > 0 ? -0.5 : 0.5;
    var item = designContext.items[designSelected];
    if (e.shiftKey && item.h !== undefined) {
      // Shift+scroll = adjust height
      item.h = Math.round(Math.max(1, item.h + delta) * 100) / 100;
    } else {
      // Normal scroll = adjust width/scale
      item.scale = Math.round(Math.max(0.1, item.scale + delta * 0.1) * 100) / 100;
    }
    if (designContext.onUpdate) designContext.onUpdate();
    e.preventDefault();
  }, {passive: false});

  document.addEventListener('keydown', function(e) {
    if (e.key === 'd' || e.key === 'D') {
      if (!isAdmin()) return;
      designMode = !designMode;
      updatePanelDesignOutlines();
      if (designContext && designContext.onUpdate) designContext.onUpdate();
    }
    if (e.key === 'a' || e.key === 'A') {
      if (!isAdmin()) return;
      adminMode = !adminMode;
      showMsg(adminMode ? 'ADMIN MODE ON' : 'ADMIN MODE OFF', adminMode ? '#4ade80' : '#ef4444');
    }
  });

  // --- Panel drag/resize in design mode ---
  document.addEventListener('mousedown', function(e) {
    if (!designMode) return;
    for (var pi = 0; pi < DESIGNABLE_PANELS.length; pi++) {
      var pel = document.getElementById(DESIGNABLE_PANELS[pi]);
      if (!pel || pel.style.display === 'none') continue;
      if (!pel.offsetWidth && !pel.offsetHeight) continue;
      var pr = pel.getBoundingClientRect();
      if (pr.width < 1 || pr.height < 1) continue;
      if (e.clientX >= pr.left && e.clientX <= pr.right && e.clientY >= pr.top && e.clientY <= pr.bottom) {
        var isResize = (e.clientX > pr.right - 14 && e.clientY > pr.bottom - 14);
        _panelDrag = {id: DESIGNABLE_PANELS[pi], offX: e.clientX - pr.left, offY: e.clientY - pr.top, resize: isResize, startW: pr.width, startH: pr.height};
        e.preventDefault();
        e.stopPropagation();
        return;
      }
    }
  }, true);

  document.addEventListener('mousemove', function(e) {
    if (!_panelDrag) return;
    var pel = document.getElementById(_panelDrag.id);
    if (!pel) return;
    if (_panelDrag.resize) {
      var pr = pel.getBoundingClientRect();
      var nw = Math.max(120, e.clientX - pr.left);
      pel.style.width = nw + 'px';
      pel.style.maxWidth = 'none';
      pel.style.minWidth = '0';
    } else {
      var nx = e.clientX - _panelDrag.offX;
      var ny = e.clientY - _panelDrag.offY;
      // Convert to parent-relative if absolute positioned
      var par = pel.offsetParent;
      if (par) { var parR = par.getBoundingClientRect(); nx -= parR.left; ny -= parR.top; }
      pel.style.left = nx + 'px';
      pel.style.top = ny + 'px';
      pel.style.bottom = 'auto';
      pel.style.right = 'auto';
      pel.style.transform = 'none';
    }
    e.preventDefault();
  });

  document.addEventListener('mouseup', function() {
    if (_panelDrag) {
      var pel = document.getElementById(_panelDrag.id);
      if (pel) {
        var pr = pel.getBoundingClientRect();
        var par = pel.offsetParent;
        var px = pr.left, py = pr.top;
        if (par) { var parR = par.getBoundingClientRect(); px -= parR.left; py -= parR.top; }
        panelLayouts[_panelDrag.id] = {x: px, y: py, w: pr.width};
        savePanelLayouts();
      }
      _panelDrag = null;
    }
  });
}

    if (egg) {
      var rarityLabel = RARITY_LABELS[egg.eggRarity] || '';

      var selCls = (selectedEgg === egg) ? ' selected-stand' : '';
      var eggImgUrl = getEggSpriteUrl(egg);

      // Mini panel: light + taps + timer + buttons — attached to this stand
      var taps = Math.min(egg.eggCare || 0, 100);
      var ready = canHatch(egg);
      var tapCoolLeft = Math.max(0, 60000 - (Date.now() - (egg.lastEggTap || 0)));
      var tapReady = tapCoolLeft <= 0;
      var ageMs = Date.now() - (egg.birthTime || Date.now());
      var ageHrs = ageMs / 3600000;
      var timerStr;
      if (ageHrs >= 24) {
        timerStr = '<span style="font-size:10px">&#128522;</span>';
      } else {
        var th = Math.floor(ageHrs), tm = Math.floor((ageMs % 3600000) / 60000), ts = Math.floor((ageMs % 60000) / 1000);
        timerStr = '<span style="color:#000;font-size:5px">' + (th > 0 ? th + 'h ' : '') + (th > 0 || tm > 0 ? tm + 'm ' : '') + ts + 's</span>';
      }
      html += '<div class="inc-stand' + selCls + '" ' +
        'style="left:' + pos.x + '%;top:' + pos.y + '%;width:' + baseW + ';z-index:' + zIdx + '">' +
        '<img src="sprites/food/incubator.png" alt="">' +
        '<img src="' + eggImgUrl + '" class="stand-egg" style="width:' + eggVW + 'vw;top:-5%;left:50%;transform:translateX(-50%)">' +
        '<div class="stand-label" style="font-size:' + labelSize + 'px;color:' + rarityColor + ';bottom:-' + (labelSize + 4) + 'px">' + rarityLabel + '</div>' +
      '</div>';

      // Separate tap button — invisible unless design mode
      var btn = EGG_TAP_BTNS[i];

      var btnDesign = (isDesign && (i + INC_FURNITURE.length) === designSelected) ? 'outline:2px solid #4ade80;' : '';
      html += '<div data-design-idx="' + (i + INC_FURNITURE.length) + '" onclick="selectIncEgg(' + egg.id + ')" ' +
        'style="position:absolute;left:' + btn.x + '%;top:' + btn.y + '%;width:' + btnW + ';' +
        'z-index:900;cursor:pointer;text-align:center;' + btnBg +
        'border-radius:4px;padding:3px;pointer-events:auto;overflow:visible;' +

function selectIncEgg(id) {
  for (var i = 0; i < baselings.length; i++) {
    if (baselings[i].id === id && baselings[i].stage === 0) { selectedEgg = baselings[i]; break; }
  }
  // Clicking the egg = tap it
  if (selectedEgg) {
    selected = selectedEgg;
    doEggTap();
  }
  updateIncubatorSlots();
}

function doIncTap() {
  if (!selectedEgg || selectedEgg.stage !== 0) return;
  selected = selectedEgg;
  doEggTap();
  updateIncubatorSlots();
}

function doIncHatch() {
  if (!selectedEgg || selectedEgg.stage !== 0) return;
  selected = selectedEgg;
  doHatch();
  selectedEgg = null;
  // If hatched, it moves to the room — update both views
  updateIncubatorSlots();
  if (getEggs().length === 0) closeIncubator();
}

function upgradeIncubator() {
  var nextLvl = incubatorLevel + 1;
  if (nextLvl >= INCUBATOR_SLOTS.length) { showMsg('MAX INCUBATOR!', '#ef4444'); return; }
  var cost = INCUBATOR_COSTS[nextLvl];
  if (!adminMode) depositToPowerPlant(cost * 0.99, 'eth');
  incubatorLevel = nextLvl;
  showMsg(adminMode ? 'INCUBATOR UPGRADED (ADMIN)' : 'STAND POWERED! ' + INCUBATOR_SLOTS[nextLvl] + ' incubators — ' + cost + ' WETH', '#4ade80');
  updateIncubatorSlots();
  saveGame();
}

function getFloorBounds(yFrac) {
  var t = (yFrac - FLOOR_ZONE.yMin) / (FLOOR_ZONE.yMax - FLOOR_ZONE.yMin);

  return {
    xMin: FLOOR_ZONE.xMinAtTop + (FLOOR_ZONE.xMinAtBot - FLOOR_ZONE.xMinAtTop) * t,
    xMax: FLOOR_ZONE.xMaxAtTop + (FLOOR_ZONE.xMaxAtBot - FLOOR_ZONE.xMaxAtTop) * t,
  };
}

async function fetchPowerPlantOnchain() {
  // Primary: fetch keeper-generated snapshot (no RPC calls, always accurate)
  try {
    var resp = await fetch('pp-stats.json?t=' + Date.now());
    if (resp.ok) {
      var snap = await resp.json();
      powerPlant.eth = snap.totals.eth;
      powerPlant.btc = snap.totals.btc;
      powerPlant.stable = snap.totals.usdc;
      powerPlant.poopBurned = snap.totals.poopBurned;
      powerPlant.poopBalance = snap.totals.poopBurned;
      powerPlant.poopInPools = snap.totals.poopInPools;
      powerPlant.positions = snap.powerPlant.positions;
      powerPlant.totalDeposits = snap.totals.eth;
      onchainBalances.ppWeth = snap.powerPlant.weth;
      onchainBalances.ppPoopBurned = snap.totals.poopBurned;
      onchainBalances.ppPositions = snap.powerPlant.positions;
      updatePPFloor();
      updateHUD();
      console.log('PowerPlant (snapshot): ETH=' + snap.totals.eth.toFixed(6) + ' BTC=' + snap.totals.btc + ' USDC=' + snap.totals.usdc + ' POOP_burned=' + snap.totals.poopBurned.toFixed(4) + ' POOP_in_pools=' + snap.totals.poopInPools.toFixed(2));
      return;
    }
  } catch(e) { console.warn('PP snapshot fetch failed, falling back to RPC:', e); }
  // Fallback: minimal RPC reads (no pool queries — too many calls)
  if (!walletProvider || !POWERPLANT_ADDR) return;
  try {
    var pp = new ethers.Contract(POWERPLANT_ADDR, POWERPLANT_ABI, walletProvider);
    var wethBal = parseFloat(ethers.formatEther(await pp.wethBalance()));
    var poopBurned = parseFloat(ethers.formatEther(await pp.poopBurned()));
    var positions = Number(await pp.positionCount());
    powerPlant.eth = wethBal;
    powerPlant.poopBurned = poopBurned;
    powerPlant.poopBalance = poopBurned;
    powerPlant.positions = positions;
    onchainBalances.ppWeth = wethBal;
    onchainBalances.ppPoopBurned = poopBurned;
    onchainBalances.ppPositions = positions;
    updatePPFloor();
    updateHUD();
  } catch(e) { console.warn('PowerPlant RPC fallback failed:', e); }
}

function tickGardenFarmer() {
  if (!gardenOpen || designMode) return;
  var p = GARDEN_FARMER_PATH;
  gardenFarmerPos.t += 0.0004 * gardenFarmerPos.dir;
  if (gardenFarmerPos.t >= 1) { gardenFarmerPos.t = 1; gardenFarmerPos.dir = -1; }
  if (gardenFarmerPos.t <= 0) { gardenFarmerPos.t = 0; gardenFarmerPos.dir = 1; }
  var ease = gardenFarmerPos.t < 0.5 ? 2 * gardenFarmerPos.t * gardenFarmerPos.t : 1 - Math.pow(-2 * gardenFarmerPos.t + 2, 2) / 2;
  gardenFarmerPos.x = p.ax + (p.bx - p.ax) * ease;
  gardenFarmerPos.y = p.ay + (p.by - p.ay) * ease;
  var el = document.getElementById('garden-farmer-sprite');
  if (el) {
    el.style.left = gardenFarmerPos.x + '%';
    el.style.top = gardenFarmerPos.y + '%';
    el.style.transform = gardenFarmerPos.dir < 0 ? 'scaleX(-1)' : '';
  }
}

// Simulated yield until on-chain gardens are deployed
function calcTreeYield() {
  var pool = gardenPools[0];
  if (!pool.poopDeposited || pool.poopDeposited <= 0 || !pool.lastCheck) return 0;
  var elapsed = (Date.now() - pool.lastCheck) / 3600000;
  return pool.poopDeposited * 0.0001 * elapsed;
}

async function depositPoopToTree(amount) {
  if (amount <= 0) return;
  if (totalPoop < amount) { showMsg('NOT ENOUGH POOP!', '#ef4444'); return; }
  var pool = gardenPools[0];
  pool.yieldAccum += calcTreeYield();
  pool.poopDeposited += amount;
  pool.lastCheck = Date.now();
  totalPoop -= amount;
  showMsg('+' + amount + ' POOP fed to Burger Tree!', '#f97316');
  updateHUD();
  updateGardenFloor();
  updateGardenPanel();
  saveGame();
}

function harvestTree() {
  var pool = gardenPools[0];
  var pending = calcTreeYield();
  var total = pool.yieldAccum + pending;
  if (total < 1.0) { showMsg('NOT READY YET!', '#ef4444'); return; }
  pool.yieldAccum = 0;
  pool.lastCheck = Date.now();
  showMsg('HARVESTED $' + total.toFixed(2) + ' in BURGERS + MfT!', '#f97316');
  updateGardenFloor();
  updateGardenPanel();
  saveGame();
}

  html += '<div style="display:flex;justify-content:space-between;font-size:6px;margin-bottom:4px">' +
    '<span style="color:#f97316">YIELD GROWING</span><span style="color:' + (harvestReady ? '#f0d060' : '#f97316') + '">$' + totalYield.toFixed(4) + '</span></div>';
  html += '<div style="color:#666;font-size:5px;margin-bottom:6px">50% BURGERS + 50% MfT — locked as LP forever</div>';

  // Progress bar
  if (!harvestReady && deposited > 0) {
    var pct = Math.min(100, Math.round(totalYield * 100));
    html += '<div style="margin-bottom:6px">' +
      '<div style="display:flex;justify-content:space-between;font-size:5px;color:#666;margin-bottom:2px"><span>HARVEST AT $1.00</span><span>' + pct + '%</span></div>' +

        '<div style="width:' + pct + '%;height:100%;background:#f97316;border-radius:2px;transition:width 0.5s"></div>' +
      '</div></div>';
  }

  // Harvest button
  if (harvestReady) {
    html += '<div style="text-align:center;margin-bottom:8px">' +

  }

  // Deposit controls
  html += '<div style="border-top:1px solid #333;padding-top:8px">' +
    '<div style="color:#888;font-size:6px;margin-bottom:6px;text-align:center">FEED POOP TO TREE (available: ' + totalPoop + ')</div>' +
    '<div style="display:flex;gap:4px;justify-content:center;align-items:center;flex-wrap:wrap">';

  var qtyBtns = [-100,-10,-1,'+1','+10','+100','MAX'];
  for (var qi = 0; qi < qtyBtns.length; qi++) {

    } else {

    }
  }

  html += '</div>';
  html += '<div style="text-align:center;margin-top:6px;font-size:8px;color:#f0d060">' + gardenDepositQty + ' POOP</div>';
  html += '<div style="text-align:center;margin-top:6px">' +
    '<button onclick="depositPoopToTree(gardenDepositQty)" style="background:#2e1a0a;border:2px solid #f97316;color:#f97316;font-size:7px;padding:8px 20px;border-radius:4px;cursor:pointer;font-family:\'Press Start 2P\',monospace">FEED ' + gardenDepositQty + ' POOP</button></div>';

  html += '</div></div>';

// Track which locked buildings the player has purchased
var purchasedBuildings = {};

function isBuildingUnlocked(idx) {
  var b = HOOD_BUILDINGS[idx];
  if (!b) return false;
  if (!b.locked) return true; // not a locked building
  return !!purchasedBuildings[idx];
}

function buyBuilding(idx) {
  var b = HOOD_BUILDINGS[idx];
  if (!b || !b.locked || !b.price) { showMsg('CANNOT BUY THIS', '#ef4444'); return; }
  if (purchasedBuildings[idx]) { showMsg('ALREADY OWNED', '#f59e0b'); return; }
  if (adminMode) {
    purchasedBuildings[idx] = true;
    showMsg(b.label + ' UNLOCKED (ADMIN)', '#4ade80');
    updateNeighborhoodFloor(); saveGame(); return;
  }
  // Local purchase — deduct from onchain WETH balance check
  if (onchainBalances.weth < b.price) { showMsg('NEED ' + b.price + ' WETH TO UNLOCK', '#ef4444'); return; }
  purchasedBuildings[idx] = true;
  depositToPowerPlant(b.price, 'eth');
  showMsg(b.label + ' UNLOCKED! ' + b.price + ' WETH', '#4ade80');
  updateNeighborhoodFloor();
  saveGame();
}

function clickLockedBuilding(idx) {
  var b = HOOD_BUILDINGS[idx];
  if (!b) return;
  if (!b.price) { showMsg(b.label + ' — COMING SOON', '#f59e0b'); return; }
  // Show buy prompt
  showMsg('ROOM LOCKED — COSTS ' + b.price + ' WETH', '#f59e0b');
  var panel = document.getElementById('neighborhood-floor');
  var popup = document.getElementById('hood-buy-popup');
  if (popup) popup.remove();
  popup = document.createElement('div');

    '<button onclick="var p=document.getElementById(\'hood-buy-popup\');if(p)p.remove()" style="font-family:\'Press Start 2P\',monospace;font-size:7px;padding:8px 16px;border:2px solid #ef4444;border-radius:4px;background:#2e0a0a;color:#ef4444;cursor:pointer">CANCEL</button>';

function updateNeighborhoodFloor() {
  var floor = document.getElementById('neighborhood-floor');
  if (!floor) return;
  var html = '';
  for (var i = 0; i < HOOD_BUILDINGS.length; i++) {
    var b = HOOD_BUILDINGS[i];
    var designBorder = (designMode && designContext && i === designSelected) ? 'outline:2px solid #f0d060;' : '';
    var isDesign = designMode && designContext;
    var unlocked = isBuildingUnlocked(i);
    var locked = b.locked && !unlocked;
    var boxStyle = '';
    if (locked) {
      boxStyle = 'opacity:0.4;border-color:rgba(100,100,100,0.5);background:rgba(100,100,100,0.15);cursor:pointer;';
    } else if (isDesign) {
      boxStyle = 'border-color:rgba(74,222,128,0.5);background:rgba(74,222,128,0.15);';
    } else {
      boxStyle = 'border-color:transparent;background:transparent;';
    }
    var onclick = '';
    if (locked) {
      onclick = 'clickLockedBuilding(' + i + ')';
    } else if (b.action) {
      onclick = 'neighborhoodAction(\'' + b.action + '\')';
    }
    html += '<div class="hood-spot" data-design-idx="' + i + '" onclick="' + onclick + '" style="left:' + b.x + '%;top:' + b.y + '%;width:' + b.w + '%;height:' + b.h + '%;' + boxStyle + designBorder + '">' +
      '<span class="hood-label" style="' + (isDesign || locked ? '' : 'display:none') + '">' + (locked ? b.label + (b.price ? ' (' + b.price + ' wETH)' : ' (SOON)') : b.label) + '</span>' +
    '</div>';
  }
  html += renderDesignOverlay();
  floor.innerHTML = html;
  if (designMode && designContext) updateDesignReadout();
}

async function openClinic() {
  document.getElementById('clinic-room').style.display = 'block';
  var floor = document.getElementById('clinic-floor');
  var alive = baselings.filter(function(w) { return w.alive !== false && w.stage > 0; });
  if (alive.length === 0) {
    floor.innerHTML = '<div class="nurse-msg" style="margin-top:40px;font-size:9px">NO PATIENTS — HATCH AN EGG FIRST!</div>';
    return;
  }
  floor.innerHTML = '<div class="nurse-msg">CHECKING VITALS...</div>';
  var nft = walletProvider ? new ethers.Contract(BASELING_ADDR, BASELING_ABI, walletProvider) : null;
  var html = '';
  for (var i = 0; i < alive.length; i++) {
    var w = alive[i];
    var name = w.customName || w.birthName || ('Baseling #' + (w.tokenId || '?'));
    var familyLabel = w.sortedToken || 'Random';
    var lpWeth = '—'; var lpTotal = '—'; var pendPoop = '—'; var vaultPairs = '—';
    // Fetch on-chain data if we have a tokenId and wallet
    if (w.tokenId && nft) {
      try {
        var results = await Promise.all([
          nft.totalVaultWETH(w.tokenId).catch(function(){return 0n;}),
          nft.totalVaultLP(w.tokenId).catch(function(){return 0n;}),
          nft.pendingPoop(w.tokenId, walletAddr).catch(function(){return 0n;}),
          nft.getVaultPairs(w.tokenId).catch(function(){return [];})
        ]);
        lpWeth = parseFloat(ethers.formatEther(results[0])).toFixed(6) + ' ETH';
        lpTotal = parseFloat(ethers.formatEther(results[1])).toFixed(6);
        pendPoop = parseFloat(ethers.formatEther(results[2])).toFixed(2) + ' POOP';
        vaultPairs = results[3].length + ' pair(s)';
      } catch(e) { console.warn('clinic fetch err #' + w.tokenId, e.message); }
    }
    var feedCount = w.feedCount || 0;
    var deathCount = w.deathCount || 0;
    var age = w.birthTime ? Math.floor((Date.now()/1000 - w.birthTime) / 86400) : '?';
    var stageNames = ['Egg','Baby','Teen','Adult','Legend'];
    var stageName = stageNames[w.stage] || 'Unknown';
    var giantTag = w.giant ? ' <span style="color:#f0d060">[GIANT]</span>' : '';
    html += '<div class="clinic-card">';
    html += '<div style="color:#60a5fa;font-size:8px;margin-bottom:6px">' + name + giantTag + '</div>';
    html += '<div class="stat-row"><span>Family</span><span class="stat-val">' + familyLabel + '</span></div>';
    html += '<div class="stat-row"><span>Stage</span><span class="stat-val">' + stageName + '</span></div>';
    html += '<div class="stat-row"><span>Age</span><span class="stat-val">' + age + ' days</span></div>';
    html += '<div class="stat-row"><span>Times Fed</span><span class="stat-val">' + feedCount + '</span></div>';
    html += '<div class="stat-row"><span>Deaths</span><span class="stat-val">' + deathCount + '</span></div>';
    html += '<div style="border-top:1px solid #60a5fa;margin:6px 0 4px;opacity:0.4"></div>';
    html += '<div style="color:#60a5fa;font-size:6px;margin-bottom:4px">LP VAULT</div>';
    html += '<div class="stat-row"><span>WETH Locked</span><span class="stat-val">' + lpWeth + '</span></div>';

// Dead baselings rest here. Their vaults keep burning POOP forever — every dead baseling is a gift to active players.
var graveyardOpen = false;

function getDeadBaselings() {
  return baselings.filter(function(b) { return !b.alive || b.state === 'dead'; });

  var floor = document.getElementById('graveyard-floor');

    '<span style="color:#888">DEAD</span><span style="color:#666">' + deathDays + ' days</span></div>';
  html += '<div style="display:flex;justify-content:space-between;font-size:6px;margin-bottom:2px">' +

  // Final stats

  html += '<div style="color:#888;font-size:5px;margin-bottom:4px;text-align:center">FINAL STATS</div>';

      '<span style="color:#888">' + val + '</span></div>';
  }
  html += '</div>';

  // Resurrect button
  var totalLP = (b.lp ? b.lp.staked + b.lp.locked : 0);

  html += '<div style="border-top:1px solid #333;margin-top:6px;padding-top:6px;text-align:center">';

      'style="font-size:7px;padding:6px 14px;border-color:#a855f7;color:#a855f7;margin-bottom:4px">RESURRECT (' + rezCost.toFixed(4) + ' WETH)</button>';
    html += '<div style="color:#666;font-size:4px;margin-top:2px">10% of vault LP locked forever</div>';
  } else {
    html += '<div style="color:#888;font-size:5px;margin-bottom:4px">NO LP IN VAULT</div>';
    html += '<button class="btn" onclick="graveyardFeedRevive(' + b.id + ')" ' +
      'style="font-size:6px;padding:4px 10px;border-color:#60a5fa;color:#60a5fa">FEED 0.01 WETH TO REVIVE</button>';
  }
  html += '</div>';

  html += '</div>';
  panel.innerHTML = html;
}

function graveyardResurrect(id) {
  var b = baselings.find(function(w) { return w.id === id; });
  if (!b || b.alive) return;
  selected = b;
  doResurrect();
  selectedGrave = null;
  b.graveyardRoom = false;
  closeGraveyard();
  updateRoomInfo();
  saveGame();
}

function graveyardFeedRevive(id) {
  var b = baselings.find(function(w) { return w.id === id; });

  updateRoomInfo();
  saveGame();
}

];

function tickCryoSci() {
  if (!cryoOpen || designMode) return;
  var p = CRYO_SCI_PATH;
  cryoSciPos.t += 0.0015 * cryoSciPos.dir;
  if (cryoSciPos.t >= 1) { cryoSciPos.t = 1; cryoSciPos.dir = -1; }
  if (cryoSciPos.t <= 0) { cryoSciPos.t = 0; cryoSciPos.dir = 1; }
  // Ease in-out
  var ease = cryoSciPos.t < 0.5 ? 2 * cryoSciPos.t * cryoSciPos.t : 1 - Math.pow(-2 * cryoSciPos.t + 2, 2) / 2;
  cryoSciPos.x = p.ax + (p.bx - p.ax) * ease;
  cryoSciPos.y = p.ay + (p.by - p.ay) * ease;
  var el = document.getElementById('cryo-sci-sprite');
  if (el) {
    el.style.left = cryoSciPos.x + '%';
    el.style.top = cryoSciPos.y + '%';
    el.style.transform = cryoSciPos.dir < 0 ? 'scaleX(-1)' : '';
  }
}

  if (npcPathMode === 'garden') return document.getElementById('garden-floor');
  return null;
}

function createPathLine(floor) {
  removePathLine();
  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.id = 'npc-path-line';
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:50;pointer-events:none';
  svg.innerHTML = '<line x1="0" y1="0" x2="0" y2="0" stroke="#4ade80" stroke-width="3" stroke-dasharray="8,4" opacity="0.8"/>' +
    '<circle cx="0" cy="0" r="6" fill="#4ade80" opacity="0.9"/>' +
    '<circle cx="0" cy="0" r="6" fill="#60a5fa" opacity="0.9"/>';
  floor.appendChild(svg);
  npcPathLine = svg;
}
function removePathLine() {
  if (npcPathLine && npcPathLine.parentNode) npcPathLine.parentNode.removeChild(npcPathLine);
  npcPathLine = null;
}
function updatePathLine(ax,ay,bx,by) {
  if (!npcPathLine) return;
  var line = npcPathLine.querySelector('line');
  var circles = npcPathLine.querySelectorAll('circle');
  line.setAttribute('x1', ax+'%'); line.setAttribute('y1', ay+'%');
  line.setAttribute('x2', bx+'%'); line.setAttribute('y2', by+'%');
  circles[0].setAttribute('cx', ax+'%'); circles[0].setAttribute('cy', ay+'%');
  circles[1].setAttribute('cx', bx+'%'); circles[1].setAttribute('cy', by+'%');
}

function npcPathMouseDown(e) {
  if (!npcPathMode) return;
  var floor = getPathFloor();
  if (!floor) return;
  var rect = floor.getBoundingClientRect();
  npcPathStart.x = parseFloat(((e.clientX - rect.left) / rect.width * 100).toFixed(1));
  npcPathStart.y = parseFloat(((e.clientY - rect.top) / rect.height * 100).toFixed(1));
  npcPathDragging = true;
  createPathLine(floor);
  updatePathLine(npcPathStart.x, npcPathStart.y, npcPathStart.x, npcPathStart.y);
  e.preventDefault();
  e.stopPropagation();
}
function npcPathMouseMove(e) {
  if (!npcPathDragging || !npcPathMode) return;
  var floor = getPathFloor();
  if (!floor) return;
  var rect = floor.getBoundingClientRect();
  var bx = parseFloat(((e.clientX - rect.left) / rect.width * 100).toFixed(1));
  var by = parseFloat(((e.clientY - rect.top) / rect.height * 100).toFixed(1));
  updatePathLine(npcPathStart.x, npcPathStart.y, bx, by);
}
function npcPathMouseUp(e) {
  if (!npcPathDragging || !npcPathMode) return;
  var floor = getPathFloor();
  if (!floor) return;
  var rect = floor.getBoundingClientRect();
  var bx = parseFloat(((e.clientX - rect.left) / rect.width * 100).toFixed(1));
  var by = parseFloat(((e.clientY - rect.top) / rect.height * 100).toFixed(1));
  npcPathDragging = false;
  // Apply path
  if (npcPathMode === 'cryo') {
    CRYO_SCI_PATH.ax = npcPathStart.x; CRYO_SCI_PATH.ay = npcPathStart.y;
    CRYO_SCI_PATH.bx = bx; CRYO_SCI_PATH.by = by;
    cryoSciPos.t = 0; cryoSciPos.dir = 1;
  } else if (npcPathMode === 'garden') {
    GARDEN_FARMER_PATH.ax = npcPathStart.x; GARDEN_FARMER_PATH.ay = npcPathStart.y;
    GARDEN_FARMER_PATH.bx = bx; GARDEN_FARMER_PATH.by = by;
    gardenFarmerPos.t = 0; gardenFarmerPos.dir = 1;
  }
  showMsg('PATH SET: (' + npcPathStart.x + ',' + npcPathStart.y + ') → (' + bx + ',' + by + ')', '#4ade80');
  // Keep line visible for 2s then remove
  setTimeout(removePathLine, 2000);
  npcPathMode = false;
  if (cryoOpen) updateCryoFloor();
  if (gardenOpen) updateGardenFloor();
}

// --- NANNY DAILY TICK ---
// Once per day per room with nanny:
//   1. Feeds 1 food to each baseling (prefers fav, resets hunger timer, +semi happy)
//   2. Moves 1 food per baseling from cupboard → freezer (stockpiling)
//   3. On-chain: moves LP to each baseling's vault via PlayerPantry.feedBaseling
// Without nanny: baselings self-feed from cupboard but get NEGATIVE happy
var NANNY_FEED_LP = 0.001; // $0.001 LP per nanny feed (minimal, just to keep alive on-chain)

function nannyTick() {
  var now = Date.now();
  var dayMs = (DEV_MODE ? 10 : 86400) * 1000;
  var anyAction = false;
  for (var ri = 0; ri < rooms.length; ri++) {
    var room = rooms[ri];
    if (!room) continue;
    if (!room.lastNannyRun) room.lastNannyRun = 0;
    if (now - room.lastNannyRun < dayMs) continue;
    var daysPassed = Math.min(7, Math.floor((now - room.lastNannyRun) / dayMs));
    if (daysPassed < 1) continue;
    var pets = baselings.filter(function(w) { return (w.roomId || 0) === ri && w.stage > 0 && w.alive; });
    if (pets.length === 0) { room.lastNannyRun = now; continue; }
    var totalFed = 0, totalStocked = 0;

    for (var d = 0; d < daysPassed; d++) {
      if (room.hasNanny) {
        // === NANNY FEED: prefers fav food, resets timer, +semi happy ===
        for (var pi = 0; pi < pets.length; pi++) {
          if (!room.cupboardItems) break;
          var favFood = getFavoriteFood(pets[pi]);
          var fedOne = false;
          var foodUsed = null;
          // Try favorite food first
          if (favFood && room.cupboardItems[favFood] && room.cupboardItems[favFood] > 0) {
            room.cupboardItems[favFood]--;
            if (room.cupboardItems[favFood] <= 0) delete room.cupboardItems[favFood];
            foodUsed = favFood;
            fedOne = true;
          }
          // Fall back to any available food
          if (!fedOne) {
            var cKeys = Object.keys(room.cupboardItems);
            for (var ck = 0; ck < cKeys.length; ck++) {
              if (room.cupboardItems[cKeys[ck]] > 0) {
                foodUsed = cKeys[ck];
                room.cupboardItems[cKeys[ck]]--;
                if (room.cupboardItems[cKeys[ck]] <= 0) delete room.cupboardItems[cKeys[ck]];
                fedOne = true;
                break;
              }
            }
          }
          if (fedOne) {
            pets[pi].hunger = Math.min(100, pets[pi].hunger + 30);
            pets[pi].hungerAtFeed = pets[pi].hunger;
            pets[pi].happy = Math.min(70, pets[pi].happy + 10); // nanny keeps semi-happy (caps at 70)
            recordMeal(pets[pi], NANNY_FEED_LP); // resets hunger timer
            // LP to vault (local — on-chain done by keeper)
            pets[pi].lp.staked += NANNY_FEED_LP * 0.995;
            pets[pi].lp.locked += NANNY_FEED_LP * 0.005;
            pets[pi].lp.totalDeposited += NANNY_FEED_LP;
            pets[pi].feedCount++;
            totalFed++;
          }
        }
        // === NANNY STOCKPILE: 1 food per baseling from cupboard → freezer ===
        if (room.freezerLevel >= 0 && room.freezerItems) {
          var frzCount = countItems(room.freezerItems);
          var frzMax = room.maxFreezer || 0;
          for (var si = 0; si < pets.length; si++) {
            if (frzCount >= frzMax) break;
            if (!room.cupboardItems) break;
            var sKeys = Object.keys(room.cupboardItems);
            for (var sk = 0; sk < sKeys.length; sk++) {
              if (room.cupboardItems[sKeys[sk]] > 0) {
                room.cupboardItems[sKeys[sk]]--;
                if (room.cupboardItems[sKeys[sk]] <= 0) delete room.cupboardItems[sKeys[sk]];
                room.freezerItems[sKeys[sk]] = (room.freezerItems[sKeys[sk]] || 0) + 1;
                frzCount++;
                totalStocked++;
                break;
              }
            }
          }
        }
      } else {
        // === NO NANNY: baselings self-feed from cupboard but lose happy ===
        for (var spi = 0; spi < pets.length; spi++) {
          if (pets[spi].hunger > 30) continue; // only self-feed when hungry
          if (!room.cupboardItems) break;
          var selfKeys = Object.keys(room.cupboardItems);
          for (var sfk = 0; sfk < selfKeys.length; sfk++) {
            if (room.cupboardItems[selfKeys[sfk]] > 0) {
              room.cupboardItems[selfKeys[sfk]]--;
              if (room.cupboardItems[selfKeys[sfk]] <= 0) delete room.cupboardItems[selfKeys[sfk]];
              pets[spi].hunger = Math.min(100, pets[spi].hunger + 15);
              pets[spi].hungerAtFeed = pets[spi].hunger;
              pets[spi].happy = Math.max(0, pets[spi].happy - 10); // unhappy about self-feeding
              recordMeal(pets[spi], 0); // resets timer but no LP
              break;
            }
          }
        }
      }
    }
    room.lastNannyRun = now;
    anyAction = anyAction || totalFed > 0 || totalStocked > 0;
    if (totalFed > 0 || totalStocked > 0) {
      console.log('Nanny room ' + ri + ': fed ' + totalFed + ', stocked ' + totalStocked + ' (' + daysPassed + ' days)');
    }
  }
  if (anyAction) saveGame();
}

// Nanny vault deposits happen in-game automatically (no player wallet needed).
// On-chain LP moves are handled by the VPS keeper bot (keeper/nanny-keeper.js).

// Run nanny check every 60 seconds
setInterval(nannyTick, 60000);
function countItems(obj) {
  if (!obj) return 0;
  var t = 0; for (var k in obj) t += obj[k]; return t;
}
function getCupboardTotal(room) {
  if (!room) return 0;
  return countItems(room.cupboardItems) + countItems(room.freezerItems) + countItems(room.walkinItems);
}
function getStorageMax(room) {
  if (!room) return 0;
  var cap = room.maxCupboard || CUPBOARD_LEVELS[0];
  cap += room.maxFreezer || 0;
  if (room.hasWalkin) cap = 999999; // unlimited
  return cap;
}

function buyRoom() {
  var idx = rooms.length;
  if (idx >= ROOM_COSTS.length) { showMsg('MAX ROOMS!', '#ef4444'); return; }
  var cost = ROOM_COSTS[idx];
  if (cost > 0 && !adminMode) {
    depositToPowerPlant(cost, 'eth');
    showMsg('ROOM BOUGHT! ' + cost + ' WETH → POWER PLANT', '#4ade80');
  } else if (adminMode) {
    showMsg('ROOM ADDED (ADMIN)', '#4ade80');
  }
  rooms.push(createRoom(idx));
  currentRoom = rooms.length - 1;
  updateRoomTabs();
  updateRoomInfo();
  saveGame();
}

function switchRoom(idx) {
  if (idx < 0 || idx >= rooms.length) return;
  currentRoom = idx;
  selected = null;
  document.getElementById('panel').style.display = 'none';
  updateRoomTabs();
  updateRoomInfo();
  updateHUD();
  buildFoodTray();
}

function upgradeCupboard() {
  var room = rooms[currentRoom];
  if (!room) return;
  var nextLevel = room.cupboardLevel + 1;
  if (nextLevel >= CUPBOARD_LEVELS.length) { showMsg('MAX CUPBOARD! Try a FREEZER.', '#ef4444'); return; }
  var cost = CUPBOARD_COSTS[nextLevel];
  if (cost > 0 && !adminMode) {
    depositToPowerPlant(cost * 0.99, 'eth');
    showMsg('CUPBOARD L' + (nextLevel+1) + '! Holds ' + CUPBOARD_LEVELS[nextLevel] + ' — ' + cost + ' WETH', '#4ade80');
  } else if (adminMode) {
    showMsg('CUPBOARD UPGRADED (ADMIN)', '#4ade80');
  }
  room.cupboardLevel = nextLevel;
  room.maxCupboard = CUPBOARD_LEVELS[nextLevel];
  updateRoomInfo();
  saveGame();
}

function restockCupboard(amount) {
  var room = rooms[currentRoom];
  if (!room) return;
  if (!room.cupboardItems) room.cupboardItems = {};
  // Legacy generic food still tracked for compat
  room.food = Math.min(room.food + amount, room.maxFood);
  updateRoomInfo();
}

function roomBaselings(roomIdx) {
  if (roomIdx === undefined) roomIdx = currentRoom;
  return baselings.filter(function(w) { return (w.roomId || 0) === roomIdx && w.stage > 0 && !w.graveyardRoom; }); // eggs in incubator, dead in graveyard
}

function roomCount(roomIdx) {
  return roomBaselings(roomIdx).length;
}

function roomFull(roomIdx) {
  if (roomIdx === undefined) roomIdx = currentRoom;
  if (!rooms[roomIdx]) return true;
  return roomCount(roomIdx) >= rooms[roomIdx].capacity;
}

function updateRoomTabs() {
  var html = '';
  for (var i = 0; i < rooms.length; i++) {
    var r = rooms[i];
    var cnt = roomCount(i);
    var cls = i === currentRoom ? 'room-tab active' : 'room-tab';
    html += '<div class="' + cls + '" onclick="switchRoom(' + i + ')">' +
      r.name + ' ' + cnt + '/' + r.capacity + '</div>';
  }
  if (rooms.length < ROOM_COSTS.length) {
    var nextCost = ROOM_COSTS[rooms.length];
    var label = nextCost > 0 ? '+ ROOM (' + nextCost + ' WETH)' : '+ FREE ROOM';
    html += '<div class="room-tab add-room" onclick="buyRoom()">' + label + '</div>';
  }
  document.getElementById('room-tabs').innerHTML = html;
}

function updateRoomInfo() {
  var room = rooms[currentRoom];
  if (!room) return;
  if (!room.cupboardItems) room.cupboardItems = {};
  if (!room.freezerItems) room.freezerItems = {};
  if (!room.walkinItems) room.walkinItems = {};
  var cupCount = countItems(room.cupboardItems);
  var frzCount = countItems(room.freezerItems);
  var wlkCount = countItems(room.walkinItems);
  var maxCup = room.maxCupboard || CUPBOARD_LEVELS[0];

  // Cupboard line (decays!)
  var cupPct = Math.round((cupCount / maxCup) * 100);
  var cupColor = cupPct < 20 ? '#ef4444' : cupPct < 50 ? '#f59e0b' : '#4ade80';
  var nextCupLvl = room.cupboardLevel + 1;
  var cupUpgrade = nextCupLvl < CUPBOARD_LEVELS.length ?
    ' <span style="cursor:pointer;color:#4ade80" onclick="upgradeCupboard()">[+CUP ' +
    (CUPBOARD_COSTS[nextCupLvl] > 0 ? CUPBOARD_COSTS[nextCupLvl] + 'W' : 'FREE') + ']</span>' : '';

  var html = 'CUPBOARD: ' + cupCount + '/' + maxCup +
    '<div class="cupboard-bar"><div class="cupboard-fill" style="width:' + Math.min(100,cupPct) + '%;background:' + cupColor + '"></div></div>' +
    cupUpgrade;

  // Freezer line (no decay)
  if (room.freezerLevel >= 0) {
    var frzMax = room.maxFreezer || 0;
    var frzPct = frzMax > 0 ? Math.round((frzCount / frzMax) * 100) : 0;
    var nextFrzLvl = room.freezerLevel + 1;
    var frzUpgrade = nextFrzLvl < FREEZER_LEVELS.length ?
      ' <span style="cursor:pointer;color:#60a5fa" onclick="buyFreezer()">[+FRZ ' + FREEZER_COSTS[nextFrzLvl] + 'W]</span>' : '';
    html += '<br><span style="color:#60a5fa">FREEZER: ' + frzCount + '/' + frzMax + '</span>' + frzUpgrade;
  } else {
    var frzCost = FREEZER_COSTS[0];
    html += ' <span style="cursor:pointer;color:#60a5fa" onclick="buyFreezer()">[BUY FREEZER ' + frzCost + 'W]</span>';
  }

  // Walk-in line (unlimited)
  if (room.hasWalkin) {
    html += '<br><span style="color:#c084fc">WALK-IN: ' + wlkCount + ' stored</span>';
  } else {
    html += ' <span style="cursor:pointer;color:#c084fc" onclick="buyWalkin()">[WALK-IN ' + WALKIN_COST + 'W]</span>';
  }

  // Nanny
  html += room.hasNanny ? '<br><span style="color:#f472b6">NANNY ACTIVE</span>' :
    '<br><span style="cursor:pointer;color:#f472b6" onclick="hireNanny()">[HIRE NANNY ' + NANNY_COST + 'W]</span>';

  var ppW2 = onchainBalances.ppWeth !== undefined ? onchainBalances.ppWeth.toFixed(6) : powerPlantWETH.toFixed(4);
  var ppB2 = onchainBalances.ppPoopBurned !== undefined ? onchainBalances.ppPoopBurned.toFixed(2) : '0';
  var ppPos = onchainBalances.ppPositions || 0;
  html += '<br><span style="color:#f59e0b">&#9889; POWER PLANT: ' + ppW2 + ' ETH | ' + ppB2 + ' POOP burned | ' + ppPos + ' pools locked</span>';
  document.getElementById('room-info').innerHTML = html;
}

async function addEgg(sortedToken, giant) {
  updateDebug('addEgg CALLED');
  try {
  var eggs = getEggs();
  if (eggs.length >= getIncubatorMax()) {
    showMsg('INCUBATOR FULL! Upgrade or hatch eggs first.', '#ef4444');
    return;
  }
  // Require wallet connection
  if (!walletAddr) {
    updateDebug('CONNECTING WALLET...');
    showMsg('CONNECTING WALLET...', '#f0d060');
    await connectWallet();
    if (!walletAddr) { updateDebug('WALLET FAILED'); showMsg('WALLET NOT CONNECTED', '#ef4444'); return; }
    updateDebug('WALLET OK: ' + walletAddr.slice(0,8));
  }
  showMsg('STARTING MINT...', '#f0d060');
  var onchainTokenId = null;
  var type = giant ? (sortedToken ? 'giantSorted' : 'giant') : (sortedToken ? 'sorted' : 'random');
  var family = sortedToken === 'TGN' ? 0 : sortedToken === 'BURGERS' ? 1 : 2;
  var result = await mintEggOnchain(type, family);
  if (result === false) return;
  if (typeof result === 'number') onchainTokenId = result;
  else { showMsg('MINT OK BUT NO TOKEN ID — SYNC TO FIX', '#f59e0b'); return; }
  // Auto-convert seed to LP: WETH → MfT (V4) → token/MfT LP → vault
  if (onchainTokenId && ROUTER_ADDR) {
    try {
      showMsg('SWAPPING TO MfT LP...', '#f0d060');
      var router = getContract(ROUTER_ADDR, ROUTER_ABI);
      var seedTx = await router.convertSeed(onchainTokenId);
      await seedTx.wait();
      showMsg('MfT LP DEPOSITED!', '#4ade80');
    } catch(e) {
      console.error('convertSeed failed:', e);
      showMsg('LP SWAP FAILED: ' + (e.reason || e.shortMessage || e.message || '').slice(0,60), '#ef4444');
    }
  }
  var w = createBaseling(sortedToken, giant);
  if (onchainTokenId) w.tokenId = onchainTokenId;
  // Credit mint price as initial egg LP — influences stats and hatch outcome
  var mintTokenMap = {TGN:'tgn', BURGERS:'burgers', AZUSD:'azusd'};
  var mintToken = sortedToken ? (mintTokenMap[sortedToken] || 'mft') : 'mft';
  var mintPriceUSD = giant ? (sortedToken ? 10 : 6) : (sortedToken ? 1 : 0.10);
  w.eggLPFed = (w.eggLPFed || 0) + mintPriceUSD;
  if (!w.eggTokenFeeds) w.eggTokenFeeds = {};
  w.eggTokenFeeds[mintToken] = (w.eggTokenFeeds[mintToken] || 0) + mintPriceUSD;
  // Initial stat boosts from mint LP
  var boosts = FOOD_STAT_BOOSTS[mintToken];
  if (boosts) {
    if (!w.stats) w.stats = defaultStats();
    for (var si = 0; si < STAT_NAMES.length; si++) {
      var sn = STAT_NAMES[si];
      if (boosts[sn]) w.stats[sn] += boosts[sn] * mintPriceUSD;
    }
  }
  var eggColorNames = {TGN:'GREEN',BURGERS:'BROWN',AZUSD:'WHITE'};
  var label;
  if (giant) label = 'GIANT ' + RARITY_LABELS[w.eggRarity] + ' EGG!';
  else if (sortedToken) label = (eggColorNames[sortedToken]||'SORTED') + ' ' + RARITY_LABELS[w.eggRarity] + ' EGG!';
  else label = RARITY_LABELS[w.eggRarity] + ' EGG!';
  showMsg(label, giant ? '#f0d060' : RARITY_COLORS[w.eggRarity]);
  closeEggStore();
  updateRoomTabs();
  updateRoomInfo();
  saveGame();
  // First egg ever? Send to grocery store to buy food
  if (totalHatched === 0 && getEggs().length === 1) {
    showMsg('NOW GET SOME FOOD!', '#4ade80');
    openGrocery();
  } else {
    // Normal flow — open incubator to show the new egg
    selectedEgg = w;
    openIncubator();
  }
  } catch(err) {
    console.error('addEgg error:', err);
    showMsg('ERROR: ' + (err.message || err).toString().slice(0,50), '#ef4444');
  }
}

// --- PARTICLE SYSTEM --- // MfT SoBs
function spawnParticles(x, y, type, count) {
  for (var i = 0; i < count; i++) {
    var p = {
      x: x + (Math.random() - 0.5) * 20,
      y: y + (Math.random() - 0.5) * 10,
      vx: (Math.random() - 0.5) * 2,
      vy: -(1.5 + Math.random() * 2),
      life: 1.0,
      maxLife: 60 + Math.floor(Math.random() * 40),
      type: type,
      text: '',
      color: '#fff',
      size: 10 + Math.random() * 6,
    };
    switch (type) {
      case 'heart':
        p.text = '\u2665'; p.color = '#f472b6'; break;
      case 'anger':
        p.text = '\u2726'; p.color = '#ef4444'; break;
      case 'sweat':
        p.text = '\u25cf'; p.color = '#60a5fa'; break;
      case 'note':
        p.text = '\u266a'; p.color = '#4ade80'; break;
      case 'star':
        p.text = '\u2605'; p.color = '#fbbf24'; p.size = 14 + Math.random() * 6; break;
      case 'stink':
        p.text = '~'; p.color = '#84cc16'; break;
    }
    particles.push(p);
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy *= 0.98;
    p.vx *= 0.98;
    p.life -= 1.0 / p.maxLife;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var alpha = Math.max(0, p.life);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = Math.round(p.size * SCALE) + 'px "Press Start 2P"';
    ctx.fillStyle = p.color;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  }
}
