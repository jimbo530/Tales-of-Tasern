var ABI=[{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"user","type":"address"},{"indexed":true,"internalType":"address","name":"tokenIn","type":"address"},{"indexed":false,"internalType":"uint256","name":"amountIn","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"amountOut","type":"uint256"}],"name":"Swapped","type":"event"},{"inputs":[],"name":"MFT","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"POOL_MANAGER","outputs":[{"internalType":"contract IPoolManager","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"WETH","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"poolKey","outputs":[{"internalType":"address","name":"currency0","type":"address"},{"internalType":"address","name":"currency1","type":"address"},{"internalType":"uint24","name":"fee","type":"uint24"},{"internalType":"int24","name":"tickSpacing","type":"int24"},{"internalType":"address","name":"hooks","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"token","type":"address"}],"name":"rescue","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"amountIn","type":"uint256"},{"internalType":"uint256","name":"minOut","type":"uint256"}],"name":"swapMFTforWETH","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"amountIn","type":"uint256"},{"internalType":"uint256","name":"minOut","type":"uint256"}],"name":"swapWETHforMFT","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"bytes","name":"data","type":"bytes"}],"name":"unlockCallback","outputs":[{"internalType":"bytes","name":"","type":"bytes"}],"stateMutability":"nonpayable","type":"function"}];

var ERC20_ABI=[
  "function approve(address spender, uint256 amount) returns (bool)",
  "function allowance(address owner, address spender) view returns (uint256)",
  "function balanceOf(address account) view returns (uint256)",
  "function decimals() view returns (uint8)"
];

var WETH="0x4200000000000000000000000000000000000006";
var MFT="0x8FB87d13B40B1A67B22ED1a17e2835fe7e3a9bA3";

async function deploy(){
  var s=document.getElementById("status");
  document.getElementById("btnDeploy").disabled=true;
  if(!window.ethereum){s.innerHTML="No wallet found";return;}
  try{
    s.innerText="Connecting...";
    await window.ethereum.request({method:"eth_requestAccounts"});
    try{await window.ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:"0x2105"}]});}catch(e){}
    var p=new ethers.BrowserProvider(window.ethereum);
    var sg=await p.getSigner();
    s.innerText="Deploying V4 Swapper... confirm in wallet";
    var f=new ethers.ContractFactory(ABI,BYTECODE,sg);
    var c=await f.deploy();
    s.innerText="Waiting for confirmation...";
    await c.waitForDeployment();
    var a=await c.getAddress();
    document.getElementById("addr").innerText=a;
    document.getElementById("contractAddr").value=a;
    s.innerHTML='<span style="color:#4ade80;">Deployed!</span> Copy the address. Now test a swap below.';
  }catch(e){s.innerHTML="Error: "+e.message;document.getElementById("btnDeploy").disabled=false;}
}

async function testSwap(wethToMft){
  var ss=document.getElementById("swapStatus");
  var addr=document.getElementById("contractAddr").value.trim();
  var amt=document.getElementById("amountIn").value.trim();
  if(!addr){ss.innerText="Paste contract address first";return;}
  if(!amt||parseFloat(amt)<=0){ss.innerText="Enter an amount";return;}
  try{
    ss.innerText="Connecting...";
    await window.ethereum.request({method:"eth_requestAccounts"});
    var p=new ethers.BrowserProvider(window.ethereum);
    var sg=await p.getSigner();
    var swapper=new ethers.Contract(addr,ABI,sg);
    var tokenIn=wethToMft?WETH:MFT;
    var token=new ethers.Contract(tokenIn,ERC20_ABI,sg);
    var dec=await token.decimals();
    var amountWei=ethers.parseUnits(amt,dec);

    // Check and set approval
    var myAddr=await sg.getAddress();
    var allowance=await token.allowance(myAddr,addr);
    if(allowance<amountWei){
      ss.innerText="Approving token spend... confirm in wallet";
      var tx=await token.approve(addr,ethers.MaxUint256);
      await tx.wait();
    }

    // Execute swap (minOut = 0 for testing — NEVER do this in production)
    ss.innerText=(wethToMft?"Swapping WETH -> MfT":"Swapping MfT -> WETH")+"... confirm in wallet";
    var tx2;
    if(wethToMft){
      tx2=await swapper.swapWETHforMFT(amountWei,0);
    }else{
      tx2=await swapper.swapMFTforWETH(amountWei,0);
    }
    ss.innerText="Waiting for confirmation...";
    var receipt=await tx2.wait();

    // Parse Swapped event
    var swapLog=receipt.logs.find(function(l){try{return swapper.interface.parseLog(l)?.name==="Swapped";}catch(e){return false;}});
    if(swapLog){
      var parsed=swapper.interface.parseLog(swapLog);
      var outDec=wethToMft?18:18;
      ss.innerHTML='<span style="color:#4ade80;">Swap success!</span> Got '+ethers.formatUnits(parsed.args.amountOut,outDec)+(wethToMft?" MfT":" WETH")+'<br>Tx: <a href="https://basescan.org/tx/'+receipt.hash+'" target="_blank" style="color:#c9a84c;">'+receipt.hash.slice(0,16)+'...</a>';
    }else{
      ss.innerHTML='<span style="color:#4ade80;">Tx confirmed!</span> <a href="https://basescan.org/tx/'+receipt.hash+'" target="_blank" style="color:#c9a84c;">View on BaseScan</a>';
    }
  }catch(e){
    ss.innerHTML='<span style="color:#ef4444;">Error:</span> '+e.message;
  }
}
