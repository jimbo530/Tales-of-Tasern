<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MfT PowerVaults</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #08060a; color: #ddd; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 32px 24px 60px; }

  .hdr { text-align: center; padding: 32px 0 28px; }
  .hdr h1 { font-size: 26px; font-weight: 700; color: #f0d070; letter-spacing: 0.5px; }
  .hdr p { color: #998; font-size: 14px; margin-top: 6px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }

  .vault-card {
    background: linear-gradient(160deg, #1a1820 0%, #12111a 100%);
    border: 1px solid #555544; border-radius: 6px;
    padding: 16px 18px;
    box-shadow:
      inset 0 1px 0 #ffffff12,
      inset 0 -1px 0 #00000044,
      0 2px 8px #00000066;
    position: relative;
    text-decoration: none; color: inherit;
    display: block; transition: all 0.2s;
  }
  .vault-card:hover {
    border-color: #c9a84c88;
    transform: translateY(-2px);
    box-shadow: inset 0 1px 0 #ffffff12, 0 4px 16px #00000088;
  }
  /* rivets */
  .vault-card::before, .vault-card::after {
    content: ''; position: absolute; width: 5px; height: 5px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #888 0%, #444 60%, #222 100%);
    box-shadow: inset 0 1px 1px #aaa8, 0 1px 2px #0008;
  }
  .vault-card::before { top: 7px; left: 7px; }
  .vault-card::after { top: 7px; right: 7px; }

  .vault-name {
    font-size: 14px; font-weight: 700; color: #f0d070; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .vault-addr {
    font-size: 10px; font-family: monospace; color: #666;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .vault-arrow {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    color: #555; font-size: 16px; transition: color 0.2s;
  }
  .vault-card:hover .vault-arrow { color: #c9a84c; }

  .footer { text-align: center; margin-top: 32px; padding-top: 16px; border-top: 1px solid #333322; }
  .footer span { color: #555; font-size: 11px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <h1>MfT PowerVaults</h1>
    <p>Select an NFT collection to power up with WETH</p>
  </div>

  <div class="hdr" id="baseHdr"><h1 style="font-size:20px;">Base NFTs</h1></div>
  <div class="grid" id="baseGrid"></div>

  <div class="hdr" style="padding-top:24px;" id="polyHdr">
    <h1 style="font-size:20px;">Polygon NFTs</h1>
    <p>Cross-chain vaults &mdash; Polygon NFTs powered by Base LP</p>
  </div>
  <div class="grid" id="polyGrid"></div>

  <div class="footer">
    <span id="footerText"></span>
  </div>

</div>
<script>
function makeCard(nft) {
  var addr = nft.contractAddress;
  var short = addr.slice(0,6) + "..." + addr.slice(-4);
  var chain = nft.chain || "base";
  var href = "vault?nft=" + addr + "&name=" + encodeURIComponent(nft.name);
  if (chain === "polygon") href += "&chain=polygon";
  var label = chain === "polygon" ? short + " \u00b7 Polygon" : short;
  return '<a class="vault-card" href="' + href + '">' +
    '<div class="vault-name">' + nft.name + '</div>' +
    '<div class="vault-addr">' + label + '</div>' +
    '<span class="vault-arrow">&rarr;</span></a>';
}

fetch("nfts.json").then(function(r){ return r.json(); }).then(function(nfts) {
  var base = nfts.filter(function(n){ return n.chain === "base"; });
  var poly = nfts.filter(function(n){ return n.chain === "polygon"; });

  document.getElementById("baseGrid").innerHTML = base.map(makeCard).join("");
  document.getElementById("polyGrid").innerHTML = poly.map(makeCard).join("");
  document.getElementById("footerText").innerText =
    base.length + " Base + " + poly.length + " Polygon NFT collections \u00b7 MfT LP Vaults";
}).catch(function(e) {
  document.getElementById("baseGrid").innerHTML = '<p style="color:#f66;grid-column:1/-1;">Failed to load NFTs: ' + e.message + '</p>';
});
</script>
</body></html>
