async function deployContract() {
  var s = document.getElementById("status");
  document.getElementById("btnDeploy").disabled = true;
  if (!window.ethereum) { s.innerHTML = "No wallet found"; return; }
  try {
    s.innerText = "Connecting wallet...";
    await window.ethereum.request({method:"eth_requestAccounts"});
    // Switch to Polygon (chainId 137 = 0x89)
    try { await window.ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:"0x89"}]}); } catch(e) { log("Switch to Polygon manually"); }
    var p = new ethers.BrowserProvider(window.ethereum);
    signer = await p.getSigner();
    log("Wallet connected: " + await signer.getAddress());

    s.innerText = "Deploying airdrop contract... confirm in wallet";
    var f = new ethers.ContractFactory(ABI, BYTECODE, signer);
    var c = await f.deploy();
    s.innerText = "Waiting for confirmation...";
    await c.waitForDeployment();
    contractAddr = await c.getAddress();
    log("Airdrop contract deployed: " + contractAddr);
    s.innerHTML = "Deployed! Now click Approve & Airdrop";
    document.getElementById("btnAirdrop").disabled = false;
    document.getElementById("btnAirdrop").style.opacity = "1";
  } catch(e) {
    s.innerHTML = "Error: " + e.message;
    document.getElementById("btnDeploy").disabled = false;
  }
}

async function approveAndAirdrop() {
  var s = document.getElementById("status");
  document.getElementById("btnAirdrop").disabled = true;
  try {
    var amtEach = BigInt(document.getElementById("amt").value);
    var totalAmt = amtEach * BigInt(ALL_NFTS.length);
    log("Amount per NFT: " + amtEach + " wei");
    log("Total needed: " + totalAmt + " wei (" + ALL_NFTS.length + " NFTs)");

    // Check balance
    var lp = new ethers.Contract(LP_TOKEN, ERC20_ABI, signer);
    var bal = await lp.balanceOf(await signer.getAddress());
    log("Your LP balance: " + bal.toString());
    if (bal < totalAmt) { s.innerHTML = "Not enough LP! Need " + totalAmt + " but have " + bal; return; }

    // Approve
    s.innerText = "Approving LP spend... confirm in wallet";
    log("Approving " + totalAmt + " LP to " + contractAddr);
    var tx = await lp.approve(contractAddr, totalAmt);
    await tx.wait();
    log("Approved!");

    // Airdrop in batches
    var contract = new ethers.Contract(contractAddr, ABI, signer);
    var batches = Math.ceil(ALL_NFTS.length / BATCH_SIZE);
    for (var i = 0; i < batches; i++) {
      var batch = ALL_NFTS.slice(i * BATCH_SIZE, (i + 1) * BATCH_SIZE);
      s.innerText = "Batch " + (i+1) + "/" + batches + " (" + batch.length + " NFTs)... confirm in wallet";
      log("Sending batch " + (i+1) + "/" + batches + ": " + batch.length + " addresses");
      var tx2 = await contract.airdrop(LP_TOKEN, batch, amtEach);
      await tx2.wait();
      log("Batch " + (i+1) + " confirmed! tx: " + tx2.hash);
    }

    s.innerHTML = "Done! Airdropped to all " + ALL_NFTS.length + " NFTs";
    log("ALL DONE! " + ALL_NFTS.length + " NFTs received " + amtEach + " LP each");
  } catch(e) {
    s.innerHTML = "Error: " + e.message;
    log("ERROR: " + e.message);
    document.getElementById("btnAirdrop").disabled = false;
  }
}
